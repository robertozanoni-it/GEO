function renderResults(){const saved=state.savedFilters||[];document.getElementById('results').innerHTML=`<div class="toolbar"><button class="btn btn-primary" data-go="new-check">＋ Nuova verifica</button><select id="savedFilter"><option value="">Filtri salvati</option>${saved.map(f=>`<option value="${f.id}">${Utils.esc(f.name)}</option>`).join('')}</select><input id="resultSearch" placeholder="Cerca risultati…" style="max-width:220px"><select id="resultProjectFilter"><option value="">Tutti i progetti</option>${options(state.projects,'')}</select><select id="resultPlatformFilter"><option value="">Tutte le AI</option>${options(state.platforms,'')}</select><select id="resultMentionFilter"><option value="">Tutti gli esiti</option><option value="brand">Brand presente</option><option value="domain">Dominio citato</option><option value="absent">Brand assente</option><option value="sources">Con fonti</option></select><button class="btn" data-action="reset-result-filters">Reset filtri</button><button class="btn" data-action="save-current-filter">Salva filtro</button></div><div class="toolbar" id="bulkToolbar"><span class="help"><strong id="selectedCount">0</strong> selezionate</span><button class="btn btn-sm" data-action="bulk-export">Esporta</button><button class="btn btn-sm" data-action="bulk-archive">Archivia</button><button class="btn btn-sm" data-action="bulk-status">Segna revisionate</button><button class="btn btn-sm btn-danger" data-action="bulk-delete">Elimina</button><div class="spacer"></div><button class="btn" data-action="export-results">Esporta tutte</button></div><div id="resultsTable">${resultsTable([...state.checks].sort((a,b)=>new Date(b.date)-new Date(a.date)),true)}</div>`}
function resultsTable(checks,selectable=true,showReportAction=false){if(!checks.length)return empty('Nessuna verifica','Incolla e analizza una risposta reale.');return `<div class="table-wrap"><table><thead><tr>${selectable?'<th><input type="checkbox" id="selectAllResults" aria-label="Seleziona tutte"></th>':''}<th>Prompt / progetto</th><th>AI</th><th>Esito</th><th>Score</th><th>Confidenza</th><th>Data</th><th>Azioni</th></tr></thead><tbody>${checks.map(c=>`<tr data-result-row data-id="${c.id}" data-search="${Utils.esc(Utils.slug(JSON.stringify(c)))}" data-project="${c.projectId}" data-platform="${c.platformId}" data-brand="${c.brandMentioned?'yes':'no'}" data-domain="${c.domainCited?'yes':'no'}" data-sources="${(c.urls||[]).length?'yes':'no'}">${selectable?`<td><input type="checkbox" class="result-select" value="${c.id}" ${selectedResultIds.has(c.id)?'checked':''}></td>`:''}<td><strong>${Utils.esc(promptBy(c.promptId)?.text||'Prompt eliminato')}</strong><div class="help">${Utils.esc(projectBy(c.projectId)?.name||'Progetto eliminato')}</div></td><td>${Utils.esc(platformBy(c.platformId).name)}<div class="help">${Utils.esc(c.responseType||'')}</div></td><td>${c.brandMentioned?badge('Brand','success'):badge('Assente','danger')} ${c.domainCited?badge('Dominio','info'):''}</td><td><strong>${c.score||0}</strong>/100</td><td>${c.confidence||0}/100</td><td>${Utils.date(c.date,true)}</td><td><div class="flex gap-8 wrap"><button class="btn btn-sm" data-view-check="${c.id}">Dettagli</button><button class="btn btn-sm" data-edit-check="${c.id}">Modifica</button><button class="btn btn-sm" data-duplicate-check="${c.id}">Duplica</button>${showReportAction?`<button class="btn btn-sm btn-primary" data-report-check="${c.id}">Report</button>`:''}</div></td></tr>`).join('')}</tbody></table></div>`}
function viewCheck(id){const c=state.checks.find(x=>x.id===id);if(!c)return;const p=projectBy(c.projectId);const prompt=promptBy(c.promptId);const insight=checkInsights(c);modal('Dettagli verifica',`<div class="grid grid-3"><div class="analysis-item"><small>Score</small><strong>${c.score}/100</strong></div><div class="analysis-item"><small>Confidence</small><strong>${c.confidence||0}/100</strong></div><div class="analysis-item"><small>Tipo risposta</small><strong>${Utils.esc(c.responseType||'—')}</strong></div><div class="analysis-item"><small>Brand</small><strong>${c.brandMentioned?'Presente':'Assente'}</strong></div><div class="analysis-item"><small>Dominio</small><strong>${c.domainCited?'Citato':'Non citato'}</strong></div><div class="analysis-item"><small>Posizione</small><strong>${c.position||'—'}</strong></div></div><div class="grid grid-2" style="margin-top:15px"><div class="card card-flat"><h3>Dati del test</h3><p><strong>Progetto:</strong> ${Utils.esc(p?.name||'—')}<br><strong>Prompt:</strong> ${Utils.esc(prompt?.text||'—')}<br><strong>AI:</strong> ${Utils.esc(platformBy(c.platformId).name)}<br><strong>Modello:</strong> ${Utils.esc(c.model||'—')}<br><strong>Sessione:</strong> ${Utils.esc(c.sessionType||'—')}<br><strong>Ambiente:</strong> ${Utils.esc(environmentMeta(c.testEnvironment||'not-verified').label)}<br><strong>Località:</strong> ${Utils.esc(c.location||'—')}<br><strong>Data:</strong> ${Utils.date(c.date,true)}</p><h3>Servizi e località</h3><p>${badge((c.servicesPresent||[]).join(', ')||'Nessun servizio',c.servicesPresent?.length?'success':'warning')} ${badge((c.locationsPresent||[]).join(', ')||'Nessuna località',c.locationsPresent?.length?'success':'warning')}</p></div><div class="card card-flat"><h3>Cosa significa e cosa fare</h3>${insight}</div></div><h3>Risposta completa</h3><div class="answer-view">${Analyzer.highlight(c.cleanResponse||c.response,p||{},c)}</div><div class="grid grid-2" style="margin-top:15px"><div><h3>Prove</h3>${renderEvidence(c)}</div><div><h3>Fonti</h3>${renderSources(c.sourceDetails||[])}</div></div><h3>Note</h3><div class="notice">${Utils.esc(c.notes||'Nessuna nota')}</div>`,`<button class="btn" data-close-modal>Chiudi</button><button class="btn" data-reanalyze-check="${c.id}">Analizza di nuovo</button><button class="btn btn-primary" data-edit-check="${c.id}">Modifica</button>`)}
function checkInsights(c){const p=projectBy(c.projectId);const items=[];if(!c.brandMentioned)items.push(`<div class="evidence"><strong>Il brand non compare</strong><blockquote>Crea o migliora una pagina che risponda direttamente al prompt, con dati reali, servizio, località e prova dell’esperienza.</blockquote></div>`);if(c.brandMentioned&&!c.domainCited)items.push(`<div class="evidence"><strong>Il sito non viene collegato</strong><blockquote>Rafforza l’associazione tra ${Utils.esc(p?.brand||'brand')} e ${Utils.esc(p?.domain||'dominio')} tramite schema, profili coerenti e citazioni indipendenti.</blockquote></div>`);if(c.competitors?.length)items.push(`<div class="evidence"><strong>Concorrenti da studiare</strong><blockquote>${Utils.esc(c.competitors.join(', '))}. Analizza le fonti che li sostengono, non solo il loro testo.</blockquote></div>`);if(!c.urls?.length)items.push(`<div class="evidence"><strong>Fonti mancanti</strong><blockquote>Ripeti il test chiedendo le fonti e registra gli URL effettivi.</blockquote></div>`);return items.join('')||'<div class="notice success">Il brand e il dominio sono presenti. Continua a testare la stabilità su sessioni e date diverse.</div>'}
function editCheck(id){const c=state.checks.find(x=>x.id===id);if(!c)return;const p=projectBy(c.projectId);modal('Modifica verifica',`<form id="editCheckForm" class="form-grid"><input type="hidden" name="id" value="${c.id}">${textareaField('response','Risposta completa',c.response,'',12).replace('<textarea','<textarea class="response-text"')}${textareaField('sources','Fonti / URL',(c.urls||[]).join('\n'),'',5)}${field('model','Modello / modalità',c.model||'')}${field('location','Località',c.location||'')}${textareaField('notes','Note',c.notes||'','',3)}<div class="field"><label>Rilevanza</label><select name="relevance">${[1,2,3,4,5].map(n=>`<option ${c.relevance===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="field"><label>Attendibilità</label><select name="reliability">${[1,2,3,4,5].map(n=>`<option ${c.reliability===n?'selected':''}>${n}</option>`).join('')}</select></div></form><div class="toolbar" style="margin-top:15px"><button class="btn btn-primary" id="editAnalyzeButton">Analizza modifiche</button></div><div id="editAnalysis">${renderEditAnalysis(c,p)}</div>`,`<button class="btn" data-close-modal>Annulla</button><button class="btn btn-primary" id="saveEditedCheck">Salva modifiche</button>`);let edited={...c};document.getElementById('editAnalyzeButton').onclick=()=>{const d=Utils.form(document.getElementById('editCheckForm'));edited={...edited,...Analyzer.analyze(p,d.response,d.sources)};document.getElementById('editAnalysis').innerHTML=renderEditAnalysis(edited,p);Utils.toast('Analisi aggiornata','success')};document.getElementById('saveEditedCheck').onclick=()=>{const d=Utils.form(document.getElementById('editCheckForm'));Object.assign(c,edited,{response:d.response,cleanResponse:edited.cleanResponse||Analyzer.cleanText(d.response),urls:edited.urls||Utils.lines(d.sources),sources:Utils.lines(d.sources),model:d.model,location:d.location,notes:d.notes,relevance:Number(d.relevance),reliability:Number(d.reliability),updatedAt:Utils.now()}); function renderEditAnalysis(c,p){return `<div class="analysis-grid"><div class="analysis-item"><small>Score</small><strong>${c.score||0}/100</strong></div><div class="analysis-item"><small>Confidence</small><strong>${c.confidence||0}/100</strong></div><div class="analysis-item"><small>Brand</small><strong>${c.brandMentioned?'Presente':'Assente'}</strong></div><div class="analysis-item"><small>Dominio</small><strong>${c.domainCited?'Citato':'Non citato'}</strong></div><div class="analysis-item"><small>Concorrenti</small><strong>${(c.competitors||[]).length}</strong></div><div class="analysis-item"><small>Tipo risposta</small><strong>${Utils.esc(c.responseType||'—')}</strong></div></div>`}

function exportChecks(checks,name='geo-verifiche.csv'){Utils.download(name,Utils.csv([['Progetto','Prompt','AI','Ambiente','Data','Brand','Dominio','Posizione','Menzioni','Score','Confidence','Tipo risposta','Concorrenti','Fonti'],...checks.map(c=>[projectBy(c.projectId)?.name,promptBy(c.promptId)?.text,platformBy(c.platformId).name,environmentMeta(c.testEnvironment||'not-verified').label,c.date,c.brandMentioned?'Sì':'No',c.domainCited?'Sì':'No',c.position,c.mentions,c.score,c.confidence,c.responseType,(c.competitors||[]).join('|'),(c.urls||[]).join('|')])]),'text/csv;charset=utf-8')}

function renderMatrix(){const active=state.platforms.filter(p=>p.active);const projectId=document.getElementById('matrixProject')?.value||'';const prompts=state.prompts.filter(p=>!projectId||p.projectId===projectId);document.getElementById('matrix').innerHTML=`<div class="toolbar"><select id="matrixProject"><option value="">Tutti i progetti</option>${options(state.projects,projectId)}</select><div class="spacer"></div><span class="help">Clicca una cella per avviare o ripetere il test.</span></div>${prompts.length&&active.length?`<div class="matrix"><table><thead><tr><th>Prompt</th>${active.map(p=>`<th>${Utils.esc(p.name)}</th>`).join('')}</tr></thead><tbody>${prompts.map(prompt=>`<tr><td><strong>${Utils.esc(prompt.text)}</strong><div class="help">${Utils.esc(projectBy(prompt.projectId)?.name||'')}</div></td>${active.map(ai=>{const c=state.checks.filter(x=>x.promptId===prompt.id&&x.platformId===ai.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];return `<td class="matrix-cell"><button data-matrix-start data-prompt="${prompt.id}" data-platform="${ai.id}">${c?`<strong>${c.score}/100</strong><div class="help">${Utils.date(c.date)}</div>`:'<strong>Da testare</strong>'}</button></td>`}).join('')}</tr>`).join('')}</tbody></table></div>`:empty('Matrice vuota','Crea prompt e attiva piattaforme.')}`}

function renderOpportunityCard(o,selectable=true){const pd=priorityDetails(o.priority);const check=state.checks.find(c=>c.id===o.checkId);return `<article class="opportunity priority-${o.priority} ${selectedOpportunityIds.has(o.id)?'selected':''}" data-project="${o.projectId}" data-priority="${o.priority}" data-status="${o.status}"><div class="flex wrap gap-8">${selectable?`<input type="checkbox" class="opp-select" value="${o.id}" ${selectedOpportunityIds.has(o.id)?'checked':''} aria-label="Seleziona opportunità">`:''}${badge(o.priority,o.priority==='P1'?'danger':o.priority==='P2'?'warning':'info')}<strong>${Utils.esc(o.title)}</strong><div class="spacer"></div><select data-opp-status="${o.id}" style="width:auto"><option ${o.status==='Da fare'?'selected':''}>Da fare</option><option ${o.status==='In corso'?'selected':''}>In corso</option><option ${o.status==='Completata'?'selected':''}>Completata</option></select></div><div class="priority-explain"><strong>${Utils.esc(pd.label)} · ${Utils.esc(pd.when)} · Impegno ${Utils.esc(pd.effort)}</strong><br>${Utils.esc(pd.meaning)}</div>${renderImpact(o)}${renderDiagnosis(o)}<p class="simple-explanation"><strong>Problema rilevato:</strong> ${Utils.esc(o.why)}</p><p class="simple-explanation"><strong>Obiettivo:</strong> ${Utils.esc(o.expectedOutcome||o.action)}</p><p class="simple-explanation"><strong>Azione consigliata:</strong> ${Utils.esc(o.action)}</p><div class="action-plan"><strong>Piano di azione, passo per passo</strong><ol>${(o.steps||[o.action]).map(step=>`<li>${Utils.esc(step)}</li>`).join('')}</ol></div>${renderChecklist(o)}${check?renderKpis(check,o):''}${o.notes?`<p class="help"><strong>Nota:</strong> ${Utils.esc(o.notes)}</p>`:''}<button class="btn btn-sm" data-view-check="${o.checkId}">Apri verifica</button></article>`}
function renderOpportunities(){const items=generateOpportunities();selectedOpportunityIds=new Set([...selectedOpportunityIds].filter(id=>items.some(o=>o.id===id)));document.getElementById('opportunities').innerHTML=`<div class="toolbar"><select id="oppProject"><option value="">Tutti i progetti</option>${options(state.projects,'')}</select><select id="oppPriority"><option value="">Tutte le priorità</option><option>P1</option><option>P2</option><option>P3</option><option>P4</option></select><select id="oppStatus"><option value="">Tutti gli stati</option><option>Da fare</option><option>In corso</option><option>Completata</option></select><div class="spacer"></div><button class="btn" data-action="select-visible-opportunities">Seleziona visibili</button><button class="btn" data-action="clear-opportunity-selection">Deseleziona</button><button class="btn" data-action="regenerate-opportunities">Rigenera</button></div><div class="toolbar"><strong><span id="selectedOpportunityCount">${selectedOpportunityIds.size}</span> opportunità selezionate</strong><button class="btn btn-sm" data-action="opp-mark-progress">Segna in corso</button><button class="btn btn-sm" data-action="opp-mark-done">Segna completate</button><button class="btn btn-sm" data-action="opp-add-report">Usa nel report</button></div><div class="notice">Seleziona soltanto le opportunità che vuoi eseguire o inserire nel report. Ogni scheda contiene priorità, spiegazione semplice, piano operativo e metodo di verifica. Le cause restano ipotesi da controllare.</div><div id="opportunityList">${items.length?items.map(o=>renderOpportunityCard(o,true)).join(''):empty('Nessuna opportunità','Salva una verifica per generare suggerimenti.')}</div>`}

function renderQuality(){const issues=dataQualityIssues();const byKind={};issues.forEach(i=>byKind[i.kind]=(byKind[i.kind]||0)+1);document.getElementById('quality').innerHTML=`<div class="grid grid-4">${metric('Segnalazioni',issues.length,'Problemi rilevati')}${metric('Duplicati',byKind.duplicate||0,'Possibili doppioni')}${metric('Prompt mai testati',byKind.untested||0,'Copertura incompleta')}${metric('Senza fonti',byKind.sources||0,'URL non registrati')}</div><div class="toolbar" style="margin-top:16px"><select id="qualityPriority"><option value="">Tutte le priorità</option><option>P1</option><option>P2</option><option>P3</option></select><select id="qualityKind"><option value="">Tutti i problemi</option>${Object.keys(byKind).map(k=>`<option value="${k}">${k}</option>`).join('')}</select><div class="spacer"></div><button class="btn" data-action="export-quality">Esporta elenco</button></div><div id="qualityList">${issues.length?issues.map((i,index)=>`<article class="quality-item priority-${i.priority}" data-quality-priority="${i.priority}" data-quality-kind="${i.kind}"><div class="flex gap-8 wrap">${badge(i.priority,i.priority==='P1'?'danger':i.priority==='P2'?'warning':'info')}<strong>${Utils.esc(i.title)}</strong></div><p>${Utils.esc(i.detail)}</p>${i.checkId?`<button class="btn btn-sm" data-view-check="${i.checkId}">Apri verifica</button>`:''}${i.promptId?`<button class="btn btn-sm" data-start-prompt="${i.promptId}">Avvia test</button>`:''}${i.checkIds?`<button class="btn btn-sm btn-danger" data-delete-duplicate="${i.checkIds[1]}">Elimina seconda copia</button>`:''}</article>`).join(''):empty('Qualità dati buona','Non sono stati rilevati problemi automatici.')}</div>`}

/* ------------------------------ Generator / reports ------------------------------ */
function renderGenerator(){const projectId=document.getElementById('generatorProject')?.value||state.projects[0]?.id||'';const checks=state.checks.filter(c=>c.projectId===projectId).sort((a,b)=>new Date(b.date)-new Date(a.date));const checkId=document.getElementById('generatorCheck')?.value||checks[0]?.id||'';document.getElementById('generator').innerHTML=`<div class="grid grid-2"><div class="card"><div class="card-header"><div><div class="card-title">Genera un prompt operativo</div><div class="card-sub">Usa dati reali della verifica selezionata.</div></div></div><div class="field"><label>Progetto</label><select id="generatorProject"><option value="">Seleziona</option>${options(state.projects,projectId)}</select></div><div class="field"><label>Verifica</label><select id="generatorCheck"><option value="">Seleziona</option>${checks.map(c=>`<option value="${c.id}" ${c.id===checkId?'selected':''}>${Utils.esc(platformBy(c.platformId).name)} · ${Utils.date(c.date)} · ${Utils.esc(promptBy(c.promptId)?.text||'')}</option>`).join('')}</select></div><div class="field"><label>Modello</label><select id="generatorTemplate">${Object.entries(TEMPLATE_NAMES).map(([k,v])=>`<option value="${k}">${v}</option>`).join('')}</select></div><button class="btn btn-primary" data-action="generate-prompt" style="margin-top:14px">Genera prompt</button></div><div class="card"><div class="card-header"><div><div class="card-title">Prompt pronto da copiare</div><div class="card-sub">Controlla sempre i dati prima dell’uso.</div></div><div class="spacer"></div><button class="btn btn-sm" data-action="copy-generated">Copia</button></div><textarea id="generatedPrompt" class="response-text" style="min-height:520px">${Utils.esc(generatedPrompt)}</textarea></div></div>`}
function buildGeneratedPrompt(){const check=state.checks.find(c=>c.id===document.getElementById('generatorCheck').value);if(!check){Utils.toast('Seleziona una verifica.','error');return}const project=projectBy(check.projectId);const prompt=promptBy(check.promptId);const type=document.getElementById('generatorTemplate').value;generatedPrompt=`Agisci come consulente SEO e GEO senior.\n\nOBIETTIVO\nMigliorare la probabilità che la pagina indicata venga scelta o citata nelle risposte AI, senza inventare dati.\n\nTIPO DI ANALISI\n${TEMPLATE_NAMES[type]}\n\nPROMPT TESTATO\n${prompt?.text||''}\n\nRISPOSTA OTTENUTA\n${check.cleanResponse||check.response}\n\nFONTI REGISTRATE\n${(check.urls||[]).join('\n')||'Nessuna fonte registrata'}\n\nBRAND E SITO\nBrand: ${project.brand}\nDominio: ${project.domain}\nPagina target: ${project.targetUrl||'Da definire'}\nLocalità: ${project.location||'Da definire'}\nServizi: ${(project.services||[]).join(', ')||'Da definire'}\nConcorrenti citati: ${(check.competitors||[]).join(', ')||'Nessuno'}\n\nDATI DELLA VERIFICA\nBrand presente: ${check.brandMentioned?'Sì':'No'}\nDominio citato: ${check.domainCited?'Sì':'No'}\nTipo risposta: ${check.responseType}\nConfidence Score locale: ${check.confidence}/100\n\nRICHIESTE\n1. Distingui fatti, ipotesi e dati mancanti.\n2. Spiega in modo semplice quali elementi delle fonti potrebbero aver favorito la citazione.\n3. Individua content gap, entity gap, authority gap e local gap.\n4. Proponi azioni specifiche sulla pagina target e segnali esterni.\n5. Per ogni azione indica impatto, difficoltà e metodo di verifica.\n6. Non inventare recensioni, risultati, certificazioni o competenze.\n7. Concludi con una checklist P1-P4.`;document.getElementById('generatedPrompt').value=generatedPrompt}
function reportAvailableChecks(projectId,range){const cutoff=range==='all'?0:Date.now()-Number(range)*86400000;return state.checks.filter(c=>c.projectId===projectId&&!c.archived&&new Date(c.date).getTime()>=cutoff).sort((a,b)=>new Date(b.date)-new Date(a.date))}
function reportAvailableOpportunities(projectId,checkIds=null){const allowed=checkIds?new Set(checkIds):null;return generateOpportunities().filter(o=>o.projectId===projectId&&o.status!=='Completata'&&(!allowed||allowed.has(o.checkId)))}
function resetReportSelections(projectId,range){const checks=reportAvailableChecks(projectId,range);reportSelectedCheckIds=new Set(checks[0]?[checks[0].id]:[]);reportSelectedOpportunityIds=new Set(reportAvailableOpportunities(projectId,[...reportSelectedCheckIds]).map(o=>o.id))}
function reportCheckLabel(c){const prompt=promptBy(c.promptId)?.text||'Prompt eliminato';return `${platformBy(c.platformId).name} · ${Utils.date(c.date,true)} · ${prompt}`}
function renderReports(){
 reportProjectChoice=reportProjectChoice||state.projects[0]?.id||'';
 const availableChecks=reportAvailableChecks(reportProjectChoice,reportRangeChoice);
 if(reportProjectChoice&&!reportSelectedCheckIds.size)resetReportSelections(reportProjectChoice,reportRangeChoice);
 reportSelectedCheckIds=new Set([...reportSelectedCheckIds].filter(id=>availableChecks.some(c=>c.id===id)));
 if(reportSelectedCheckIds.size>1)reportSelectedCheckIds=new Set([[...reportSelectedCheckIds][0]]);
 const selectedCheckId=[...reportSelectedCheckIds][0]||'';
 const availableOpp=reportAvailableOpportunities(reportProjectChoice,selectedCheckId?[selectedCheckId]:[]);
 reportSelectedOpportunityIds=new Set([...reportSelectedOpportunityIds].filter(id=>availableOpp.some(o=>o.id===id)));
 if(selectedCheckId&&!reportSelectedOpportunityIds.size)reportSelectedOpportunityIds=new Set(availableOpp.map(o=>o.id));
 document.getElementById('reports').innerHTML=`<div class="toolbar no-print"><select id="reportProject"><option value="">Seleziona progetto</option>${options(state.projects,reportProjectChoice)}</select><select id="reportRange"><option value="all" ${reportRangeChoice==='all'?'selected':''}>Tutto lo storico</option><option value="30" ${reportRangeChoice==='30'?'selected':''}>Ultimi 30 giorni</option><option value="90" ${reportRangeChoice==='90'?'selected':''}>Ultimi 90 giorni</option></select><div class="spacer"></div><button class="btn" data-action="print-report">Stampa / PDF</button><button class="btn" data-action="export-report">Esporta ricerca</button></div>
 <div class="card no-print" style="margin-bottom:16px"><div class="card-header"><div><div class="card-title">Ricerca da inserire nel report</div><div class="card-sub">Il report mostrerà esclusivamente la ricerca scelta e le opportunità generate da quella verifica.</div></div></div><div class="field" style="margin-top:12px"><label>Seleziona una ricerca</label><select id="reportCheck" class="report-search-select"><option value="">Nessuna ricerca selezionata</option>${availableChecks.map(c=>`<option value="${c.id}" ${c.id===selectedCheckId?'selected':''}>${Utils.esc(reportCheckLabel(c))}</option>`).join('')}</select></div></div>
 <div class="selection-panel no-print"><h3>Opportunità GEO della ricerca selezionata</h3><div class="help" style="margin-bottom:10px">${reportSelectedOpportunityIds.size} selezionate su ${availableOpp.length}. Nessuna opportunità di altre ricerche viene inclusa.</div><div class="selection-list">${availableOpp.length?availableOpp.map(o=>`<label class="selection-row"><input type="checkbox" class="report-opp-select" value="${o.id}" ${reportSelectedOpportunityIds.has(o.id)?'checked':''}><span><strong>${Utils.esc(o.title)}</strong><span class="meta">${o.priority} · ${Utils.esc(priorityDetails(o.priority).when)}</span></span>${badge(o.priority,o.priority==='P1'?'danger':o.priority==='P2'?'warning':'info')}</label>`).join(''):'<div class="report-empty-note">Seleziona una ricerca che abbia opportunità aperte.</div>'}</div></div>
 <div id="reportContent">${renderReport(reportProjectChoice)}</div>`}
function opportunityMeta(o){
 const t=o.title.toLowerCase();
 if(t.includes('brand non compare'))return{impactGeo:5,impactSeo:4,time:'4–8 ore',cost:'Basso',difficulty:'Media',probability:65,causes:['La pagina potrebbe non rispondere subito alla query','I segnali brand–servizio–località possono essere deboli','Le prove verificabili possono essere insufficienti','I concorrenti possono avere più citazioni indipendenti'],today:['Rivedi title, H1 e prime 120 parole','Inserisci una risposta diretta alla query','Aggiungi autore, servizi e località','Collega una prova reale'],week:['Completa FAQ e schema coerente','Aggiungi 3–5 link interni pertinenti','Rafforza case study e recensioni','Controlla Google Business Profile'],month:['Ottieni citazioni esterne pertinenti','Pubblica contenuti di supporto','Ripeti i test su più AI','Confronta fonti e concorrenti'],checklist:['H1 coerente','Risposta iniziale chiara','Servizi espliciti','Località esplicita','Autore identificabile','Prove reali','Link interni','Schema coerente','Profili aggiornati','Nuovo test neutrale']};
 if(t.includes('sito non citato'))return{impactGeo:5,impactSeo:3,time:'3–6 ore',cost:'Basso',difficulty:'Media',probability:70,causes:['Il brand è riconosciuto ma il dominio ufficiale non è inequivocabile','Profili e sito possono usare descrizioni non uniformi','Mancano citazioni brand+dominio su fonti esterne'],today:['Uniforma nome e dominio','Controlla pagina autore/azienda','Verifica canonical e dati strutturati'],week:['Aggiorna profili ufficiali','Aggiungi sameAs validi','Cerca menzioni brand+dominio'],month:['Ottieni citazioni indipendenti','Ripeti test con fonti richieste'],checklist:['Nome coerente','Dominio ufficiale visibile','Pagina autore','Schema validato','sameAs reali','Profili coerenti','Citazioni esterne','Test successivo']};
 if(t.includes('concorrenti'))return{impactGeo:4,impactSeo:4,time:'5–10 ore',cost:'Basso',difficulty:'Media',probability:60,causes:['I concorrenti possono avere fonti più forti','Possono coprire meglio l’intento','Possono mostrare più prove verificabili'],today:['Apri le fonti citate','Crea tabella gap','Seleziona 3 concorrenti'],week:['Colma i gap ad alta pertinenza','Aggiungi prove mancanti','Migliora linking interno'],month:['Monitora nuove citazioni','Aggiorna benchmark'],checklist:['Fonti concorrenti','Entità citate','Prove presenti','Gap prioritizzati','Azioni assegnate','Nuovo confronto']};
 return{impactGeo:3,impactSeo:3,time:'2–6 ore',cost:'Basso',difficulty:'Bassa–media',probability:55,causes:['Il segnale rilevato richiede conferma con più test','La causa non può essere attribuita con certezza a una sola risposta'],today:['Verifica i dati','Definisci la pagina target','Raccogli prove'],week:['Implementa le correzioni','Controlla qualità e coerenza'],month:['Ripeti il test','Confronta l’andamento'],checklist:['Dati verificati','Pagina aggiornata','Controllo qualità','Indicizzazione','Nuovo test']};
}
function stars(n){return '★'.repeat(n)+'☆'.repeat(Math.max(0,5-n))}
function executiveDiagnosis(check,project,prompt,opp){
 const competitors=(check.competitors||[]).length;const sources=(check.urls||[]).length;const m=opp[0]?opportunityMeta(opp[0]):{probability:50};
 let text=check.brandMentioned?`${project.brand} compare nella risposta`:`${project.brand} non compare nella risposta`;
 if(!check.domainCited)text+=', e il dominio ufficiale non viene citato';else text+=', con citazione del dominio ufficiale';
 text+=`. La verifica contiene ${competitors} concorrenti e ${sources} fonti registrate. Il risultato indica un problema da approfondire, non una causa certa.`;
 return `<div class="geo-summary"><div class="card"><div class="section-kicker">Executive summary</div><h2 style="margin:6px 0 8px">Perché il risultato è importante</h2><p>${Utils.esc(text)}</p><p class="help">La priorità è rendere più chiara, verificabile e ripetibile l’associazione tra brand, servizio, località e fonte ufficiale.</p></div><div class="card"><div class="section-kicker">Stima operativa</div><div style="font-size:28px;font-weight:900;margin-top:8px">${m.probability}%</div><div class="help">Probabilità indicativa di miglioramento dopo le azioni P1, non una previsione garantita.</div><div class="estimate-bar"><span style="width:${m.probability}%"></span></div></div></div>`;
}
function renderDiagnosis(o){const m=opportunityMeta(o);return `<div class="implementation-box"><h4>Diagnosi: possibili cause da verificare</h4><div class="diagnosis-grid">${m.causes.map((x,i)=>`<div class="diagnosis-item"><strong>${i+1}. Ipotesi</strong>${Utils.esc(x)}</div>`).join('')}</div><div class="notice warning" style="margin-top:12px">Queste sono ipotesi operative. Non attribuire una causa certa finché non hai confrontato contenuti, fonti e almeno tre test neutrali.</div></div>`}
function renderImpact(o){const m=opportunityMeta(o);return `<div class="impact-grid"><div class="impact-box"><span>Impatto GEO</span><strong title="${m.impactGeo}/5">${stars(m.impactGeo)}</strong></div><div class="impact-box"><span>Impatto SEO</span><strong title="${m.impactSeo}/5">${stars(m.impactSeo)}</strong></div><div class="impact-box"><span>Tempo</span><strong>${Utils.esc(m.time)}</strong></div><div class="impact-box"><span>Costo</span><strong>${Utils.esc(m.cost)}</strong></div><div class="impact-box"><span>Difficoltà</span><strong>${Utils.esc(m.difficulty)}</strong></div></div>`}
function renderChecklist(o){const m=opportunityMeta(o);return `<div class="implementation-box"><h4>Checklist di completamento</h4><div class="checklist">${m.checklist.map(x=>`<div class="check-item">□ ${Utils.esc(x)}</div>`).join('')}</div></div>`}
function renderRoadmap(opp){const today=[],week=[],month=[],later=[];opp.forEach(o=>{const m=opportunityMeta(o);today.push(...m.today.slice(0,2));week.push(...m.week.slice(0,2));month.push(...m.month.slice(0,2));if(o.priority==='P3'||o.priority==='P4')later.push(o.action)});const uniq=a=>Utils.unique(a).slice(0,6);return `<div class="report-section-title"><h2>Roadmap 7 / 30 / 60 / 90 giorni</h2></div><div class="roadmap-grid"><div class="roadmap-card"><h4>Entro 7 giorni</h4><ul>${uniq(today).map(x=>`<li>${Utils.esc(x)}</li>`).join('')}</ul></div><div class="roadmap-card"><h4>Entro 30 giorni</h4><ul>${uniq(week).map(x=>`<li>${Utils.esc(x)}</li>`).join('')}</ul></div><div class="roadmap-card"><h4>Entro 60 giorni</h4><ul>${uniq(month).map(x=>`<li>${Utils.esc(x)}</li>`).join('')}</ul></div><div class="roadmap-card"><h4>Entro 90 giorni</h4><ul>${uniq(later.length?later:['Consolida le fonti migliori','Ripeti il benchmark','Aggiorna il piano in base ai risultati']).map(x=>`<li>${Utils.esc(x)}</li>`).join('')}</ul></div></div>`}
function renderKpis(check,o){return `<div class="implementation-box"><h4>KPI e verifica successiva</h4><div class="kpi-list"><div class="kpi-row"><strong>Prompt da ripetere</strong><span>${Utils.esc(promptBy(check.promptId)?.text||'Prompt eliminato')}</span></div><div class="kpi-row"><strong>Quando</strong><span>Dopo indicizzazione delle modifiche, idealmente tra 14 e 30 giorni.</span></div><div class="kpi-row"><strong>Dove</strong><span>Almeno 3 sessioni neutrali e 2 piattaforme AI.</span></div><div class="kpi-row"><strong>Cosa misurare</strong><span>Presenza brand, dominio citato, posizione, fonti, concorrenti e variazione del GEO Score.</span></div><div class="kpi-row"><strong>Criterio di successo</strong><span>${Utils.esc(o.verify)}</span></div></div><div class="score-path"><span class="score-step">Oggi: ${check.score||0}/100</span><span>→</span><span class="score-step">Dopo P1: stima indicativa</span><span>→</span><span class="score-step">Nuovo test reale</span></div></div>`}
function opportunityImplementationDetails(o,check,project,prompt){
 const target=project.targetUrl||'la pagina target del progetto';
 const title=o.title.toLowerCase();
 let how=[],deliverables=[],example='',avoid=[];
 if(title.includes('brand non compare')){
  how=[`Apri ${target} e verifica che entro le prime 120 parole siano presenti in forma naturale: “${project.brand}”, il servizio cercato, “${project.location||'la località target'}” e una risposta diretta alla domanda.`,`Trasforma la pagina in una risorsa verificabile: aggiungi chi svolge il servizio, per chi, come funziona, area servita, esperienza dimostrabile, casi reali e riferimenti di contatto coerenti.`,`Crea una sezione “Perché scegliere ${project.brand}” usando solo elementi documentabili, con link a case study, recensioni autentiche, profilo autore e pagine di servizio.`,`Rafforza i collegamenti interni: dalla home e dalle pagine correlate usa anchor descrittive che includano servizio e località, evitando testi generici come “clicca qui”.`];
  deliverables=['Pagina target aggiornata','Sezione prove e autore','3–5 link interni pertinenti','Checklist di verifica post-indicizzazione'];
  example=`Esempio di apertura: “${project.brand} offre ${project.services?.[0]||'il servizio principale'} a ${project.location||'livello locale'}, con un processo trasparente e risultati documentabili. In questa pagina trovi servizi, metodo di lavoro, casi reali e contatti.” Adatta il testo ai fatti reali.`;
  avoid=['Non creare classifiche autoreferenziali del tipo “il migliore”.','Non inventare numeri, clienti, recensioni o risultati.','Non ripetere la keyword in modo artificiale.'];
 }else if(title.includes('sito non citato')){
  how=[`Rendi identici nome del brand, dominio, telefono, località e descrizione essenziale su sito e profili esterni.`,`Nella pagina Chi sono/Chi siamo collega chiaramente ${project.brand} a ${project.domain}, ai servizi e alla località.`,`Implementa o correggi schema Person/Organization e sameAs solo con profili ufficiali reali.`,`Cerca citazioni esterne che riportino contemporaneamente nome e dominio ufficiale.`];
  deliverables=['Pagina autore/azienda completa','Schema validato','Profili ufficiali coerenti','Elenco citazioni brand+dominio'];
  example=`La relazione deve risultare inequivocabile: “${project.brand} — sito ufficiale ${project.domain} — ${project.services?.slice(0,2).join(' e ')||'servizi principali'} a ${project.location||'località target'}”.`;
  avoid=['Non aggiungere sameAs verso profili non controllati.','Non usare markup diverso dal contenuto visibile.'];
 }else if(title.includes('concorrenti')){
  how=['Apri le fonti effettivamente citate per i primi tre concorrenti.','Per ogni fonte registra: tipo, argomento, dati concreti, autore, data, segnali locali, recensioni e link.','Crea una tabella gap: presente nei concorrenti / assente sul tuo sito / azione dimostrabile.','Aggiorna prima i gap ad alta pertinenza per il prompt, non tutti i contenuti del sito.'];
  deliverables=['Tabella competitiva','Elenco fonti citate','Gap prioritizzati','Aggiornamenti pagina target'];
  example='Esempio di gap utile: il concorrente è citato da una fonte locale autorevole e mostra casi verificabili; il tuo sito non ha ancora una pagina caso studio collegata alla pagina servizio.';
  avoid=['Non copiare testi o struttura parola per parola.','Non assumere che una fonte sia la causa certa della citazione.'];
 }else if(title.includes('fonti non disponibili')){
  how=['Ripeti lo stesso prompt chiedendo esplicitamente nome, sito e fonti verificabili per ogni risultato.','Copia separatamente risposta completa e URL, senza eliminare le citazioni.','Apri ogni URL e verifica che sostenga realmente il soggetto indicato.','Classifica ogni fonte come ufficiale, editoriale, directory, social o istituzionale.'];
  deliverables=['Risposta completa salvata','Elenco URL validati','Classificazione fonti','Note su pertinenza e qualità'];
  example='Prompt aggiuntivo: “Per ogni risultato indica la fonte precisa e un URL pubblico che confermi servizi e località.”';
  avoid=['Non trattare il sito del soggetto come fonte indipendente.','Non considerare valida una fonte che non supporta l’affermazione.'];
 }else if(title.includes('servizi')){
  how=[`Definisci una pagina principale per ciascun servizio prioritario: ${(project.services||[]).join(', ')||'servizi configurati'}.`,'In ogni pagina inserisci problema, destinatario, processo, deliverable, tempi indicativi, limiti e prova reale.','Collega servizio, case study, FAQ e pagina autore con link contestuali.','Verifica che title, H1 e introduzione usino la stessa terminologia del servizio senza sovra-ottimizzazione.'];
  deliverables=['Mappa servizi→URL','Pagine servizio complete','Link interni contestuali','FAQ basate su domande reali'];
  example='Una pagina servizio efficace risponde subito a: cosa offri, a chi, in quale area, come lavori e quali prove verificabili puoi mostrare.';
  avoid=['Non accorpare servizi diversi in una pagina generica.','Non creare pagine sottili per ogni variante di keyword.'];
 }else if(title.includes('geografico')){
  how=[`Verifica coerenza di località, indirizzo e area servita per ${project.location||'la località target'}.`,'Migliora una pagina locale con contenuto realmente utile: servizi, modalità operative, riferimenti territoriali e prove locali.','Collega Google Business Profile e profili locali al dominio ufficiale.','Cerca menzioni da fonti locali pertinenti, associazioni, partner o media di zona.'];
  deliverables=['Pagina locale migliorata','NAP coerente','Profili locali aggiornati','Elenco citazioni locali'];
  example='La località deve essere parte del contenuto utile, non solo ripetuta nel titolo o nel footer.';
  avoid=['Non creare pagine duplicate cambiando soltanto il nome della città.','Non dichiarare sedi o aree non realmente servite.'];
 }else{
  how=(o.steps||[o.action]);deliverables=['Modifica completata','Prove raccolte','Controllo qualità','Nuovo test neutrale'];example='Applica ogni intervento solo quando è supportato da dati reali e verificabili.';avoid=['Non attribuire causalità certa a una singola risposta AI.'];
 }
 return `<div class="implementation-box"><h4>Come eseguirlo, in pratica</h4><ul>${how.map(x=>`<li>${Utils.esc(x)}</li>`).join('')}</ul>${example?`<div class="notice" style="margin-top:12px"><strong>Esempio pratico:</strong> ${Utils.esc(example)}</div>`:''}<div class="deliverables">${deliverables.map((x,i)=>`<div class="deliverable"><strong>Output ${i+1}</strong><div>${Utils.esc(x)}</div></div>`).join('')}</div>${avoid.length?`<div style="margin-top:12px"><strong>Errori da evitare</strong><ul>${avoid.map(x=>`<li>${Utils.esc(x)}</li>`).join('')}</ul></div>`:''}</div>`
}
function renderReport(projectId){
 const p=projectBy(projectId);if(!p)return empty('Seleziona un progetto','Il report verrà generato dai dati salvati.');
 const checks=reportAvailableChecks(projectId,reportRangeChoice).filter(c=>reportSelectedCheckIds.has(c.id));
 const check=checks[0];
 if(!check)return `<div class="card">${empty('Seleziona una ricerca','Usa il menu a tendina sopra. Il report mostrerà soltanto la verifica scelta.')}</div>`;
 const prompt=promptBy(check.promptId);const avg=check.score||0;const brandRate=check.brandMentioned?100:0;const domainRate=check.domainCited?100:0;
 const opp=reportAvailableOpportunities(projectId,[check.id]).filter(o=>reportSelectedOpportunityIds.has(o.id));
 return `<div class="card"><div class="flex wrap gap-8">${state.settings.logo?`<img src="${state.settings.logo}" alt="Logo" style="max-height:60px;max-width:180px">`:''}<div><h1 style="margin:0">Report GEO — ${Utils.esc(p.name)}</h1><div class="muted">${Utils.esc(state.settings.agency||state.settings.consultant||'GEO Citation Monitor')} · ${Utils.date(new Date())}</div><div class="help">Report dedicato a una sola ricerca. Nessun dato di altre verifiche è incluso.</div></div></div>
 <div class="report-context"><strong>Ricerca analizzata</strong><div style="font-size:18px;margin-top:6px">${Utils.esc(prompt?.text||'Prompt eliminato')}</div><div class="help" style="margin-top:6px">${Utils.esc(platformBy(check.platformId).name)} · ${Utils.date(check.date,true)} · Ambiente: ${Utils.esc(environmentMeta(check.testEnvironment||'not-verified').label)}</div></div>
 <div class="grid grid-4" style="margin-top:18px">${metric('Verifiche incluse','1','')}${metric('GEO Score',avg+'/100','')}${metric('Presenza brand',brandRate+'%','')}${metric('Dominio citato',domainRate+'%','')}</div>
 ${executiveDiagnosis(check,p,prompt,opp)}
 <div class="report-section-title"><h2>Risultato della ricerca selezionata</h2></div>${resultsTable([check],false)}
 <div class="report-section-title"><h2>Diagnosi e piano operativo</h2></div>${opp.length?opp.map((o,index)=>{const pd=priorityDetails(o.priority);return `<div class="opportunity priority-${o.priority}"><div class="flex wrap gap-8">${badge(o.priority,o.priority==='P1'?'danger':o.priority==='P2'?'warning':'info')}<strong>${index+1}. ${Utils.esc(o.title)}</strong></div><p><strong>Priorità:</strong> ${Utils.esc(pd.label)} — ${Utils.esc(pd.when)}. Impegno stimato: ${Utils.esc(pd.effort)}.</p>${renderImpact(o)}${renderDiagnosis(o)}<p><strong>Problema rilevato:</strong> ${Utils.esc(o.why)}</p><p><strong>Obiettivo:</strong> ${Utils.esc(o.expectedOutcome||o.action)}</p><p><strong>Azione principale:</strong> ${Utils.esc(o.action)}</p><div class="action-plan"><strong>Step operativi essenziali</strong><ol>${(o.steps||[o.action]).map(step=>`<li>${Utils.esc(step)}</li>`).join('')}</ol></div>${opportunityImplementationDetails(o,check,p,prompt)}${renderChecklist(o)}${renderKpis(check,o)}</div>`}).join(''):'<div class="report-empty-note">Nessuna opportunità selezionata per questa ricerca.</div>'}
 ${opp.length?renderRoadmap(opp):''}
 <div class="report-section-title"><h2>Ordine consigliato</h2></div><p>Completa prima le attività P1, verifica che siano realmente online e attendi l’indicizzazione. Ripeti poi lo stesso prompt, nello stesso formato, in sessioni neutrali. Passa alle P2 solo dopo aver confrontato i nuovi risultati con questa verifica iniziale.</p>
 <div class="report-section-title"><h2>Metodologia e limiti</h2></div><p>Il GEO Visibility Score è una metrica proprietaria. Una singola risposta non dimostra una visibilità stabile. Modello, sessione, account, località, data e ricerca web possono cambiare il risultato; per questo ogni miglioramento deve essere verificato con test ripetuti e neutrali. Le percentuali e gli impatti mostrati nel piano sono stime operative, non garanzie.</p><footer>${Utils.esc(state.settings.footer||'')}</footer></div>`
}

 if(t.dataset.startProject){state.checkDraft={...state.checkDraft,projectId:t.dataset.startProject,wizardStep:1};saveState(true);setSection('new-check')}

 if(t.dataset.deletePrompt)deleteConfirm('Eliminare il prompt e le verifiche collegate?',()=>{const id=t.dataset.deletePrompt;state.prompts=state.prompts.filter(x=>x.id!==id);state.checks=state.checks.filter(x=>x.promptId!==id);saveState();renderPrompts()});
 if(t.dataset.startPrompt){const p=promptBy(t.dataset.startPrompt);state.checkDraft={projectId:p.projectId,promptId:p.id,wizardStep:1};saveState(true);setSection('new-check')}
 if(t.dataset.copyText)copyText(t.dataset.copyText);
 if(t.dataset.action==='bulk-prompts'){modal('Importa più prompt',`<form id="bulkPromptForm" class="form-grid"><div class="field"><label>Progetto</label><select name="projectId" required><option value="">Seleziona</option>${options(state.projects,'')}</select></div><div class="field"><label>Priorità</label><select name="priority"><option>P1</option><option>P2</option><option selected>P3</option><option>P4</option></select></div>${textareaField('texts','Prompt, uno per riga','','',10)}</form>`,'<button class="btn" data-close-modal>Annulla</button><button class="btn btn-primary" id="saveBulkPrompts">Importa</button>');document.getElementById('saveBulkPrompts').onclick=()=>{const f=document.getElementById('bulkPromptForm');if(!f.reportValidity())return;const d=Utils.form(f);Utils.lines(d.texts).forEach(text=>state.prompts.push({id:Utils.uid(),projectId:d.projectId,text,category:'Locale',priority:d.priority,tags:[],createdAt:Utils.now(),updatedAt:Utils.now()}));saveState();closeModal();renderPrompts()}}
 if(t.dataset.wizardStep)showWizardStep(t.dataset.wizardStep);

 if(t.dataset.action==='prepare-quick-check')prepareQuickCheck();
 if(t.dataset.action==='neutral-test-instructions')neutralTestInstructions();
 if(t.dataset.action==='clear-draft')deleteConfirm('Svuotare tutti i campi della bozza?',()=>{state.checkDraft={};analysisDraft=null;saveState(true);renderNewCheck()});
 if(t.dataset.action==='preview-clean')previewClean();if(t.dataset.action==='analyze-check')runAnalysis();if(t.dataset.action==='analyze-and-open'){runAnalysis();if(analysisDraft)showWizardStep(3)};

 if(t.dataset.duplicateCheck){const c=state.checks.find(x=>x.id===t.dataset.duplicateCheck);state.checkDraft={projectId:c.projectId,promptId:c.promptId,platformId:c.platformId,model:c.model,location:c.location,sessionType:c.sessionType,testEnvironment:c.testEnvironment||'not-verified',relevance:c.relevance,reliability:c.reliability,wizardStep:1,response:'',sources:'',notes:''};saveState(true);setSection('new-check')}
 if(t.dataset.reportCheck){const c=state.checks.find(x=>x.id===t.dataset.reportCheck);if(!c){Utils.toast('Verifica non trovata.','error');return}reportProjectChoice=c.projectId;reportRangeChoice='all';reportSelectedCheckIds=new Set([c.id]);reportSelectedOpportunityIds=new Set(reportAvailableOpportunities(c.projectId,[c.id]).map(o=>o.id));setSection('reports')}

 if(t.dataset.action==='save-score-settings'){const f=document.getElementById('scoreSettings');const vals=Object.fromEntries(['brand','domain','position','mentions','competitors','sentiment'].map(k=>[k,Number(f[k].value)]));if(Object.values(vals).reduce((a,b)=>a+b,0)!==100){Utils.toast('Il totale dei pesi deve essere 100%.','error');return}state.settings.scoreWeights=vals;state.checks.forEach(c=>c.score=Analyzer.score(c));saveState();renderSettings()}
 if(t.dataset.action==='new-platform'){modal('Nuova piattaforma',platformForm(),'<button class="btn" data-close-modal>Annulla</button><button class="btn btn-primary" id="savePlatform">Salva</button>');document.getElementById('savePlatform').onclick=savePlatform}
 if(t.dataset.editPlatform){modal('Modifica piattaforma',platformForm(platformBy(t.dataset.editPlatform)),'<button class="btn" data-close-modal>Annulla</button><button class="btn btn-primary" id="savePlatform">Salva</button>');document.getElementById('savePlatform').onclick=savePlatform}
 if(t.dataset.action==='save-branding')saveBranding();
 if(t.dataset.action==='export-json')Utils.download(`geo-citation-monitor-${new Date().toISOString().slice(0,10)}.json`,JSON.stringify(state,null,2),'application/json');if(t.dataset.action==='import-json')document.getElementById('jsonImport').click();
 if(t.dataset.action==='clear-all')deleteConfirm('Cancellare definitivamente tutti i dati locali?',()=>{state=defaultState();localStorage.removeItem(APP_KEY);saveState(true);renderDashboard()});
}
function savePlatform(){const form=document.getElementById('platformForm');if(!form.reportValidity())return;const d=Utils.form(form);const item={id:d.id||Utils.uid(),name:d.name,url:d.url,active:form.active.checked};const old=state.platforms.find(x=>x.id===item.id);old?Object.assign(old,item):state.platforms.push(item);saveState();closeModal();document.getElementById('settingsPanel').innerHTML=settingsPlatforms()}
function saveBranding(){const form=document.getElementById('brandingSettings');const d=Utils.form(form);Object.assign(state.settings,d);const file=document.getElementById('logoInput').files[0];if(file){if(file.size>350000){Utils.toast('Logo troppo grande. Usa un file inferiore a 350 KB.','error');return}const reader=new FileReader();reader.onload=()=>{state.settings.logo=reader.result;saveState();applyTheme();document.getElementById('settingsPanel').innerHTML=settingsBranding()};reader.readAsDataURL(file)}else{saveState();applyTheme()}}

/* ------------------------------ Change handlers ------------------------------ */
function handleChange(event){const t=event.target;if(t.closest('#checkForm'))saveDraft();
 if(t.id==='checkProject'){const p=projectBy(t.value);const select=document.getElementById('checkPrompt');select.innerHTML='<option value="">Seleziona</option>'+options(state.prompts.filter(x=>x.projectId===t.value),'',x=>x.text);document.getElementById('location').value=p?.location||'';document.getElementById('selectedPromptBox').innerHTML='Seleziona un prompt.';saveDraft()}
 if(t.id==='quickProject'){const main=document.getElementById('checkProject');if(main){main.value=t.value;main.dispatchEvent(new Event('change',{bubbles:true}))}}
 if(t.id==='quickKeyword'||t.id==='quickPromptStyle'){const kw=document.getElementById('quickKeyword')?.value||'';const pid=document.getElementById('quickProject')?.value||'';const preview=document.getElementById('quickPromptPreview');if(preview&&kw.trim()){preview.textContent=buildQuickPrompt(kw,document.getElementById('quickPromptStyle')?.value||'sources',projectBy(pid));preview.classList.remove('hidden')}else preview?.classList.add('hidden')}
 if(t.id==='checkPrompt')document.getElementById('selectedPromptBox').innerHTML=`<strong>Prompt:</strong> ${Utils.esc(promptBy(t.value)?.text||'')}`;
 if(t.id==='testEnvironment'){const em=environmentMeta(t.value);const box=document.getElementById('environmentNotice');if(box){box.className=`notice ${em.type} environment-warning`;box.innerHTML=`<strong>${Utils.esc(em.label)}</strong><br>${Utils.esc(em.message)}`}}
 if(['projectSearch','projectFilter'].includes(t.id)){const q=Utils.slug(document.getElementById('projectSearch').value);const f=document.getElementById('projectFilter').value;document.querySelectorAll('#projectList .project-card').forEach(x=>x.style.display=(!q||x.dataset.search.includes(q))&&(f==='all'||(f==='active'&&x.dataset.archived==='no')||(f==='archived'&&x.dataset.archived==='yes'))?'':'none')}
 if(['promptSearch','promptProjectFilter','promptPriorityFilter'].includes(t.id)){const q=Utils.slug(document.getElementById('promptSearch').value);const p=document.getElementById('promptProjectFilter').value;const pr=document.getElementById('promptPriorityFilter').value;document.querySelectorAll('#promptTable tbody tr').forEach(x=>x.style.display=(!q||x.dataset.search.includes(q))&&(!p||x.dataset.project===p)&&(!pr||x.dataset.priority===pr)?'':'none')}
 if(['resultSearch','resultProjectFilter','resultPlatformFilter','resultMentionFilter'].includes(t.id))applyResultFilters();
 if(t.id==='savedFilter'&&t.value){const f=state.savedFilters.find(x=>x.id===t.value);if(f){document.getElementById('resultSearch').value=f.search;document.getElementById('resultProjectFilter').value=f.project;document.getElementById('resultPlatformFilter').value=f.platform;document.getElementById('resultMentionFilter').value=f.mention;applyResultFilters()}}
 if(t.classList.contains('result-select')){t.checked?selectedResultIds.add(t.value):selectedResultIds.delete(t.value);updateSelectedCount()}
 if(t.classList.contains('opp-select')){t.checked?selectedOpportunityIds.add(t.value):selectedOpportunityIds.delete(t.value);t.closest('.opportunity')?.classList.toggle('selected',t.checked);const n=document.getElementById('selectedOpportunityCount');if(n)n.textContent=selectedOpportunityIds.size}
 if(t.classList.contains('report-opp-select')){t.checked?reportSelectedOpportunityIds.add(t.value):reportSelectedOpportunityIds.delete(t.value);document.getElementById('reportContent').innerHTML=renderReport(reportProjectChoice)}
 if(t.id==='selectAllResults'){document.querySelectorAll('.result-select').forEach(x=>{x.checked=t.checked;t.checked?selectedResultIds.add(x.value):selectedResultIds.delete(x.value)});updateSelectedCount()}
 if(t.id==='matrixProject')renderMatrix();if(t.id==='compareProject')renderCompare();
 if(['oppProject','oppPriority','oppStatus'].includes(t.id)){const p=document.getElementById('oppProject').value,pr=document.getElementById('oppPriority').value,s=document.getElementById('oppStatus').value;document.querySelectorAll('#opportunityList .opportunity').forEach(x=>x.style.display=(!p||x.dataset.project===p)&&(!pr||x.dataset.priority===pr)&&(!s||x.dataset.status===s)?'':'none')}
 if(t.dataset.oppStatus){const o=state.opportunities.find(x=>x.id===t.dataset.oppStatus);if(o){o.status=t.value;saveState(true);t.closest('.opportunity').dataset.status=t.value}}
 if(['qualityPriority','qualityKind'].includes(t.id)){const p=document.getElementById('qualityPriority').value,k=document.getElementById('qualityKind').value;document.querySelectorAll('#qualityList .quality-item').forEach(x=>x.style.display=(!p||x.dataset.qualityPriority===p)&&(!k||x.dataset.qualityKind===k)?'':'none')}
 if(t.id==='generatorProject'||t.id==='generatorCheck')renderGenerator();if(t.id==='reportProject'){reportProjectChoice=t.value;resetReportSelections(reportProjectChoice,reportRangeChoice);renderReports()}if(t.id==='reportRange'){reportRangeChoice=t.value;resetReportSelections(reportProjectChoice,reportRangeChoice);renderReports()}if(t.id==='reportCheck'){reportSelectedCheckIds=new Set(t.value?[t.value]:[]);reportSelectedOpportunityIds=new Set(reportAvailableOpportunities(reportProjectChoice,t.value?[t.value]:[]).map(o=>o.id));renderReports()};
 if(t.dataset.togglePlatform){const p=platformBy(t.dataset.togglePlatform);p.active=t.checked;saveState(true)}
 if(t.closest('#scoreSettings')){const total=[...document.querySelectorAll('#scoreSettings input')].reduce((s,x)=>s+Number(x.value||0),0);document.getElementById('weightTotal').textContent='Totale: '+total+'%'}
}
function settingsTabs(event){const b=event.target.closest('[data-settings-tab]');if(!b)return;document.querySelectorAll('[data-settings-tab]').forEach(x=>x.classList.toggle('active',x===b));document.getElementById('settingsPanel').innerHTML=b.dataset.settingsTab==='analysis'?settingsAnalysis():b.dataset.settingsTab==='score'?settingsScore():b.dataset.settingsTab==='platforms'?settingsPlatforms():settingsBranding()}
function importJson(file){const reader=new FileReader();reader.onload=()=>{try{const parsed=JSON.parse(reader.result);if(!Array.isArray(parsed.projects)||!Array.isArray(parsed.prompts)||!Array.isArray(parsed.checks))throw new Error('Struttura non valida');modal('Importa backup','<div class="notice warning">Scegli se unire i dati o sostituire tutto.</div>','<button class="btn" data-close-modal>Annulla</button><button class="btn" id="mergeImport">Unisci</button><button class="btn btn-primary" id="replaceImport">Sostituisci</button>');document.getElementById('replaceImport').onclick=()=>{state=migrate(parsed);saveState();closeModal();render(currentSection)};document.getElementById('mergeImport').onclick=()=>{for(const key of ['projects','prompts','checks','opportunities','savedFilters']){const ids=new Set(state[key].map(x=>x.id));(parsed[key]||[]).forEach(x=>{if(!ids.has(x.id))state[key].push(x)})}saveState();closeModal();render(currentSection)}}catch(error){Utils.toast('File JSON non valido o incompatibile.','error')}};reader.readAsText(file)}
function globalSearch(query){const q=Utils.slug(query);if(!q)return;const matches=[];state.projects.filter(x=>Utils.slug(JSON.stringify(x)).includes(q)).slice(0,5).forEach(x=>matches.push({type:'Progetto',label:x.name,action:()=>setSection('projects')}));state.prompts.filter(x=>Utils.slug(x.text).includes(q)).slice(0,8).forEach(x=>matches.push({type:'Prompt',label:x.text,action:()=>setSection('prompts')}));state.checks.filter(x=>Utils.slug(x.response).includes(q)).slice(0,8).forEach(x=>matches.push({type:'Risultato',label:promptBy(x.promptId)?.text||'',action:()=>viewCheck(x.id)}));modal('Risultati ricerca',matches.length?matches.map((m,i)=>`<button class="btn btn-block" id="globalResult${i}" style="justify-content:flex-start;margin-bottom:8px">${badge(m.type)} ${Utils.esc(m.label)}</button>`).join(''):empty('Nessun risultato','Prova con un termine differente.'));matches.forEach((m,i)=>document.getElementById('globalResult'+i).onclick=()=>{closeModal();m.action()})}
function bind(){document.addEventListener('click',eventActions);document.addEventListener('change',handleChange);document.addEventListener('input',Utils.debounce(handleChange,180));document.addEventListener('click',settingsTabs);document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>setSection(b.dataset.section)));document.getElementById('modalClose').onclick=closeModal;document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});document.getElementById('menuToggle').onclick=()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show')};document.getElementById('mobileOverlay').onclick=closeMobile;document.getElementById('themeToggle').onclick=()=>{state.settings.theme=state.settings.theme==='dark'?'light':state.settings.theme==='light'?'auto':'dark';saveState(true);applyTheme();render(currentSection)};document.getElementById('globalSearch').addEventListener('keydown',e=>{if(e.key==='Enter')globalSearch(e.target.value)});document.getElementById('jsonImport').onchange=e=>{if(e.target.files[0])importJson(e.target.files[0]);e.target.value=''}}
applyTheme();bind();renderDashboard();
})();
</script>
</body>
