<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <title>GEO Citation Monitor</title>
  <style>
    :root{
      --bg:#f4f7fb;--surface:#fff;--surface-2:#f8fafc;--surface-3:#eef3f8;
      --text:#142033;--muted:#64748b;--border:#dce4ee;--accent:#2853d7;--accent-2:#173ba8;
      --success:#138a5b;--warning:#b26700;--danger:#c93644;--info:#0b73b7;
      --shadow:0 12px 35px rgba(21,37,66,.09);--radius:16px;--radius-sm:10px;
      --sidebar:268px;--font:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    [data-theme="dark"]{
      --bg:#0b1220;--surface:#111c2e;--surface-2:#152238;--surface-3:#1c2c45;
      --text:#eaf0f8;--muted:#9fb0c7;--border:#263a57;--accent:#7ea1ff;--accent-2:#9bb6ff;
      --success:#4fd29b;--warning:#f3b65f;--danger:#ff7785;--info:#61b7ee;
      --shadow:0 16px 38px rgba(0,0,0,.24);
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.45}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    a{color:var(--accent)}
    .app{min-height:100vh;display:grid;grid-template-columns:var(--sidebar) minmax(0,1fr)}
    .sidebar{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,#132554 0%,#0d1938 100%);color:#fff;padding:18px 14px;display:flex;flex-direction:column;z-index:20;overflow-y:auto}
    .brand{display:flex;align-items:center;gap:12px;padding:7px 8px 20px}
    .brand-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#88a7ff,#fff);color:#102250;display:grid;place-items:center;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.18)}
    .brand-name{font-weight:800;font-size:16px;letter-spacing:.1px}.brand-sub{font-size:11px;color:#b9c7e7;margin-top:2px}
    .nav-group{margin:7px 0 13px}.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#8da1d2;padding:0 11px 7px}
    .nav-item{width:100%;display:flex;align-items:center;gap:11px;background:transparent;border:0;color:#cbd7f3;padding:10px 11px;border-radius:10px;text-align:left;margin:2px 0;transition:.18s ease}
    .nav-item:hover{background:rgba(255,255,255,.08);color:#fff}.nav-item.active{background:#fff;color:#132554;box-shadow:0 8px 24px rgba(0,0,0,.15)}
    .nav-item svg{width:18px;height:18px;flex:0 0 18px}.nav-item span{white-space:nowrap}
    .sidebar-footer{margin-top:auto;padding:13px 9px 5px;color:#9fb0db;font-size:11px;border-top:1px solid rgba(255,255,255,.1)}
    .main{min-width:0}.topbar{position:sticky;top:0;z-index:15;height:72px;background:color-mix(in srgb,var(--surface) 94%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 26px}
    .menu-toggle{display:none!important}.page-title{font-size:19px;font-weight:800}.page-subtitle{color:var(--muted);font-size:12px;margin-top:2px}
    .topbar-spacer{flex:1}.global-search{position:relative;width:min(360px,34vw)}.global-search input{width:100%;padding:10px 12px 10px 37px;border:1px solid var(--border);border-radius:11px;background:var(--surface-2);color:var(--text)}
    .global-search svg{position:absolute;left:12px;top:11px;width:17px;color:var(--muted)}
    .icon-btn{width:40px;height:40px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text);display:grid;place-items:center}.icon-btn:hover{background:var(--surface-2)}
    .content{padding:26px;max-width:1600px;margin:auto}.section{display:none}.section.active{display:block}
    .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 18px}.toolbar .spacer{flex:1}.toolbar input,.toolbar select{min-height:39px}
    .btn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:9px 13px;border-radius:10px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.15s ease;min-height:39px}
    .btn:hover{transform:translateY(-1px);box-shadow:0 5px 16px rgba(20,32,51,.08)}.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-2)}
    .btn-danger{color:var(--danger)}.btn-ghost{background:transparent;border-color:transparent}.btn-sm{font-size:12px;padding:6px 9px;min-height:32px}.btn-block{width:100%}
    .grid{display:grid;gap:16px}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px}.card-flat{box-shadow:none}.card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:15px}.card-title{font-size:15px;font-weight:800}.card-sub{font-size:12px;color:var(--muted);margin-top:3px}.card-header .spacer{flex:1}
    .metric{position:relative;overflow:hidden;min-height:126px}.metric:after{content:"";position:absolute;width:74px;height:74px;border-radius:50%;right:-22px;top:-23px;background:color-mix(in srgb,var(--accent) 12%,transparent)}
    .metric-label{font-size:12px;color:var(--muted);font-weight:700}.metric-value{font-size:30px;font-weight:900;margin-top:10px;letter-spacing:-.03em}.metric-change{font-size:12px;margin-top:7px}.up{color:var(--success)}.down{color:var(--danger)}.neutral{color:var(--muted)}
    .chart-wrap{height:265px;position:relative}.chart-wrap canvas{width:100%;height:100%}.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted)}.legend i{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);margin-right:5px}
    .table-wrap{overflow:auto;border:1px solid var(--border);border-radius:14px;background:var(--surface)}table{border-collapse:collapse;width:100%;min-width:820px}th,td{padding:12px 13px;text-align:left;border-bottom:1px solid var(--border);vertical-align:top}th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);background:var(--surface-2);position:sticky;top:0;z-index:1}tbody tr:hover{background:var(--surface-2)}tbody tr:last-child td{border-bottom:0}
    .badge{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800;background:var(--surface-3);color:var(--muted);white-space:nowrap}.badge.success{background:color-mix(in srgb,var(--success) 14%,transparent);color:var(--success)}.badge.danger{background:color-mix(in srgb,var(--danger) 14%,transparent);color:var(--danger)}.badge.warning{background:color-mix(in srgb,var(--warning) 15%,transparent);color:var(--warning)}.badge.info{background:color-mix(in srgb,var(--info) 15%,transparent);color:var(--info)}
    .score-ring{--score:0;width:56px;height:56px;border-radius:50%;background:conic-gradient(var(--accent) calc(var(--score)*1%),var(--surface-3) 0);display:grid;place-items:center;position:relative;font-weight:900}.score-ring:before{content:"";position:absolute;inset:6px;background:var(--surface);border-radius:50%}.score-ring span{position:relative;font-size:13px}
    .form-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.field{display:flex;flex-direction:column;gap:6px}.field.full{grid-column:1/-1}.field label{font-size:12px;font-weight:800;color:var(--muted)}input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text);padding:10px 11px;outline:none}textarea{min-height:105px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 14%,transparent)}
    .help{font-size:11px;color:var(--muted)}.error-text{color:var(--danger);font-size:11px}.empty{padding:42px 20px;text-align:center;color:var(--muted)}.empty strong{display:block;color:var(--text);font-size:16px;margin-bottom:5px}
    .project-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.project-card{padding:17px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow)}.project-card h3{font-size:16px;margin:0}.project-domain{font-size:12px;color:var(--accent);margin:4px 0 13px;word-break:break-all}.project-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.project-meta div{background:var(--surface-2);border-radius:9px;padding:9px}.project-meta small{display:block;color:var(--muted);font-size:10px}.project-meta strong{font-size:13px}.card-actions{display:flex;gap:7px;justify-content:flex-end;margin-top:13px;padding-top:13px;border-top:1px solid var(--border)}
    .check-layout{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(350px,.9fr);gap:18px}.sticky-card{position:sticky;top:92px;align-self:start}.platform-grid{display:flex;gap:8px;flex-wrap:wrap}.platform-option input{display:none}.platform-option span{display:flex;align-items:center;gap:7px;padding:8px 10px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2);font-size:12px;font-weight:700}.platform-option input:checked+span{border-color:var(--accent);background:color-mix(in srgb,var(--accent) 10%,var(--surface));color:var(--accent)}
    .analysis-box{background:var(--surface-2);border:1px dashed var(--border);border-radius:12px;padding:13px;margin-top:14px}.analysis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}.analysis-item{padding:9px;background:var(--surface);border-radius:9px}.analysis-item small{display:block;color:var(--muted);font-size:10px}.analysis-item strong{font-size:13px}
    .source-list,.competitor-list{display:flex;flex-wrap:wrap;gap:6px}.source-chip{max-width:100%;overflow:hidden;text-overflow:ellipsis}.priority-P1{border-left:4px solid var(--danger)}.priority-P2{border-left:4px solid var(--warning)}.priority-P3{border-left:4px solid var(--info)}.priority-P4{border-left:4px solid var(--muted)}
    .opportunity{background:var(--surface);border:1px solid var(--border);border-radius:13px;padding:15px;margin-bottom:10px}.opportunity-top{display:flex;align-items:flex-start;gap:10px}.opportunity-title{font-weight:800}.opportunity-desc{font-size:13px;color:var(--muted);margin-top:4px}.opportunity .spacer{flex:1}
    .prompt-output{white-space:pre-wrap;background:#0c1528;color:#e8efff;border-radius:13px;padding:17px;min-height:280px;max-height:520px;overflow:auto;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;line-height:1.55}
    .report-head{padding:26px;background:linear-gradient(135deg,#12285b,#2853d7);color:#fff;border-radius:16px;margin-bottom:17px}.report-logo{max-height:52px;max-width:180px;margin-bottom:12px}.report-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}.report-kpi{background:rgba(255,255,255,.11);padding:12px;border-radius:11px}.report-kpi small{display:block;color:#c8d6fb}.report-kpi strong{font-size:22px}
    .tabs{display:flex;gap:5px;border-bottom:1px solid var(--border);margin-bottom:15px;overflow:auto}.tab{border:0;background:transparent;color:var(--muted);font-weight:800;padding:10px 12px;border-bottom:2px solid transparent;white-space:nowrap}.tab.active{color:var(--accent);border-color:var(--accent)}
    .modal-backdrop{position:fixed;inset:0;background:rgba(5,12,25,.56);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}.modal-backdrop.open{display:flex}.modal{width:min(780px,100%);max-height:92vh;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:0 25px 90px rgba(0,0,0,.32)}.modal-head{display:flex;align-items:center;padding:17px 19px;border-bottom:1px solid var(--border)}.modal-title{font-weight:900;font-size:17px}.modal-body{padding:19px}.modal-actions{display:flex;justify-content:flex-end;gap:9px;padding:14px 19px;border-top:1px solid var(--border);position:sticky;bottom:0;background:var(--surface)}
    .toast-zone{position:fixed;right:18px;bottom:18px;z-index:200;display:grid;gap:8px}.toast{min-width:260px;max-width:390px;background:var(--surface);border:1px solid var(--border);border-left:4px solid var(--accent);box-shadow:var(--shadow);padding:12px 14px;border-radius:11px;animation:slideIn .2s ease}.toast.error{border-left-color:var(--danger)}.toast.success{border-left-color:var(--success)}@keyframes slideIn{from{transform:translateY(10px);opacity:0}to{transform:none;opacity:1}}
    .notice{padding:12px 14px;border-radius:11px;background:color-mix(in srgb,var(--info) 10%,var(--surface));border:1px solid color-mix(in srgb,var(--info) 28%,var(--border));font-size:12px;color:var(--text);margin-bottom:14px}.notice.warning{background:color-mix(in srgb,var(--warning) 10%,var(--surface));border-color:color-mix(in srgb,var(--warning) 28%,var(--border))}
    .dropzone{border:2px dashed var(--border);border-radius:13px;padding:25px;text-align:center;color:var(--muted);background:var(--surface-2)}
    .storage-bar{height:9px;background:var(--surface-3);border-radius:999px;overflow:hidden}.storage-bar span{display:block;height:100%;background:var(--accent);border-radius:999px}
    .mobile-overlay{display:none}
    @media(max-width:1180px){.grid-4{grid-template-columns:repeat(2,1fr)}.project-list{grid-template-columns:repeat(2,1fr)}.grid-3{grid-template-columns:repeat(2,1fr)}.check-layout{grid-template-columns:1fr}.sticky-card{position:static}.report-kpis{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:780px){:root{--sidebar:280px}.app{display:block}.sidebar{position:fixed;left:-290px;transition:.2s ease}.sidebar.open{left:0}.mobile-overlay.show{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:19}.menu-toggle{display:grid!important}.topbar{padding:0 14px}.global-search{display:none}.content{padding:16px}.grid-4,.grid-3,.grid-2,.project-list,.form-grid{grid-template-columns:1fr}.field.full{grid-column:auto}.analysis-grid{grid-template-columns:1fr 1fr}.page-subtitle{display:none}.report-kpis{grid-template-columns:1fr 1fr}.toolbar>.spacer{display:none}.toolbar .btn{flex:1}.card{padding:15px}}
    @media print{body{background:#fff;color:#111}.sidebar,.topbar,.no-print,.toast-zone,.modal-backdrop{display:none!important}.app{display:block}.content{padding:0;max-width:none}.section{display:none!important}#reports.section{display:block!important}.card{box-shadow:none;border-color:#ddd;break-inside:avoid}.report-head{print-color-adjust:exact;-webkit-print-color-adjust:exact}.table-wrap{overflow:visible}.table-wrap table{min-width:0;font-size:10px}}
  </style>
</head>
<body>
<div class="mobile-overlay" id="mobileOverlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><div class="brand-mark">G</div><div><div class="brand-name">GEO Citation Monitor</div><div class="brand-sub">Standalone · Dati locali</div></div></div>
    <div class="nav-group"><div class="nav-label">Panoramica</div>
      <button class="nav-item active" data-section="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span>Dashboard</span></button>
      <button class="nav-item" data-section="projects"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7h7l2 2h9v10H3z"/><path d="M3 7V5h7l2 2"/></svg><span>Progetti</span></button>
      <button class="nav-item" data-section="prompts"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v12H8l-4 4z"/><path d="M8 8h8M8 12h5"/></svg><span>Prompt</span></button>
    </div>
    <div class="nav-group"><div class="nav-label">Monitoraggio</div>
      <button class="nav-item" data-section="new-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M7 12h10"/></svg><span>Nuova verifica</span></button>
      <button class="nav-item" data-section="results"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19V9M10 19V5M16 19v-7M22 19H2"/></svg><span>Risultati</span></button>
      <button class="nav-item" data-section="compare"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 4H4v16h4M16 4h4v16h-4M9 8h6M9 12h6M9 16h6"/></svg><span>Confronto AI</span></button>
      <button class="nav-item" data-section="opportunities"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4"/><path d="M8 14c-1.2-1-2-2.6-2-4.4a6 6 0 1 1 12 0c0 1.8-.8 3.4-2 4.4-.7.6-1 1.2-1 2H9c0-.8-.3-1.4-1-2z"/></svg><span>Opportunità GEO</span></button>
    </div>
    <div class="nav-group"><div class="nav-label">Produzione</div>
      <button class="nav-item" data-section="generator"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.4 4.1L17.5 8.5l-4.1 1.4L12 14l-1.4-4.1-4.1-1.4 4.1-1.4z"/><path d="M18 14l.8 2.2L21 17l-2.2.8L18 20l-.8-2.2L15 17l2.2-.8z"/></svg><span>Generatore prompt</span></button>
      <button class="nav-item" data-section="reports"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h9l5 5v15H6z"/><path d="M14 2v6h6M9 13h8M9 17h8"/></svg><span>Report</span></button>
    </div>
    <div class="nav-group"><div class="nav-label">Sistema</div>
      <button class="nav-item" data-section="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6v.2h-4V21a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H2.8v-4H3a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1L7 4.2l.1.1A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-1.6v-.2h4V3a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.2v4H21a1.7 1.7 0 0 0-1.6 1z"/></svg><span>Impostazioni</span></button>
      <button class="nav-item" data-section="backup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M8 11l4 4 4-4"/><path d="M4 19h16"/></svg><span>Backup e ripristino</span></button>
      <button class="nav-item" data-section="guide"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M9.5 9a2.7 2.7 0 1 1 4.4 2.1c-1 .8-1.9 1.2-1.9 2.9M12 18h.01"/></svg><span>Guida</span></button>
    </div>
    <div class="sidebar-footer">Versione 1.0.0<br>I dati restano nel browser.</div>
  </aside>
  <main class="main">
    <header class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Apri menu"><svg width="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg></button>
      <div><div class="page-title" id="pageTitle">Dashboard</div><div class="page-subtitle" id="pageSubtitle">Panoramica della visibilità GEO</div></div>
      <div class="topbar-spacer"></div>
      <div class="global-search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg><input id="globalSearch" placeholder="Cerca progetti, prompt, risposte…" aria-label="Ricerca globale"></div>
      <button class="icon-btn" id="themeToggle" aria-label="Cambia tema"><span id="themeIcon">◐</span></button>
    </header>
    <div class="content">
      <section class="section active" id="dashboard"></section>
      <section class="section" id="projects"></section>
      <section class="section" id="prompts"></section>
      <section class="section" id="new-check"></section>
      <section class="section" id="results"></section>
      <section class="section" id="compare"></section>
      <section class="section" id="opportunities"></section>
      <section class="section" id="generator"></section>
      <section class="section" id="reports"></section>
      <section class="section" id="settings"></section>
      <section class="section" id="backup"></section>
      <section class="section" id="guide"></section>
    </div>
  </main>
</div>
<div class="modal-backdrop" id="modalBackdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle"><div class="modal"><div class="modal-head"><div class="modal-title" id="modalTitle"></div><div style="flex:1"></div><button class="icon-btn" id="modalClose" aria-label="Chiudi">×</button></div><div class="modal-body" id="modalBody"></div><div class="modal-actions" id="modalActions"></div></div></div>
<div class="toast-zone" id="toastZone" aria-live="polite"></div>
<input type="file" id="jsonImport" accept="application/json,.json" hidden>
<script>
(()=>{'use strict';
const APP_KEY='geoCitationMonitor_v1';
const VERSION='1.0.0';

function analyzeText(project,response,sourcesText=''){
 const txt=response||'';const low=txt.toLowerCase();const variants=[project.brand,...(project.brandVariants||[])].filter(Boolean);let mentions=0,first=Infinity,foundVariant='';
 variants.forEach(v=>{const c=countOccurrences(txt,v);mentions+=c;const i=low.indexOf(v.toLowerCase());if(i>=0&&i<first){first=i;foundVariant=v}});
 const domain=domainOnly(project.domain);const urls=[...new Set([...extractUrls(txt),...extractUrls(sourcesText)])];const domains=urls.map(domainOnly);const domainCited=domains.some(d=>d===domain||d.endsWith('.'+domain));
 const competitors=(project.competitors||[]).filter(c=>low.includes(c.toLowerCase())||domains.includes(domainOnly(c)));const words=low.replace(/[^a-zàèéìòù0-9\s-]/gi,' ').split(/\s+/);let pos=0,neg=0;words.forEach(w=>{if(positiveWords.includes(w))pos++;if(negativeWords.includes(w))neg++});
 const sentiment=pos>neg?'Positivo':neg>pos?'Negativo':'Neutro';let position=0;if(first<Infinity){const before=txt.slice(0,first);position=(before.match(/(?:^|\n)\s*(?:\d+[.)]|[-•*])\s+/g)||[]).length+1;if(position>20)position=1}

 return{brandMentioned:mentions>0,domainCited,position,mentions,competitors,urls,domains:[...new Set(domains)],sentiment,foundVariant,locationPresent:local,servicesPresent:services};
}
function calculateScore(data,project){const w=state.settings.scoreWeights;let s=0;s+=data.brandMentioned?w.brand:0;s+=data.domainCited?w.domain:0;if(data.brandMentioned){s+=w.position*(data.position<=1?1:data.position===2?.8:data.position===3?.65:data.position<=5?.45:.25);s+=w.mentions*Math.min(1,(data.mentions||0)/3)}const c=(data.competitors||[]).length;if(data.brandMentioned)s+=w.competitors*(c===0?1:c===1?.75:c===2?.5:.25);else if(c===0)s+=w.competitors*.2;s+=w.sentiment*(data.sentiment==='Positivo'?1:data.sentiment==='Neutro'?.5:0);return Math.max(0,Math.min(100,Math.round(s)))}

function drawTrend(id,checks){const x=canvasSetup(id);if(!x)return;const{ctx,w,h}=x;ctx.clearRect(0,0,w,h);const pad={l:38,r:12,t:16,b:28};ctx.strokeStyle=css('--border');ctx.fillStyle=css('--muted');ctx.font='11px system-ui';for(let i=0;i<=4;i++){const y=pad.t+(h-pad.t-pad.b)*i/4;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();ctx.fillText(String(100-i*25),5,y+4)}if(!checks.length){ctx.fillText('Nessun dato',w/2-30,h/2);return}const pts=checks.map((c,i)=>({x:pad.l+(w-pad.l-pad.r)*(checks.length===1?.5:i/(checks.length-1)),y:pad.t+(h-pad.t-pad.b)*(1-(c.score||0)/100)}));ctx.strokeStyle=css('--accent');ctx.lineWidth=3;ctx.beginPath();pts.forEach((p,i)=>i?ctx.lineTo(p.x,p.y):ctx.moveTo(p.x,p.y));ctx.stroke();pts.forEach((p,i)=>{ctx.fillStyle=css('--surface');ctx.strokeStyle=css('--accent');ctx.lineWidth=3;ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill();ctx.stroke();if(i===0||i===pts.length-1){ctx.fillStyle=css('--muted');ctx.fillText(fmtDate(checks[i].date).slice(0,6),p.x-18,h-8)}})}

ance" value="3"></div><div class="field"><label>Attendibilità stimata (1–5)</label><input type="number" min="1" max="5" name="reliability" value="3"></div><div class="field full"><label>Note</label><textarea name="notes" style="min-height:70px"></textarea></div></form></div>

function resultsTable(checks,actions=false){if(!checks.length)return`<div class="empty"><strong>Nessuna verifica salvata</strong>Avvia una verifica e incolla la risposta di una AI.</div>`;return`<div class="table-wrap"><table><thead><tr><th>Score</th><th>Prompt / progetto</th><th>AI</th><th>Brand</th><th>Dominio</th><th>Pos.</th><th>Concorrenti</th><th>Data</th>${actions?'<th>Azioni</th>':''}</tr></thead><tbody>${checks.map(c=>{const p=getPrompt(c.promptId),pr=getProject(c.projectId);return`<tr data-project="${c.projectId}" data-platform="${c.platformId}" data-brand="${c.brandMentioned?'yes':'no'}" data-domain="${c.domainCited?'yes':'no'}" data-search="${esc(((p?.text||'')+' '+(pr?.name||'')+' '+getPlatform(c.platformId).name+' '+(c.response||'')).toLowerCase())}"><td><div class="score-ring" style="--score:${c.score||0}"><span>${c.score||0}</span></div></td><td><strong>${esc(p?.text||'Prompt eliminato')}</strong><div class="help">${esc(pr?.name||'Progetto eliminato')}</div></td><td>${badge(getPlatform(c.platformId).name,'info')}<div class="help">${esc(c.model||'')}</div></td><td>${c.brandMentioned?badge('Presente','success'):badge('Assente','danger')}</td><td>${c.domainCited?badge('Citato','success'):badge('No','warning')}</td><td>${c.position||'—'}</td><td>${(c.competitors||[]).slice(0,3).map(x=>badge(x)).join(' ')||'—'}</td><td>${fmtDate(c.date,true)}</td>${actions?`<td><div style="display:flex;gap:5px"><button class="btn btn-sm" data-action="view-check" data-id="${c.id}">Dettagli</button><button class="btn btn-sm btn-danger" data-action="delete-check" data-id="${c.id}">Elimina</button></div></td>`:''}</tr>`}).join('')}</tbody></table></div>`}
function renderCompare(){const projects=state.projects;document.getElementById('compare').innerHTML=`<div class="toolbar"><select id="compareProject"><option value="">Tutti i progetti</option>${optionList(projects,'')}</select><select id="comparePrompt"><option value="">Tutti i prompt</option>${optionList(state.prompts,'',x=>x.text)}</select><div class="spacer"></div><button class="btn" data-action="refresh-compare">Aggiorna confronto</button></div><div class="grid grid-2"><div class="card"><div class="card-header"><div><div class="card-title">GEO Score medio per AI</div><div class="card-sub">Media delle verifiche filtrate</div></div></div><div class="chart-wrap"><canvas id="compareChart"></canvas></div></div><div class="card"><div class="card-header"><div><div class="card-title">Sintesi comparativa</div><div class="card-sub">Presenza del brand, dominio e punteggio</div></div></div><div id="compareSummary"></div></div></div><div class="card" style="margin-top:16px"><div class="card-header"><div><div class="card-title">Dettaglio verifiche</div><div class="card-sub">Confronta lo stesso prompt su AI e date diverse</div></div></div><div id="compareTable"></div></div>`;requestAnimationFrame(updateCompare)}
function updateCompare(){const pr=document.getElementById('compareProject')?.value||'',po=document.getElementById('comparePrompt')?.value||'';const checks=state.checks.filter(c=>(!pr||c.projectId===pr)&&(!po||c.promptId===po));const groups={};checks.forEach(c=>{const g=groups[c.platformId]||(groups[c.platformId]={scores:[],brand:0,domain:0,total:0});g.scores.push(c.score);g.brand+=c.brandMentioned?1:0;g.domain+=c.domainCited?1:0;g.total++});document.getElementById('compareSummary').innerHTML=Object.keys(groups).length?Object.entries(groups).map(([id,g])=>`<div style="display:grid;grid-template-columns:minmax(120px,1fr) 80px 80px 80px;gap:8px;padding:10px 0;border-bottom:1px solid var(--border)"><strong>${esc(getPlatform(id).name)}</strong><span>${Math.round(g.brand/g.total*100)}% brand</span><span>${Math.round(g.domain/g.total*100)}% dominio</span><span class="badge info">${Math.round(g.scores.reduce((a,b)=>a+b,0)/g.total)}/100</span></div>`).join(''):'<div class="empty"><strong>Nessun dato comparabile</strong>Salva più verifiche per creare il confronto.</div>';document.getElementById('compareTable').innerHTML=resultsTable([...checks].sort((a,b)=>new Date(b.date)-new Date(a.date)));requestAnimationFrame(()=>drawCompare('compareChart',groups))}
function drawCompare(id,groups){const x=canvasSetup(id);if(!x)return;const{ctx,w,h}=x;const entries=Object.entries(groups);if(!entries.length){ctx.fillStyle=css('--muted');ctx.fillText('Nessun dato',w/2-30,h/2);return}const max=Math.max(...entries.map(([,g])=>g.scores.reduce((a,b)=>a+b,0)/g.total),100);const bh=(h-50)/entries.length;entries.forEach(([id,g],i)=>{const avg=g.scores.reduce((a,b)=>a+b,0)/g.total;ctx.fillStyle=css('--surface-3');ctx.fillRect(115,14+i*bh,w-145,bh-12);ctx.fillStyle=css('--accent');ctx.fillRect(115,14+i*bh,(w-145)*avg/max,bh-12);ctx.fillStyle=css('--text');ctx.font='11px system-ui';ctx.fillText(getPlatform(id).name.slice(0,15),6,14+i*bh+(bh-12)/2+4);ctx.fillText(Math.round(avg)+'/100',Math.min(w-42,120+(w-145)*avg/max),14+i*bh+(bh-12)/2+4)})}
function generateOpportunities(){const arr=[];state.checks.forEach(c=>{const p=getPrompt(c.promptId),pr=getProject(c.projectId);if(!p||!pr)return;if(!c.brandMentioned)arr.push(op(c,'Brand assente nella risposta',`Creare o rafforzare un contenuto specifico per “${p.text}”, includendo informazioni verificabili e differenzianti.`, 'P1','Contenuto'));else if(!c.domainCited)arr.push(op(c,'Brand presente ma dominio non citato','Rendere la pagina di riferimento più completa, facilmente estraibile e supportata da fonti esterne.', 'P2','Citazione'));if((c.competitors||[]).length)arr.push(op(c,'Concorrenti presenti nella risposta',`Analizzare le pagine e le fonti associate a: ${(c.competitors||[]).join(', ')}.`,c.brandMentioned?'P3':'P2','Competitor'));if(!(c.urls||[]).length)arr.push(op(c,'Nessuna fonte esplicita rilevata','Ripetere la verifica con ricerca web attiva e annotare le fonti mostrate dall’interfaccia.', 'P3','Verifica'));});const map=new Map();arr.forEach(x=>{const k=x.projectId+x.promptId+x.title;if(!map.has(k))map.set(k,x)});state.opportunities=[...map.values()];saveState(true);return state.opportunities}

function renderGenerator(){const check=state.checks.at(-1),project=check?getProject(check.projectId):state.projects[0],prompt=check?getPrompt(check.promptId):state.prompts[0];document.getElementById('generator').innerHTML=`<div class="grid grid-2"><div class="card"><div class="card-header"><div><div class="card-title">Configura il prompt operativo</div><div class="card-sub">I dati del progetto e della verifica vengono inseriti automaticamente.</div></div></div><div class="form-grid"><div class="field full"><label>Modello</label><select id="generatorTemplate">${Object.entries(templates).map(([k,v])=>`<option value="${k}">${esc(v)}</option>`).join('')}</select></div><div class="field"><label>Progetto</label><select id="generatorProject"><option value="">Seleziona</option>${optionList(state.projects,project?.id||'')}</select></div><div class="field"><label>Verifica</label><select id="generatorCheck"><option value="">Nessuna verifica specifica</option>${state.checks.map(c=>`<option value="${c.id}" ${c.id===check?.id?'selected':''}>${esc(getPlatform(c.platformId).name+' · '+(getPrompt(c.promptId)?.text||''))}</option>`).join('')}</select></div><div class="field full"><label>Indicazioni aggiuntive</label><textarea id="generatorNotes" placeholder="Es. Mantieni il layout Elementor e non modificare prezzi e orari…"></textarea></div></div><div class="toolbar" style="margin-top:15px"><button class="btn btn-primary" data-action="generate-prompt">Genera prompt</button><button class="btn" data-action="copy-generated">Copia</button><button class="btn" data-action="download-generated">Esporta TXT</button></div></div><div class="card"><div class="card-header"><div><div class="card-title">Prompt generato</div><div class="card-sub">Modificabile prima della copia</div></div></div><textarea id="generatedPrompt" class="prompt-output" spellcheck="false">${esc(generatedPrompt||buildPrompt('gap',project,check,''))}</textarea></div></div>`}
function buildPrompt(type,project,check,notes=''){if(!project)return'Seleziona prima un progetto.';const p=check?getPrompt(check.promptId):state.prompts.find(x=>x.projectId===project.id);const base=`Agisci come consulente SEO e GEO senior.\n\nPROGETTO\nBrand: ${project.brand}\nDominio: ${project.domain}\nPagina da ottimizzare: ${project.pageUrl||'da definire'}\nLocalità/mercato: ${project.location||''} · ${project.market||''}\nSettore: ${project.sector||''}\nServizi reali: ${(project.services||[]).join(', ')}\nConcorrenti: ${(project.competitors||[]).join(', ')}\n\nPROMPT TESTATO\n${p?.text||'Non indicato'}\n\nRISPOSTA OTTENUTA\n${check?.response||'Non allegata'}\n\nFONTI CITATE\n${(check?.urls||[]).join('\n')||'Non allegate'}\n\nNOTE AGGIUNTIVE\n${notes||project.notes||'Nessuna'}\n\n`;
 const tasks={gap:`Obiettivo: individuare perché il brand o il dominio non ottengono la visibilità desiderata e produrre un piano di miglioramento.\n\n1. Analizza possibili content gap, entity gap, authority gap, local gap e technical gap.\n2. Spiega soltanto ipotesi supportate dalla risposta e dalle fonti; non presentarle come cause certe.\n3. Confronta il contenuto necessario con ciò che viene premiato nella risposta.\n4. Indica dati, prove, recensioni, casi studio o segnali esterni mancanti.\n5. Proponi struttura, titoli, FAQ e contenuto da aggiungere.\n6. Non inventare informazioni.\n7. Concludi con checklist P1-P4.`,optimize:`Obiettivo: riscrivere e ottimizzare la pagina esistente per Google e motori generativi. Prima mostra la gap analysis; poi produci title, meta description, H1, struttura H2/H3, contenuto, FAQ, linking interno, schema consigliato e checklist. Non inventare dati.`,newcontent:`Obiettivo: creare un nuovo contenuto specifico per il prompt testato. Definisci intento, pubblico, formato, entità, fonti, outline, contenuto completo, FAQ, CTA, title e meta. Evita cannibalizzazioni e affermazioni non verificabili.`,sources:`Analizza una per una le fonti citate: tipo di fonte, informazione fornita, autorevolezza apparente, struttura estraibile, elementi replicabili in modo originale e opportunità per diventare fonte. Non copiare contenuti.`,competitors:`Confronta il brand con i concorrenti menzionati. Crea una matrice di gap verificabili: copertura tematica, prove, reputazione, presenza locale, citazioni esterne, dati strutturati e chiarezza dell’offerta.`,faq:`Genera FAQ realmente utili basate sul prompt e sui dubbi emersi. Fornisci risposte concise, verificabili e adatte a FAQPage schema quando appropriato.`,schema:`Proponi i dati strutturati appropriati per la pagina, distinguendo quelli validi da quelli non applicabili. Genera JSON-LD solo con dati forniti e senza inventare recensioni o rating.`,digitalpr:`Crea un piano di digital PR per ottenere menzioni e fonti indipendenti pertinenti. Indica categorie di siti, angoli editoriali, asset da produrre e metriche di controllo.`,local:`Crea un piano per rafforzare entità e segnali locali: dati NAP, Google Business Profile, directory, media locali, associazioni, recensioni, pagine localizzate e coerenza delle informazioni.`,editorial:`Crea un piano editoriale GEO di 90 giorni con pillar, cluster, query commerciali, comparative e reputazionali. Evita cannibalizzazioni e assegna una pagina target a ogni intento.`,brief:`Crea un brief editoriale completo: intento, pubblico, SERP/GEO angle, outline, entità, domande, fonti, esempi, linking interno, CTA e criteri di qualità.`,factcheck:`Verifica tutte le affermazioni presenti nella risposta e nella proposta di contenuto. Classifica ciascuna come verificata, da verificare, opinione, inferenza o non utilizzabile.`,eeat:`Proponi interventi E-E-A-T concreti: autore, esperienza dimostrabile, casi studio, metodologia, trasparenza, contatti, fonti, aggiornamento, policy e reputazione esterna.`,localquery:`Ottimizza il contenuto per l’intento locale senza keyword stuffing. Inserisci area servita, prove locali, indicazioni operative, entità geografiche pertinenti e FAQ locali.`,comparison:`Crea una pagina comparativa trasparente e utile. Definisci criteri, limiti, casi d’uso, tabella di confronto, fonti e dichiarazioni verificabili. Evita classifiche autoreferenziali non dimostrate.`};return base+(tasks[type]||tasks.gap)}
function renderReports(){const project=state.projects[0];document.getElementById('reports').innerHTML=`<div class="toolbar no-print"><select id="reportProject"><option value="">Seleziona progetto</option>${optionList(state.projects,project?.id||'')}</select><select id="reportRange"><option value="all">Tutte le date</option><option value="30">Ultimi 30 giorni</option><option value="90">Ultimi 90 giorni</option></select><div class="spacer"></div><button class="btn" data-action="copy-report-summary">Copia riepilogo</button><button class="btn" data-action="export-report-csv">Esporta CSV</button><button class="btn btn-primary" data-action="print-report">Stampa / PDF</button></div><div id="reportContent"></div>`;renderReportContent(project?.id||'')}

 box.innerHTML=`<div class="report-head">${state.settings.logo?`<img class="report-logo" src="${state.settings.logo}" alt="Logo">`:''}<div style="font-size:12px;opacity:.8">${esc(state.settings.agency||state.settings.consultant||'GEO Citation Monitor')}</div><h1 style="margin:5px 0 0;font-size:30px">Report visibilità GEO</h1><div style="margin-top:4px;opacity:.82">${esc(pr.name)} · ${esc(pr.domain)} · Generato il ${fmtDate(now())}</div><div class="report-kpis"><div class="report-kpi"><small>GEO Score medio</small><strong>${avg}/100</strong></div><div class="report-kpi"><small>Brand presente</small><strong>${checks.length?Math.round(brand/checks.length*100):0}%</strong></div><div class="report-kpi"><small>Dominio citato</small><strong>${checks.length?Math.round(domain/checks.length*100):0}%</strong></div><div class="report-kpi"><small>Verifiche</small><strong>${checks.length}</strong></div></div></div>
 <div class="grid grid-2"><div class="card"><div class="card-title">Riepilogo esecutivo</div><p>Il progetto è stato verificato su ${new Set(checks.map(c=>c.platformId)).size} piattaforme AI attraverso ${checks.length} controlli manuali. Il punteggio medio proprietario è ${avg}/100. Il brand compare nel ${checks.length?Math.round(brand/checks.length*100):0}% delle risposte e il dominio viene citato nel ${checks.length?Math.round(domain/checks.length*100):0}%.</p><p class="help">Questi dati descrivono esclusivamente le sessioni registrate e non rappresentano l’intera visibilità degli utenti.</p></div><div class="card"><div class="card-title">Concorrenti ricorrenti</div>${rankList(Object.entries(comps).sort((a,b)=>b[1]-a[1]).slice(0,5),'Nessun concorrente rilevato')}</div></div>

 <div class="card" style="margin-top:16px"><div class="card-title" style="margin-bottom:12px">Attività prioritarie</div>${opportunityList(opps)}</div>

function localBackups(){if(!state.backups.length)return'<div class="empty"><strong>Nessuno snapshot</strong>Gli snapshot locali non sostituiscono un file JSON esterno.</div>';return state.backups.slice().reverse().map((b,i)=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)"><div><strong>${fmtDate(b.createdAt,true)}</strong><div class="help">${esc(b.label||'Backup automatico')}</div></div><div style="flex:1"></div><button class="btn btn-sm" data-action="restore-local-backup" data-index="${state.backups.length-1-i}">Ripristina</button><button class="btn btn-sm btn-danger" data-action="delete-local-backup" data-index="${state.backups.length-1-i}">Elimina</button></div>`).join('')}

 if(a==='export-prompts-csv')download('prompt-geo.csv',csv([['Progetto','Prompt','Categoria','Priorità','Stato'],...state.prompts.map(p=>[getProject(p.projectId)?.name,p.text,p.category,p.priority,p.status])]),'text/csv;charset=utf-8');
 if(a==='copy-selected-prompt')copy(getPrompt(document.getElementById('checkPrompt').value)?.text||'');if(a==='open-selected-ai'){const pid=document.querySelector('input[name=platformId]:checked')?.value,p=getPlatform(pid);const w=window.open(p.url,'_blank','noopener');if(!w)toast('Il browser ha bloccato la nuova scheda. Consenti i popup.','error')}
 if(a==='analyze-check'){const f=document.getElementById('checkForm');const pr=getProject(f.projectId.value);if(!pr||!f.response.value.trim()){toast('Seleziona il progetto e incolla la risposta.','error');return}const an=analyzeText(pr,f.response.value,f.sources.value);document.getElementById('analysisPreview').innerHTML=analysisPreview(an,pr);toast('Analisi locale completata','success')}
 if(a==='save-check'){saveCheck()}
 if(a==='view-check')viewCheck(id);if(a==='delete-check'){deleteWithConfirm('questa verifica',()=>{state.checks=state.checks.filter(x=>x.id!==id);saveState();renderResults()})}
 if(a==='export-results-csv')exportChecks(state.checks,'risultati-geo.csv');if(a==='refresh-compare')updateCompare();if(a==='regenerate-opportunities'){generateOpportunities();renderOpportunities();toast('Opportunità rigenerate','success')}
 if(a==='generate-prompt'){const type=document.getElementById('generatorTemplate').value,pr=getProject(document.getElementById('generatorProject').value),c=state.checks.find(x=>x.id===document.getElementById('generatorCheck').value),notes=document.getElementById('generatorNotes').value;generatedPrompt=buildPrompt(type,pr,c,notes);document.getElementById('generatedPrompt').value=generatedPrompt;toast('Prompt generato','success')}
 if(a==='copy-generated')copy(document.getElementById('generatedPrompt')?.value||generatedPrompt);if(a==='download-generated')download('prompt-geo.txt',document.getElementById('generatedPrompt')?.value||generatedPrompt);
 if(a==='print-report')window.print();if(a==='export-report-csv'){const pid=document.getElementById('reportProject').value;exportChecks(state.checks.filter(c=>c.projectId===pid),'report-geo.csv')}if(a==='copy-report-summary'){const pid=document.getElementById('reportProject').value,c=state.checks.filter(x=>x.projectId===pid),pr=getProject(pid),avg=c.length?Math.round(c.reduce((x,y)=>x+y.score,0)/c.length):0;copy(`Report GEO – ${pr?.name||''}\nVerifiche: ${c.length}\nGEO Score medio: ${avg}/100\nBrand presente: ${c.filter(x=>x.brandMentioned).length}/${c.length}\nDominio citato: ${c.filter(x=>x.domainCited).length}/${c.length}`)}
 if(a==='save-general-settings'){const d=formObj(document.getElementById('generalSettings'));state.settings.theme=d.theme;state.settings.demo=d.demo==='true';saveState();applyTheme();renderSettings()}
 if(a==='save-score-settings'){const f=document.getElementById('scoreSettings'),d=formObj(f),total=Object.values(d).reduce((x,y)=>x+Number(y),0);if(total!==100){toast('Il totale dei pesi deve essere 100%.','error');return}Object.keys(d).forEach(k=>d[k]=Number(d[k]));state.settings.scoreWeights=d;state.checks.forEach(c=>c.score=calculateScore(c,getProject(c.projectId)||{}));saveState();toast('Pesi aggiornati','success')}
 if(a==='add-platform')openModal('Nuova piattaforma',platformForm(),'<button class="btn" data-action="close-modal">Annulla</button><button class="btn btn-primary" data-action="save-platform">Salva</button>');if(a==='edit-platform')openModal('Modifica piattaforma',platformForm(getPlatform(id)),'<button class="btn" data-action="close-modal">Annulla</button><button class="btn btn-primary" data-action="save-platform">Salva</button>');if(a==='save-platform')savePlatform();if(a==='delete-platform'){deleteWithConfirm(getPlatform(id).name,()=>{state.platforms=state.platforms.filter(x=>x.id!==id);saveState();document.getElementById('settingsPanel').innerHTML=settingsPlatforms()})}
 if(a==='save-branding')saveBranding();if(a==='remove-logo'){state.settings.logo='';saveState();document.getElementById('settingsPanel').innerHTML=settingsBranding()}
 if(a==='export-json')download(`geo-citation-monitor-backup-${new Date().toISOString().slice(0,10)}.json`,JSON.stringify(state,null,2),'application/json');if(a==='choose-import')document.getElementById('jsonImport').click();if(a==='create-local-backup'){const snapshot=JSON.parse(JSON.stringify({...state,backups:[]}));state.backups.push({createdAt:now(),label:'Snapshot manuale',data:snapshot});if(state.backups.length>5)state.backups.shift();saveState();renderBackup()}
 if(a==='restore-local-backup'){const bk=state.backups[Number(b.dataset.index)];if(bk){openModal('Ripristina snapshot','<p>Il ripristino sostituirà i dati correnti.</p>','<button class="btn" data-action="close-modal">Annulla</button><button class="btn btn-primary" id="doRestore">Ripristina</button>');document.getElementById('doRestore').onclick=()=>{state=migrate(JSON.parse(JSON.stringify(bk.data)));saveState();closeModal();renderBackup();toast('Snapshot ripristinato','success')}}}if(a==='delete-local-backup'){state.backups.splice(Number(b.dataset.index),1);saveState();renderBackup()}
 if(a==='remove-demo')deleteWithConfirm('tutti i dati dimostrativi',removeDemo)
}
function saveCheck(){const f=document.getElementById('checkForm');if(!f.reportValidity())return;const d=formObj(f),pr=getProject(d.projectId);let an;try{an=JSON.parse(document.getElementById('analysisJson')?.value||'null')}catch{}if(!an){an=analyzeText(pr,d.response,d.sources);an.score=calculateScore(an,pr)}const item={id:uid(),projectId:d.projectId,promptId:d.promptId,platformId:d.platformId,model:d.model,date:new Date(d.date).toISOString(),location:d.location,sessionType:d.sessionType,response:d.response,sources:lines(d.sources),urls:an.urls||[],brandMentioned:an.brandMentioned,domainCited:an.domainCited,position:an.position,mentions:an.mentions,competitors:an.competitors||[],sentiment:an.sentiment,relevance:Number(d.relevance),reliability:Number(d.reliability),notes:d.notes,score:an.score,createdAt:now(),updatedAt:now()};state.checks.push(item);const p=getPrompt(d.promptId);if(p){p.lastChecked=item.date;p.updatedAt=now()}saveState();generateOpportunities();toast('Verifica salvata','success');setSection('results')}
function exportChecks(checks,name){download(name,csv([['Progetto','Prompt','AI','Data','Brand presente','Dominio citato','Posizione','Menzioni','Sentiment','Score','Concorrenti','Fonti'],...checks.map(c=>[getProject(c.projectId)?.name,getPrompt(c.promptId)?.text,getPlatform(c.platformId).name,c.date,c.brandMentioned?'Sì':'No',c.domainCited?'Sì':'No',c.position,c.mentions,c.sentiment,c.score,(c.competitors||[]).join('|'),(c.urls||[]).join('|')])]),'text/csv;charset=utf-8')}
function platformForm(p={}){return`<form id="platformForm" class="form-grid"><input type="hidden" name="id" value="${esc(p.id||'')}">${field('name','Nome',p.name,true)}${field('url','URL di apertura',p.url,true,'https://…','url')}<label style="display:flex;gap:8px;align-items:center"><input type="checkbox" name="active" style="width:auto" ${p.active!==false?'checked':''}> Piattaforma attiva</label></form>`}
function savePlatform(){const f=document.getElementById('platformForm');if(!f.reportValidity())return;const d=formObj(f),old=state.platforms.find(x=>x.id===d.id),item={id:d.id||uid(),name:d.name,url:d.url,active:f.active.checked};if(old)Object.assign(old,item);else state.platforms.push(item);saveState();closeModal();document.getElementById('settingsPanel').innerHTML=settingsPlatforms()}
function saveBranding(){const f=document.getElementById('brandingSettings'),d=formObj(f);Object.assign(state.settings,d);const file=document.getElementById('logoInput').files[0];if(file){if(file.size>350000){toast('Logo troppo grande. Usa un file inferiore a 350 KB.','error');return}const r=new FileReader();r.onload=()=>{state.settings.logo=r.result;saveState();applyTheme();document.getElementById('settingsPanel').innerHTML=settingsBranding()};r.readAsDataURL(file)}else{saveState();applyTheme();toast('Branding salvato','success')}}
function handleChanges(e){const t=e.target;if(t.id==='checkProject'){const pid=t.value;const sel=document.getElementById('checkPrompt');sel.innerHTML='<option value="">Seleziona</option>'+optionList(state.prompts.filter(p=>p.projectId===pid),'',x=>x.text);const pr=getProject(pid);document.querySelector('#checkForm [name=location]').value=pr?.location||'';document.getElementById('selectedPromptBox').innerHTML=selectedPromptCard(sel.value)}if(t.id==='checkPrompt')document.getElementById('selectedPromptBox').innerHTML=selectedPromptCard(t.value);
 if(t.id==='projectSearch'||t.id==='projectFilter'){const q=document.getElementById('projectSearch').value.toLowerCase(),f=document.getElementById('projectFilter').value;document.querySelectorAll('#projectList .project-card').forEach(x=>x.style.display=(x.dataset.search.includes(q)&&(f==='all'||(f==='active'&&x.dataset.archived==='no')||(f==='archived'&&x.dataset.archived==='yes')))?'':'none')}
 if(['promptSearch','promptProjectFilter','promptPriorityFilter'].includes(t.id)){filterRows('#promptTable',document.getElementById('promptSearch').value,document.getElementById('promptProjectFilter').value,x=>!document.getElementById('promptPriorityFilter').value||x.dataset.priority===document.getElementById('promptPriorityFilter').value)}
 if(['resultSearch','resultProjectFilter','resultPlatformFilter','resultMentionFilter'].includes(t.id)){const q=document.getElementById('resultSearch').value,pr=document.getElementById('resultProjectFilter').value,pl=document.getElementById('resultPlatformFilter').value,m=document.getElementById('resultMentionFilter').value;filterRows('#resultsTable',q,pr,x=>(!pl||x.dataset.platform===pl)&&(!m||(m==='brand'&&x.dataset.brand==='yes')||(m==='domain'&&x.dataset.domain==='yes')||(m==='absent'&&x.dataset.brand==='no')))}
 if(['compareProject','comparePrompt'].includes(t.id))updateCompare();if(['oppProject','oppPriority','oppStatus'].includes(t.id)){const pr=document.getElementById('oppProject').value,p=document.getElementById('oppPriority').value,s=document.getElementById('oppStatus').value;document.querySelectorAll('#opportunityList .opportunity').forEach(x=>x.style.display=(!pr||x.dataset.project===pr)&&(!p||x.dataset.priority===p)&&(!s||x.dataset.status===s)?'':'none')}
 if(t.dataset.action==='opp-status'){const o=state.opportunities.find(x=>x.id===t.dataset.id);if(o){o.status=t.value;o.updatedAt=now();saveState(true);t.closest('.opportunity').dataset.status=t.value;toast('Stato aggiornato','success')}}if(t.id==='reportProject'||t.id==='reportRange')renderReportContent(document.getElementById('reportProject').value);
 if(t.dataset.action==='toggle-platform'){const p=getPlatform(t.dataset.id);p.active=t.checked;saveState(true)}
 if(t.closest('#scoreSettings')){const vals=[...document.querySelectorAll('#scoreSettings input')].reduce((a,x)=>a+Number(x.value||0),0);document.getElementById('weightTotal').textContent='Totale: '+vals+'%'}
}
function settingsTab(e){const b=e.target.closest('[data-settings-tab]');if(!b)return;document.querySelectorAll('[data-settings-tab]').forEach(x=>x.classList.toggle('active',x===b));document.getElementById('settingsPanel').innerHTML=b.dataset.settingsTab==='general'?settingsGeneral():b.dataset.settingsTab==='score'?settingsScore():b.dataset.settingsTab==='platforms'?settingsPlatforms():settingsBranding()}
function importJson(file){const r=new FileReader();r.onload=()=>{try{const parsed=JSON.parse(r.result);if(!parsed.projects||!parsed.prompts||!parsed.checks)throw new Error('Struttura non valida');openModal('Importa backup',`<p>File valido. Scegli come importare i dati.</p><div class="notice warning">La sostituzione cancella i dati correnti.</div>`,`<button class="btn" data-action="close-modal">Annulla</button><button class="btn" id="mergeImport">Unisci</button><button class="btn btn-primary" id="replaceImport">Sostituisci</button>`);document.getElementById('replaceImport').onclick=()=>{state=migrate(parsed);saveState();closeModal();render(currentSection);toast('Backup importato','success')};document.getElementById('mergeImport').onclick=()=>{mergeState(parsed);saveState();closeModal();render(currentSection);toast('Dati uniti','success')}}catch(e){toast('File JSON non valido o incompatibile.','error')}};r.readAsText(file)}
function mergeState(p){const add=(key)=>{const ids=new Set(state[key].map(x=>x.id));(p[key]||[]).forEach(x=>{if(!ids.has(x.id))state[key].push(x)})};['projects','prompts','checks','opportunities'].forEach(add)}
function globalSearch(q){q=q.trim().toLowerCase();if(!q)return;const matches=[];state.projects.filter(x=>JSON.stringify(x).toLowerCase().includes(q)).slice(0,5).forEach(x=>matches.push(['Progetto',x.name,()=>{setSection('projects');setTimeout(()=>{document.getElementById('projectSearch').value=q;document.getElementById('projectSearch').dispatchEvent(new Event('input',{bubbles:true}))},30)}]));state.prompts.filter(x=>x.text.toLowerCase().includes(q)).slice(0,8).forEach(x=>matches.push(['Prompt',x.text,()=>{setSection('prompts');setTimeout(()=>{document.getElementById('promptSearch').value=q;document.getElementById('promptSearch').dispatchEvent(new Event('input',{bubbles:true}))},30)}]));state.checks.filter(x=>(x.response||'').toLowerCase().includes(q)).slice(0,5).forEach(x=>matches.push(['Risultato',getPrompt(x.promptId)?.text||'',()=>viewCheck(x.id)]));openModal('Risultati ricerca',matches.length?matches.map((m,i)=>`<button class="btn btn-block" style="justify-content:flex-start;margin-bottom:8px" id="searchResult${i}"><span class="badge">${m[0]}</span>${esc(m[1])}</button>`).join(''):'<div class="empty"><strong>Nessun risultato</strong>Prova con un termine differente.</div>');matches.forEach((m,i)=>document.getElementById('searchResult'+i).onclick=()=>{closeModal();m[2]()})}
function closeMobile(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show')}
function bind(){document.addEventListener('click',eventActions);document.addEventListener('change',handleChanges);document.addEventListener('input',handleChanges);document.addEventListener('click',settingsTab);document.querySelectorAll('.nav-item').forEach(b=>b.addEventListener('click',()=>setSection(b.dataset.section)));document.getElementById('modalClose').onclick=closeModal;document.getElementById('modalBackdrop').addEventListener('click',e=>{if(e.target.id==='modalBackdrop')closeModal()});document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});document.getElementById('menuToggle').onclick=()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('mobileOverlay').classList.add('show')};document.getElementById('mobileOverlay').onclick=closeMobile;document.getElementById('themeToggle').onclick=()=>{state.settings.theme=state.settings.theme==='dark'?'light':state.settings.theme==='light'?'auto':'dark';saveState(true);applyTheme();render(currentSection)};document.getElementById('globalSearch').addEventListener('keydown',e=>{if(e.key==='Enter')globalSearch(e.target.value)});document.getElementById('jsonImport').onchange=e=>{if(e.target.files[0])importJson(e.target.files[0]);e.target.value=''};window.addEventListener('resize',()=>{if(currentSection==='dashboard')renderDashboard();if(currentSection==='compare')updateCompare()})}
applyTheme();bind();renderDashboard();
})();
</script>
</body>
