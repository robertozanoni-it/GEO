<style>
:root{
  --bg:#f3f6fb;--surface:#fff;--surface-2:#f7f9fc;--surface-3:#edf2f8;
  --text:#152238;--muted:#64748b;--border:#d8e1ec;--accent:#2853d7;--accent-2:#173ba8;

.brand{display:flex;align-items:center;gap:12px;padding:7px 8px 18px}.brand-mark{width:40px;height:40px;border-radius:12px;background:linear-gradient(135deg,#86a6ff,#fff);color:#102250;display:grid;place-items:center;font-weight:900;box-shadow:0 8px 24px rgba(0,0,0,.18)}
.brand-name{font-weight:850;font-size:16px}.brand-sub{font-size:11px;color:#bac8e7}.nav-group{margin:6px 0 12px}.nav-label{font-size:10px;text-transform:uppercase;letter-spacing:.14em;color:#8fa4d4;padding:0 11px 7px}

.main{min-width:0}.topbar{position:sticky;top:0;z-index:20;height:74px;background:color-mix(in srgb,var(--surface) 94%,transparent);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 26px}.page-title{font-size:20px;font-weight:850}.page-subtitle{font-size:12px;color:var(--muted)}.topbar-spacer{flex:1}.menu-toggle{display:none!important}
.global-search{position:relative;width:min(390px,35vw)}.global-search input{padding-left:38px}.global-search svg{position:absolute;left:12px;top:12px;width:17px;color:var(--muted)}
.content{max-width:1600px;margin:auto;padding:26px}.section{display:none}.section.active{display:block}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px}.toolbar .spacer{flex:1}.toolbar input,.toolbar select{min-height:42px}
.btn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:10px 14px;border-radius:10px;font-weight:750;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:42px;transition:.15s ease}.btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(20,32,51,.08)}.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-2)}.btn-danger{color:var(--danger)}.btn-success{background:var(--success);border-color:var(--success);color:#fff}.btn-ghost{background:transparent;border-color:transparent}.btn-sm{font-size:13px;min-height:34px;padding:7px 10px}.btn-block{width:100%}.icon-btn{width:42px;height:42px;border:1px solid var(--border);border-radius:11px;background:var(--surface);color:var(--text);display:grid;place-items:center}
.grid{display:grid;gap:16px}.grid-4{grid-template-columns:repeat(4,minmax(0,1fr))}.grid-3{grid-template-columns:repeat(3,minmax(0,1fr))}.grid-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:19px}.card-flat{box-shadow:none}.card-header{display:flex;align-items:flex-start;gap:12px;margin-bottom:15px}.card-title{font-size:16px;font-weight:850}.card-sub{font-size:13px;color:var(--muted);margin-top:3px}.card-header .spacer{flex:1}
.metric{min-height:132px;position:relative;overflow:hidden}.metric:after{content:"";position:absolute;width:80px;height:80px;border-radius:50%;right:-25px;top:-25px;background:color-mix(in srgb,var(--accent) 11%,transparent)}.metric-label{font-size:13px;color:var(--muted);font-weight:750}.metric-value{font-size:32px;font-weight:900;margin-top:10px;letter-spacing:-.03em}.metric-change{font-size:13px;margin-top:7px}.up{color:var(--success)}.down{color:var(--danger)}.neutral{color:var(--muted)}

.empty{padding:42px 20px;text-align:center;color:var(--muted);border:1px dashed var(--border);border-radius:12px;background:var(--surface-2)}.empty strong{display:block;color:var(--text);font-size:17px;margin-bottom:5px}
.project-list{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.project-card{padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow)}.project-card h3{font-size:17px;margin:0}.project-domain{font-size:13px;color:var(--accent);word-break:break-all;margin:4px 0 13px}.project-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:12px 0}.project-meta div{background:var(--surface-2);border-radius:9px;padding:10px}.project-meta small{display:block;color:var(--muted);font-size:11px}.project-meta strong{font-size:14px}.card-actions{display:flex;gap:7px;justify-content:flex-end;flex-wrap:wrap;margin-top:13px;padding-top:13px;border-top:1px solid var(--border)}

.response-text{font-size:18px;line-height:1.75;min-height:300px}.answer-view{font-size:18px;line-height:1.75;white-space:pre-wrap;word-break:break-word;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:18px;max-height:520px;overflow:auto}.answer-view mark{padding:1px 3px;border-radius:4px}.mark-brand{background:#ffe58f;color:#3b2a00}.mark-domain{background:#bfe3ff;color:#00345a}.mark-competitor{background:#ffd0d6;color:#5c0010}.mark-service{background:#c9f2df;color:#06492f}.mark-location{background:#e0d2ff;color:#321064}
.analysis-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.analysis-item{padding:13px;background:var(--surface-2);border:1px solid var(--border);border-radius:11px}.analysis-item small{display:block;color:var(--muted);font-size:12px}.analysis-item strong{font-size:17px}.score-large{font-size:42px;font-weight:900;letter-spacing:-.04em}.score-note{font-size:12px;color:var(--muted)}
.evidence{border-left:4px solid var(--accent);padding:10px 12px;background:var(--surface-2);border-radius:0 10px 10px 0;margin:8px 0}.evidence strong{font-size:13px}.evidence blockquote{margin:4px 0 0;font-size:15px;line-height:1.6;color:var(--text)}
.checklist{display:grid;gap:9px}.check-row{display:flex;gap:10px;align-items:flex-start;padding:11px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)}.check-row input{width:auto;margin-top:4px}.check-row strong{display:block}.check-row small{color:var(--muted)}
.source-table{display:grid;gap:8px}.source-row{display:grid;grid-template-columns:minmax(0,1fr) 150px 90px;gap:8px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)}
.progress{height:9px;border-radius:999px;background:var(--surface-3);overflow:hidden}.progress>span{display:block;height:100%;background:var(--accent)}
.matrix{overflow:auto;border:1px solid var(--border);border-radius:14px}.matrix table{min-width:1000px}.matrix-cell{min-width:110px;text-align:center}.matrix-cell button{width:100%;border:1px solid var(--border);background:var(--surface-2);border-radius:9px;padding:8px;color:var(--text)}.matrix-cell button:hover{border-color:var(--accent)}
.quality-item,.anomaly-item,.opportunity{border:1px solid var(--border);border-radius:12px;background:var(--surface);padding:15px;margin-bottom:10px}.priority-P1{border-left:5px solid var(--danger)}.priority-P2{border-left:5px solid var(--warning)}.priority-P3{border-left:5px solid var(--info)}.priority-P4{border-left:5px solid var(--muted)}
.bar-row{display:grid;grid-template-columns:170px minmax(0,1fr) 55px;gap:10px;align-items:center;margin:10px 0}.bar{height:12px;background:var(--surface-3);border-radius:999px;overflow:hidden}.bar span{display:block;height:100%;background:var(--accent);border-radius:999px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border);margin-bottom:16px}.tab{border:0;background:transparent;color:var(--muted);padding:10px 12px;font-weight:800;border-bottom:3px solid transparent}.tab.active{color:var(--accent);border-color:var(--accent)}
.modal-backdrop{position:fixed;inset:0;background:rgba(5,12,24,.62);z-index:100;display:none;align-items:center;justify-content:center;padding:22px}.modal-backdrop.show{display:flex}.modal{width:min(1120px,100%);max-height:92vh;background:var(--surface);border:1px solid var(--border);border-radius:18px;box-shadow:0 30px 90px rgba(0,0,0,.35);display:flex;flex-direction:column}.modal-head{display:flex;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border)}.modal-title{font-size:18px;font-weight:850}.modal-body{padding:20px;overflow:auto}.modal-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;padding:13px 20px;border-top:1px solid var(--border)}

.hidden{display:none!important}.muted{color:var(--muted)}.text-danger{color:var(--danger)}.text-success{color:var(--success)}.nowrap{white-space:nowrap}.flex{display:flex}.gap-8{gap:8px}.wrap{flex-wrap:wrap}.spacer{flex:1}
@media(max-width:1200px){.grid-4{grid-template-columns:repeat(2,1fr)}.project-list{grid-template-columns:repeat(2,1fr)}.onboarding-steps{grid-template-columns:repeat(2,1fr)}}

@media(max-width:650px){body{font-size:15px}.content{padding:18px 13px 94px}.topbar{padding:0 13px}.grid-4,.project-list,.onboarding-steps,.form-grid,.analysis-grid{grid-template-columns:1fr}.source-row{grid-template-columns:1fr}.wizard-footer{position:fixed;left:12px;right:12px;bottom:9px}.wizard-footer .status{display:none}.wizard-footer .btn{flex:1}.page-subtitle{display:none}.answer-view,.response-text{font-size:17px}}

.selection-panel{border:1px solid var(--border);border-radius:14px;background:var(--surface);padding:16px;margin-bottom:16px}.selection-panel h3{margin:0 0 6px;font-size:16px}.selection-list{display:grid;gap:8px;max-height:340px;overflow:auto;padding-right:4px}.selection-row{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:10px;align-items:start;padding:11px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)}.selection-row input{width:auto;margin-top:4px}.selection-row .meta{font-size:12px;color:var(--muted)}.action-plan{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}.action-plan ol{margin:8px 0 0;padding-left:22px}.action-plan li{margin:7px 0}.priority-explain{font-size:13px;padding:10px 12px;border-radius:10px;background:var(--surface-2);margin:10px 0}.opportunity.selected{outline:3px solid color-mix(in srgb,var(--accent) 25%,transparent)}.opp-select{width:auto!important;margin:0 4px 0 0}.report-section-title{display:flex;align-items:center;gap:10px;margin:22px 0 10px}.report-section-title h2{margin:0}.compact-actions{display:flex;gap:8px;flex-wrap:wrap}.steps-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.step-card{border:1px solid var(--border);border-radius:10px;padding:11px;background:var(--surface-2)}.step-card strong{display:block;margin-bottom:4px}.simple-explanation{font-size:15px;line-height:1.65}.report-empty-note{padding:16px;border:1px dashed var(--border);border-radius:10px;color:var(--muted)}.report-search-select{min-width:min(100%,720px);max-width:100%}.implementation-box{margin-top:16px;padding:16px;border:1px solid var(--border);border-radius:12px;background:var(--surface-2)}.implementation-box h4{margin:0 0 10px;font-size:16px}.implementation-box ul{margin:8px 0 0;padding-left:22px}.implementation-box li{margin:7px 0}.deliverables{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:12px}.deliverable{padding:11px;border:1px solid var(--border);border-radius:10px;background:var(--surface)}.report-context{padding:14px;border-left:4px solid var(--accent);background:var(--surface-2);border-radius:10px;margin:14px 0}.timeline-row{display:grid;grid-template-columns:110px 1fr;gap:12px;margin:8px 0}.timeline-row strong{color:var(--text)}
.geo-summary{display:grid;grid-template-columns:1.3fr .7fr;gap:14px;margin:16px 0}.geo-summary .card{margin:0}.diagnosis-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.diagnosis-item{padding:12px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2)}.diagnosis-item strong{display:block;margin-bottom:4px}.impact-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:8px;margin:12px 0}.impact-box{padding:10px;border:1px solid var(--border);border-radius:10px;background:var(--surface-2);text-align:center}.impact-box strong{display:block;font-size:18px}.roadmap-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.roadmap-card{padding:13px;border:1px solid var(--border);border-radius:12px;background:var(--surface-2)}.roadmap-card h4{margin:0 0 8px}.checklist{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}.check-item{padding:9px 10px;border:1px solid var(--border);border-radius:9px;background:var(--surface)}.estimate-bar{height:10px;border-radius:999px;background:var(--surface-2);overflow:hidden;margin-top:8px}.estimate-bar span{display:block;height:100%;background:var(--accent)}.section-kicker{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:800}.action-example{padding:14px;border-left:4px solid var(--accent);background:var(--surface-2);border-radius:10px;margin-top:12px}.kpi-list{display:grid;gap:8px}.kpi-row{display:grid;grid-template-columns:160px 1fr;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}.score-path{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:12px 0}.score-step{padding:9px 12px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border)}
@media(max-width:900px){.geo-summary,.diagnosis-grid,.roadmap-grid{grid-template-columns:1fr}.impact-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.checklist{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr}}
@media print{.sidebar,.topbar,.toolbar,.no-print,.modal-backdrop,.toast-zone{display:none!important}.app{display:block}.content{padding:0}.section{display:none!important}#reports.section{display:block!important}.card{box-shadow:none;break-inside:avoid}}
</style>

<script>
(()=>{'use strict';
const APP_KEY='geoCitationMonitor_v1';
const VERSION='2.4.0';
const PAGES={dashboard:['Dashboard','Panoramica della visibilità GEO'],onboarding:['Configurazione guidata','Completa i passaggi essenziali'],projects:['Progetti','Gestisci brand, siti e segnali di contesto'],prompts:['Prompt','Organizza le query da monitorare'],'new-check':['Nuova verifica','Procedura guidata in cinque passaggi'],results:['Risultati','Storico, filtri e azioni multiple'],matrix:['Matrice Prompt–AI','Copertura dei test per ogni piattaforma'],compare:['Confronto','Benchmark, trend e differenze'],opportunities:['Opportunità GEO','Azioni concrete basate sui risultati'],quality:['Qualità dati','Problemi, duplicati e verifiche incomplete'],generator:['Generatore prompt','Crea istruzioni operative per l’ottimizzazione'],reports:['Report','Report stampabili e white label'],settings:['Impostazioni','Pesi, piattaforme, analisi e branding'],backup:['Backup e ripristino','Proteggi e trasferisci i dati locali'],guide:['Guida','Metodo di lavoro e significato dei dati']};
const DEFAULT_PLATFORMS=[
{id:'chatgpt',name:'ChatGPT',url:'https://chatgpt.com/',active:true},{id:'gemini',name:'Gemini',url:'https://gemini.google.com/app',active:true},{id:'perplexity',name:'Perplexity',url:'https://www.perplexity.ai/',active:true},{id:'claude',name:'Claude',url:'https://claude.ai/new',active:true},{id:'copilot',name:'Microsoft Copilot',url:'https://copilot.microsoft.com/',active:true},{id:'google-ai-mode',name:'Google AI Mode',url:'https://www.google.com/aimode',active:true},{id:'google-aio',name:'Google AI Overviews',url:'https://www.google.com/',active:true},{id:'grok',name:'Grok',url:'https://grok.com/',active:true},{id:'deepseek',name:'DeepSeek',url:'https://chat.deepseek.com/',active:true}
];
const POSITIVE=['migliore','consigliato','affidabile','esperto','qualificato','ottimo','eccellente','autorevole','specializzato','efficace','professionale','competente','consolidato'];
const NEGATIVE=['scarso','negativo','sconsigliato','inaffidabile','problema','rischio','debole','insufficiente','critica','limitato','peggiore'];
const DIRECTORY_DOMAINS=['sortlist','prontopro','paginegialle','yelp','clutch','trustpilot','addlance','freelancer','superprof','tuttocitta'];
const SOCIAL_DOMAINS=['linkedin','facebook','instagram','x.com','twitter','youtube','tiktok'];
const NEWS_HINTS=['news','giornale','corriere','repubblica','ansa','quotidiano','press','magazine'];
const UI_NOISE_PATTERNS=[/^apri$/i,/^chiuso$/i,/^aperto$/i,/^anteprima della mappa/i,/^visualizza altro$/i,/^indicazioni$/i,/^sito web$/i,/^chiama$/i,/^salva$/i,/^[★☆\s]+\d[.,]\d$/i,/^\+\d+$/];
const TEMPLATE_NAMES={gap:'Gap analysis GEO',optimize:'Ottimizzazione pagina',sources:'Analisi fonti',competitors:'Analisi concorrenti',faq:'Creazione FAQ',schema:'Schema markup',digitalpr:'Piano digital PR',local:'Citazioni locali',brief:'Brief contenuto',eeat:'Miglioramento E-E-A-T'};
let state;let currentSection='dashboard';let currentWizardStep=1;let analysisDraft=null;let generatedPrompt='';let selectedResultIds=new Set();let selectedOpportunityIds=new Set();let reportSelectedCheckIds=new Set();let reportSelectedOpportunityIds=new Set();let reportProjectChoice='';let reportRangeChoice='all';

/* ------------------------------ Utilities ------------------------------ */
const Utils={
 uid(){return crypto?.randomUUID?crypto.randomUUID():'id-'+Date.now().toString(36)+Math.random().toString(36).slice(2)},
 now(){return new Date().toISOString()},
 esc(value=''){return String(value).replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]))},
 lines(value=''){return String(value).split(/\r?\n|,/).map(v=>v.trim()).filter(Boolean)},
 unique(arr){return [...new Set(arr.filter(Boolean))]},
 slug(value=''){return String(value).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,' ').trim()},
 domain(value=''){try{return new URL(value.includes('://')?value:'https://'+value).hostname.replace(/^www\./,'').toLowerCase()}catch{return String(value).toLowerCase().replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0]}},
 urls(text=''){return Utils.unique((String(text).match(/https?:\/\/[^\s<>()\[\]{}"']+/gi)||[]).map(u=>u.replace(/[.,;:!?]+$/,'')))},
 count(text,needle){if(!needle)return 0;const re=new RegExp(String(needle).replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');return(String(text).match(re)||[]).length},
 date(value,withTime=false){if(!value)return'—';try{return new Intl.DateTimeFormat('it-IT',withTime?{dateStyle:'short',timeStyle:'short'}:{dateStyle:'medium'}).format(new Date(value))}catch{return value}},
 localDateTime(value){const d=value?new Date(value):new Date();const z=n=>String(n).padStart(2,'0');return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}T${z(d.getHours())}:${z(d.getMinutes())}`},
 csv(rows){return rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n')},
 download(name,content,type='text/plain;charset=utf-8'){const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove()},0)},
 form(form){return Object.fromEntries(new FormData(form).entries())},
 similarity(a,b){a=Utils.slug(a);b=Utils.slug(b);if(!a||!b)return 0;if(a===b)return 1;const A=new Set(a.split(' ')),B=new Set(b.split(' '));const common=[...A].filter(x=>B.has(x)).length;return common/Math.max(A.size,B.size)},
 excerpt(text,index,length=110){if(index<0)return'';const start=Math.max(0,index-length);const end=Math.min(text.length,index+length);return (start?'…':'')+text.slice(start,end).replace(/\s+/g,' ').trim()+(end<text.length?'…':'')},
 debounce(fn,wait=250){let timer;return(...args)=>{clearTimeout(timer);timer=setTimeout(()=>fn(...args),wait)}},
 storage(){const bytes=new Blob([JSON.stringify(state)]).size;return{bytes,kb:(bytes/1024).toFixed(1),pct:Math.min(100,bytes/(5*1024*1024)*100)}},
 toast(message,type=''){const el=document.createElement('div');el.className='toast '+type;el.textContent=message;document.getElementById('toastZone').appendChild(el);setTimeout(()=>el.remove(),3500)}
};
state=loadState();

/* ------------------------------ State ------------------------------ */
function defaultState(){return{version:VERSION,settings:{theme:'auto',consultant:'',agency:'',website:'',email:'',phone:'',primary:'#2853d7',secondary:'#173ba8',footer:'Report GEO – dati da verificare',logo:'',onboardingDismissed:false,analysis:{cleanNoise:true,dedupeBlocks:true,minimumResponseLength:120,anomalyThreshold:20},scoreWeights:{brand:35,domain:25,position:15,mentions:10,competitors:10,sentiment:5}},projects:[],prompts:[],checks:[],opportunities:[],platforms:DEFAULT_PLATFORMS,savedFilters:[],backups:[],checkDraft:{},createdAt:Utils.now(),updatedAt:Utils.now()}}
function migrate(source){const base=defaultState();const s=source||{};return{...base,...s,version:VERSION,settings:{...base.settings,...(s.settings||{}),analysis:{...base.settings.analysis,...(s.settings?.analysis||{})},scoreWeights:{...base.settings.scoreWeights,...(s.settings?.scoreWeights||{})}},platforms:s.platforms?.length?s.platforms:DEFAULT_PLATFORMS,projects:(s.projects||[]).map(p=>({...p,brandVariants:p.brandVariants||[],competitors:p.competitors||[],services:p.services||[],nearbyLocations:p.nearbyLocations||[],homonymExclusions:p.homonymExclusions||[],contextTerms:p.contextTerms||[]})),prompts:s.prompts||[],checks:(s.checks||[]).map(c=>({...c,status:c.status||'Attiva',manualReview:c.manualReview||{},evidence:c.evidence||{},sourceDetails:c.sourceDetails||[],servicesPresent:c.servicesPresent||[],locationsPresent:c.locationsPresent||[],confidence:c.confidence??0,responseType:c.responseType||'Non classificata',testEnvironment:c.testEnvironment||'not-verified'})),opportunities:s.opportunities||[],savedFilters:s.savedFilters||[],backups:s.backups||[],checkDraft:s.checkDraft||{}}}
function loadState(){try{const raw=localStorage.getItem(APP_KEY);return raw?migrate(JSON.parse(raw)):defaultState()}catch(error){console.error(error);return defaultState()}}
function saveState(silent=false){try{state.version=VERSION;state.updatedAt=Utils.now();localStorage.setItem(APP_KEY,JSON.stringify(state));if(!silent)Utils.toast('Dati salvati','success');return true}catch(error){Utils.toast('Spazio locale insufficiente: esporta un backup e riduci i dati.','error');return false}}
function projectBy(id){return state.projects.find(x=>x.id===id)}function promptBy(id){return state.prompts.find(x=>x.id===id)}function platformBy(id){return state.platforms.find(x=>x.id===id)||{id,name:id,url:'#'}}

/* ------------------------------ Analyzer ------------------------------ */
const Analyzer={
 cleanText(text){
   const original=String(text||'').replace(/\u00a0/g,' ');let lines=original.split(/\r?\n/).map(x=>x.trim());
   if(state.settings.analysis.cleanNoise)lines=lines.filter(line=>line&&!UI_NOISE_PATTERNS.some(re=>re.test(line)));
   const compact=[];let previous='';for(const line of lines){const key=Utils.slug(line);if(!key)continue;if(key===previous)continue;compact.push(line);previous=key}
   let result=compact.join('\n');
   if(state.settings.analysis.dedupeBlocks){
     const blocks=result.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean);const seen=new Set();result=blocks.filter(b=>{const k=Utils.slug(b).slice(0,220);if(seen.has(k))return false;seen.add(k);return true}).join('\n\n');
     const seq=result.split('\n');for(let size=Math.min(20,Math.floor(seq.length/2));size>=4;size--){const first=seq.slice(0,size).map(Utils.slug).join('|');const second=seq.slice(size,size*2).map(Utils.slug).join('|');if(first&&first===second){result=seq.slice(size).join('\n');break}}
   }
   return result.trim();
 },
 variants(project){
   const list=[project.brand,...(project.brandVariants||[])];
   const words=Utils.slug(project.brand).split(' ');if(words.length>=2)list.push(words.join(' '));return Utils.unique(list.map(x=>String(x||'').trim()).filter(x=>x.length>2));
 },
 findVariant(text,project){
   const low=Utils.slug(text);const evidence=[];let mentions=0;let firstIndex=-1;let found='';let exact=false;
   for(const variant of Analyzer.variants(project)){
     const rawIndex=text.toLowerCase().indexOf(variant.toLowerCase());const normalizedIndex=low.indexOf(Utils.slug(variant));const count=Utils.count(text,variant);
     if(count){mentions+=count;exact=true;if(firstIndex<0||rawIndex<firstIndex){firstIndex=rawIndex;found=variant}}
     else if(normalizedIndex>=0&&Utils.slug(variant).length>=8){mentions+=1;if(firstIndex<0){firstIndex=Math.max(0,normalizedIndex);found=variant}}
   }
   if(firstIndex>=0)evidence.push(Utils.excerpt(text,firstIndex));
   const exclusions=(project.homonymExclusions||[]).map(Utils.slug);const nearby=Utils.slug(Utils.excerpt(text,firstIndex,180));const excluded=firstIndex>=0&&exclusions.some(x=>x&&nearby.includes(x));
   const contextTerms=[...(project.contextTerms||[]),...(project.services||[]),project.location,Utils.domain(project.domain)].filter(Boolean).map(Utils.slug);const contextHit=firstIndex>=0&&contextTerms.some(x=>x&&nearby.includes(x));
   const homonymRisk=excluded||((Utils.slug(project.brand).split(' ').length===1||Utils.slug(project.brand).length<8)&&!contextHit);
   return{mentioned:mentions>0&&!excluded,mentions:excluded?0:mentions,firstIndex,found,evidence,exact,contextHit,homonymRisk,excluded};
 },
 classifySource(url,project){const domain=Utils.domain(url);let type='Sito web';let quality=3;let reason='Dominio esterno generico';if(domain===Utils.domain(project.domain)){type='Sito del brand';quality=5;reason='Fonte proprietaria del progetto'}else if(SOCIAL_DOMAINS.some(x=>domain.includes(x))){type='Social';quality=2;reason='Profilo o contenuto social'}else if(DIRECTORY_DOMAINS.some(x=>domain.includes(x))){type='Directory';quality=2;reason='Directory o marketplace'}else if(NEWS_HINTS.some(x=>domain.includes(x))){type='Editore / news';quality=4;reason='Possibile fonte editoriale'}else if(/\.gov\.|\.gov$|\.edu\.|\.edu$|\.ac\./.test(domain)){type='Istituzionale / accademica';quality=5;reason='Dominio istituzionale o accademico'}else if(domain.endsWith('.org')){type='Organizzazione';quality=4;reason='Dominio di organizzazione'}return{url,domain,type,quality,reason}},
 responseType(text,urls){const low=Utils.slug(text);const listCount=(text.match(/(?:^|\n)\s*(?:\d+[.)]|[-•*])\s+/g)||[]).length;if(/mappa|marketing consultant|marketing agency|internet marketing service/.test(low))return'Local Pack / risultati locali';if(/confronto|versus| vs |alternativ/.test(low))return'Confronto';if(listCount>=3)return'Elenco editoriale';if(urls.length>=3)return'Risposta con fonti';if(/non posso|non dispongo|non ho accesso/.test(low))return'Risposta limitata';return'Risposta narrativa'},
 analyze(project,response,sourcesText=''){
   const clean=Analyzer.cleanText(response);const low=clean.toLowerCase();const brand=Analyzer.findVariant(clean,project);const domain=Utils.domain(project.domain);const urls=Utils.unique([...Utils.urls(clean),...Utils.urls(sourcesText)]);const domains=urls.map(Utils.domain);const domainCited=domains.some(d=>d===domain||d.endsWith('.'+domain));
   const domainIndex=domainCited?clean.toLowerCase().indexOf(domain):-1;const competitors=[];const competitorEvidence={};for(const competitor of project.competitors||[]){const candidate=String(competitor);const cd=Utils.domain(candidate);const index=Math.max(low.indexOf(candidate.toLowerCase()),cd?low.indexOf(cd):-1);if(index>=0||domains.includes(cd)){competitors.push(candidate);competitorEvidence[candidate]=[Utils.excerpt(clean,index>=0?index:0)]}}
   const services=(project.services||[]).filter(s=>low.includes(String(s).toLowerCase()));const locations=[project.location,...(project.nearbyLocations||[])].filter(Boolean).filter(x=>low.includes(String(x).toLowerCase()));
   const words=Utils.slug(clean).split(/\s+/);let positive=0,negative=0;words.forEach(w=>{if(POSITIVE.includes(w))positive++;if(NEGATIVE.includes(w))negative++});const sentiment=positive>negative?'Positivo':negative>positive?'Negativo':'Neutro';
   let position=0;if(brand.firstIndex>=0){const before=clean.slice(0,brand.firstIndex);position=(before.match(/(?:^|\n)\s*(?:\d+[.)]|[-•*])\s+/g)||[]).length+1;if(position>30)position=1}
   const sourceDetails=urls.map(u=>Analyzer.classifySource(u,project));const responseType=Analyzer.responseType(clean,urls);
   let confidence=35;if(clean.length>=300)confidence+=10;if(brand.exact)confidence+=15;if(domainCited)confidence+=15;if(urls.length)confidence+=10;if(brand.contextHit)confidence+=10;if(brand.homonymRisk)confidence-=25;if(clean.length<state.settings.analysis.minimumResponseLength)confidence-=20;confidence=Math.max(0,Math.min(100,confidence));
   const evidence={brand:brand.evidence,domain:domainIndex>=0?[Utils.excerpt(clean,domainIndex)]:[],competitors:competitorEvidence,services:Object.fromEntries(services.map(s=>[s,[Utils.excerpt(clean,low.indexOf(String(s).toLowerCase()))]])),locations:Object.fromEntries(locations.map(l=>[l,[Utils.excerpt(clean,low.indexOf(String(l).toLowerCase()))]]))};
   const result={cleanResponse:clean,brandMentioned:brand.mentioned,domainCited,position,mentions:brand.mentions,foundVariant:brand.found,competitors,urls,domains:Utils.unique(domains),sourceDetails,sentiment,responseType,servicesPresent:services,locationsPresent:locations,locationPresent:locations.length>0,evidence,confidence,homonymRisk:brand.homonymRisk,homonymExcluded:brand.excluded};result.score=Analyzer.score(result);return result;
 },
 score(data){const w=state.settings.scoreWeights;let score=0;score+=data.brandMentioned?w.brand:0;score+=data.domainCited?w.domain:0;if(data.brandMentioned){score+=w.position*(data.position<=1?1:data.position===2?.8:data.position===3?.65:data.position<=5?.45:.25);score+=w.mentions*Math.min(1,(data.mentions||0)/3)}const c=(data.competitors||[]).length;if(data.brandMentioned)score+=w.competitors*(c===0?1:c===1?.75:c===2?.5:.25);else if(c===0)score+=w.competitors*.2;score+=w.sentiment*(data.sentiment==='Positivo'?1:data.sentiment==='Neutro'?.5:0);return Math.max(0,Math.min(100,Math.round(score)))},
 highlight(text,project,analysis){let html=Utils.esc(text);const replacements=[];Analyzer.variants(project).forEach(v=>replacements.push({term:v,cls:'mark-brand'}));if(project.domain)replacements.push({term:Utils.domain(project.domain),cls:'mark-domain'});(analysis.competitors||[]).forEach(v=>replacements.push({term:v,cls:'mark-competitor'}));(analysis.servicesPresent||[]).forEach(v=>replacements.push({term:v,cls:'mark-service'}));(analysis.locationsPresent||[]).forEach(v=>replacements.push({term:v,cls:'mark-location'}));replacements.sort((a,b)=>b.term.length-a.term.length).forEach(({term,cls})=>{if(!term)return;const escaped=Utils.esc(term).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');html=html.replace(new RegExp(escaped,'gi'),m=>`<mark class="${cls}">${m}</mark>`)});return html}
};

/* ------------------------------ Derived data ------------------------------ */
function latestPrevious(check){return state.checks.filter(c=>c.projectId===check.projectId&&c.promptId===check.promptId&&c.platformId===check.platformId&&c.id!==check.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]}
function anomalies(){const threshold=Number(state.settings.analysis.anomalyThreshold||20);const items=[];for(const check of state.checks){const previous=latestPrevious(check);if(!previous)continue;const delta=(check.score||0)-(previous.score||0);if(Math.abs(delta)>=threshold)items.push({type:'score',severity:Math.abs(delta)>=35?'P1':'P2',check,previous,title:`Variazione GEO Score ${delta>0?'+':''}${delta}`,detail:`Lo score è passato da ${previous.score} a ${check.score}. Verifica se sono cambiate fonti, posizione o formulazione della risposta.`});if(check.brandMentioned!==previous.brandMentioned)items.push({type:'brand',severity:'P1',check,previous,title:check.brandMentioned?'Il brand è comparso':'Il brand è scomparso',detail:'Confronta le due risposte e registra le fonti nuove o rimosse.'});const newSources=(check.urls||[]).filter(x=>!(previous.urls||[]).includes(x));if(newSources.length)items.push({type:'source',severity:'P3',check,previous,title:`${newSources.length} nuova/e fonte/i`,detail:newSources.map(Utils.domain).join(', ')});const newCompetitors=(check.competitors||[]).filter(x=>!(previous.competitors||[]).includes(x));if(newCompetitors.length)items.push({type:'competitor',severity:'P2',check,previous,title:'Nuovi concorrenti nella risposta',detail:newCompetitors.join(', ')})}return items.sort((a,b)=>new Date(b.check.date)-new Date(a.check.date))}
function projectBenchmark(projectId){const checks=state.checks.filter(c=>c.projectId===projectId&&!c.archived);const avg=checks.length?Math.round(checks.reduce((s,c)=>s+(c.score||0),0)/checks.length):0;const brandRate=checks.length?Math.round(checks.filter(c=>c.brandMentioned).length/checks.length*100):0;const domainRate=checks.length?Math.round(checks.filter(c=>c.domainCited).length/checks.length*100):0;const positions=checks.filter(c=>c.position>0).map(c=>c.position);const avgPosition=positions.length?(positions.reduce((a,b)=>a+b,0)/positions.length).toFixed(1):'—';const competitorCounts={};checks.flatMap(c=>c.competitors||[]).forEach(x=>competitorCounts[x]=(competitorCounts[x]||0)+1);const topCompetitor=Object.entries(competitorCounts).sort((a,b)=>b[1]-a[1])[0]?.[0]||'—';return{checks:checks.length,avg,brandRate,domainRate,avgPosition,topCompetitor}}
function dataQualityIssues(){const issues=[];const seen=new Map();for(const check of state.checks){const key=[check.projectId,check.promptId,check.platformId,new Date(check.date).toISOString().slice(0,10),Utils.slug(check.response).slice(0,180)].join('|');if(seen.has(key))issues.push({kind:'duplicate',priority:'P2',title:'Possibile verifica duplicata',detail:'Stessa combinazione di progetto, prompt, AI, giorno e testo.',checkIds:[seen.get(key),check.id]});else seen.set(key,check.id);if(!(check.response||'').trim()||check.response.length<state.settings.analysis.minimumResponseLength)issues.push({kind:'short',priority:'P1',title:'Risposta assente o troppo breve',detail:'L’analisi può essere incompleta.',checkId:check.id});if(!(check.urls||[]).length)issues.push({kind:'sources',priority:'P3',title:'Fonti non registrate',detail:'Controlla se la piattaforma mostrava citazioni o link.',checkId:check.id});if(check.brandMentioned&&check.mentions===0)issues.push({kind:'inconsistent',priority:'P1',title:'Dato incoerente',detail:'Brand indicato come presente ma menzioni pari a zero.',checkId:check.id});if(check.domainCited&&!(check.urls||[]).some(u=>Utils.domain(u)===Utils.domain(projectBy(check.projectId)?.domain||'')))issues.push({kind:'domain',priority:'P2',title:'Dominio citato senza URL corrispondente',detail:'Verifica la correzione manuale o aggiungi la fonte.',checkId:check.id});if(!check.manualReview?.completed)issues.push({kind:'review',priority:'P3',title:'Verifica manuale non completata',detail:'Conferma brand, dominio, concorrenti e fonti.',checkId:check.id});if(['normal-account','not-verified'].includes(check.testEnvironment||'not-verified'))issues.push({kind:'environment',priority:check.testEnvironment==='normal-account'?'P1':'P2',title:'Ambiente di test non neutrale',detail:environmentMeta(check.testEnvironment||'not-verified').message,checkId:check.id})}for(const prompt of state.prompts){if(!state.checks.some(c=>c.promptId===prompt.id))issues.push({kind:'untested',priority:'P2',title:'Prompt mai testato',detail:prompt.text,promptId:prompt.id})}return issues}
function priorityDetails(priority){return {P1:{label:'Urgente',when:'Da iniziare entro 7 giorni',effort:'Medio–alto',meaning:'Blocca o limita direttamente la possibilità che il brand venga citato.'},P2:{label:'Alta',when:'Da completare entro 30 giorni',effort:'Medio',meaning:'Migliora segnali importanti, ma richiede più verifiche prima di attribuire la causa.'},P3:{label:'Media',when:'Da pianificare entro 60 giorni',effort:'Basso–medio',meaning:'Rafforza autorevolezza e qualità delle fonti nel medio periodo.'},P4:{label:'Bassa',when:'Da valutare entro 90 giorni',effort:'Basso',meaning:'Ottimizzazione incrementale, utile dopo aver completato le attività principali.'}}[priority]||{label:'Da valutare',when:'Da pianificare',effort:'Variabile',meaning:'Richiede verifica manuale.'}}
function generateOpportunities(){const previousStatus=new Map((state.opportunities||[]).map(o=>[`${o.checkId}|${o.title}`,o.status]));const output=[];for(const check of state.checks){const project=projectBy(check.projectId);const prompt=promptBy(check.promptId);if(!project||!prompt)continue;const add=(priority,title,why,action,verify,steps,expectedOutcome,notes='')=>output.push({id:`${check.id}-${Utils.slug(title).slice(0,30)}`,projectId:check.projectId,promptId:check.promptId,checkId:check.id,priority,title,why,action,verify,steps,expectedOutcome,notes,status:previousStatus.get(`${check.id}|${title}`)||'Da fare'});
if(!check.brandMentioned)add('P1','Il brand non compare',`Per il prompt “${prompt.text}” l’AI cita altri soggetti ma non ${project.brand}.`,`Costruisci una pagina che risponda in modo diretto alla query e renda verificabile perché il brand è pertinente.`, `Ripeti lo stesso prompt in almeno 3 sessioni neutrali e su almeno 2 piattaforme AI dopo l’indicizzazione.`,['Controlla che la pagina target abbia un H1 coerente con la query e una risposta chiara nelle prime 120 parole.','Aggiungi servizi, località, destinatari, processo di lavoro e prove reali come case study, recensioni o risultati documentabili.','Collega la pagina da home, pagine servizio e articoli pertinenti con anchor descrittive.','Richiedi indicizzazione e attendi un ciclo ragionevole prima di ripetere il test.'],'Aumentare la probabilità che l’AI associ il brand alla query senza inventare dati.','Una singola nuova citazione non dimostra stabilità: confronta più sessioni.');
if(check.brandMentioned&&!check.domainCited)add('P1','Brand presente ma sito non citato','Il nome compare, ma l’utente non riceve un collegamento al sito ufficiale.','Rendi inequivocabile l’associazione tra nome, dominio, servizi e profili esterni.', 'Controlla se nelle verifiche successive compare il dominio ufficiale tra le fonti o nel testo.',['Uniforma nome, descrizione, URL e contatti su sito, Google Business Profile e profili professionali.','Migliora pagina Chi sono/Chi siamo con dati verificabili, autore, competenze, contatti e link al dominio canonico.','Implementa dati strutturati Person o Organization coerenti con le informazioni visibili.','Ottieni citazioni esterne pertinenti che menzionino sia il brand sia il dominio ufficiale.'],'Fare in modo che l’AI non riconosca solo il nome, ma sappia collegarlo alla fonte ufficiale.');
if((check.competitors||[]).length)add('P2','Analizzare i concorrenti citati',`Sono presenti: ${check.competitors.join(', ')}.`,`Studia perché questi soggetti sono facili da riconoscere e citare, senza copiarne i contenuti.`,`Confronta la pagina aggiornata con una checklist e ripeti il prompt identico.`,['Apri le fonti citate dall’AI per i primi 3 concorrenti.','Registra struttura, entità, recensioni, dati concreti, directory e segnali locali presenti.','Evidenzia ciò che manca nel tuo sito ma che puoi dimostrare con dati reali.','Aggiorna la pagina target e crea eventuali contenuti di supporto.'],'Colmare gap informativi e di autorevolezza che possono favorire i concorrenti.');
if(!(check.urls||[]).length)add('P2','Fonti non disponibili','La risposta non contiene URL registrati, quindi non è possibile capire quali fonti abbiano sostenuto la selezione.','Ripeti il test chiedendo esplicitamente fonti verificabili e salva ogni URL.', 'La verifica è completa quando ogni fonte ha URL, dominio e tipologia.',['Usa un prompt che richieda fonti pubbliche e aggiornate.','Apri ogni citazione e verifica che supporti davvero l’affermazione.','Salva URL, dominio, tipologia e qualità della fonte.','Scarta fonti non accessibili o non pertinenti.'],'Rendere l’analisi ripetibile e distinguere una semplice menzione da una citazione documentata.');
if(!(check.servicesPresent||[]).length&&project.services?.length)add('P2','Servizi del brand non riconosciuti',`Nella risposta non compaiono i servizi configurati: ${project.services.join(', ')}.`,`Rendi esplicita e verificabile l’associazione tra brand e servizi prioritari.`,`Cerca il brand insieme a ciascun servizio e registra se l’associazione compare.`,['Assegna una pagina primaria a ogni servizio importante.','Descrivi per chi è il servizio, problema risolto, processo, limiti e prova concreta.','Aggiungi collegamenti interni tra servizio, case study, FAQ e pagina autore.','Controlla title, H1, introduzione e dati strutturati per coerenza.'],'Ridurre l’ambiguità sul posizionamento del brand e sui servizi realmente offerti.');
if(!(check.locationsPresent||[]).length&&project.location)add('P2','Segnale geografico debole',`La risposta non associa chiaramente il risultato a ${project.location}.`,`Rafforza i segnali locali coerenti e verificabili.`,`Ripeti il prompt specificando ${project.location} e confronta presenza, posizione e fonti.`,['Controlla coerenza di nome, indirizzo e contatti sul sito e sui profili locali.','Crea o migliora una pagina locale utile, non una pagina duplicata con sola sostituzione della città.','Aggiungi testimonianze locali verificabili, aree servite e riferimenti territoriali reali.','Ottieni citazioni da fonti locali pertinenti, associazioni o partner.'],'Aumentare la chiarezza dell’associazione tra brand, servizio e area geografica.');
const lowQuality=(check.sourceDetails||[]).filter(s=>s.quality<=2);if(lowQuality.length)add('P3','Dipendenza da directory o social',`Tra le fonti compaiono ${lowQuality.map(s=>s.domain).join(', ')}.`,`Diversifica le fonti con segnali editoriali, professionali e istituzionali pertinenti.`,`Verifica se nelle risposte future aumentano fonti indipendenti di qualità superiore.`,['Individua associazioni, partner, media locali e portali verticali pertinenti.','Prepara dati, case study o insight originali che possano essere citati.','Proponi collaborazioni editoriali o contenuti con firma e link ufficiale.','Monitora quali nuove fonti vengono effettivamente richiamate dalle AI.'],'Ridurre la dipendenza da fonti deboli e aumentare la credibilità del brand.');}
state.opportunities=output;saveState(true);return output}

/* ------------------------------ UI helpers ------------------------------ */
function field(name,label,value='',required=false,placeholder='',type='text',help=''){return `<div class="field"><label for="${name}">${Utils.esc(label)}${required?' *':''}</label><input id="${name}" name="${name}" type="${type}" value="${Utils.esc(value)}" placeholder="${Utils.esc(placeholder)}" ${required?'required':''}>${help?`<div class="help">${Utils.esc(help)}</div>`:''}</div>`}
function textareaField(name,label,value='',help='',rows=5){return `<div class="field full"><label for="${name}">${Utils.esc(label)}</label><textarea id="${name}" name="${name}" rows="${rows}">${Utils.esc(value)}</textarea>${help?`<div class="help">${Utils.esc(help)}</div>`:''}</div>`}
function options(items,value,label=x=>x.name){return items.map(x=>`<option value="${Utils.esc(x.id)}" ${x.id===value?'selected':''}>${Utils.esc(label(x))}</option>`).join('')}
function badge(text,type=''){return `<span class="badge ${type}">${Utils.esc(text)}</span>`}
function metric(label,value,sub=''){return `<div class="card metric"><div class="metric-label">${Utils.esc(label)}</div><div class="metric-value">${value}</div><div class="metric-change">${sub}</div></div>`}
function empty(title,text,button=''){return `<div class="empty"><strong>${Utils.esc(title)}</strong>${Utils.esc(text)}${button?`<div style="margin-top:13px">${button}</div>`:''}</div>`}
function modal(title,body,actions=''){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalActions').innerHTML=actions;document.getElementById('modalBackdrop').classList.add('show');setTimeout(()=>document.getElementById('modalClose').focus(),0)}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('show')}
function setSection(id){currentSection=id;document.querySelectorAll('.section').forEach(s=>s.classList.toggle('active',s.id===id));document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.section===id));document.getElementById('pageTitle').textContent=PAGES[id][0];document.getElementById('pageSubtitle').textContent=PAGES[id][1];render(id);closeMobile()}
function render(id){({dashboard:renderDashboard,onboarding:renderOnboarding,projects:renderProjects,prompts:renderPrompts,'new-check':renderNewCheck,results:renderResults,matrix:renderMatrix,compare:renderCompare,opportunities:renderOpportunities,quality:renderQuality,generator:renderGenerator,reports:renderReports,settings:renderSettings,backup:renderBackup,guide:renderGuide}[id]||(()=>{}))()}
function applyTheme(){let theme=state.settings.theme;if(theme==='auto')theme=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';document.documentElement.dataset.theme=theme;document.documentElement.style.setProperty('--accent',state.settings.primary||'#2853d7');document.documentElement.style.setProperty('--accent-2',state.settings.secondary||'#173ba8')}
function closeMobile(){document.getElementById('sidebar').classList.remove('open');document.getElementById('mobileOverlay').classList.remove('show')}

/* ------------------------------ Dashboard / onboarding ------------------------------ */
function renderDashboard(){const checks=state.checks.filter(c=>!c.archived);const avg=checks.length?Math.round(checks.reduce((s,c)=>s+(c.score||0),0)/checks.length):0;const brandRate=checks.length?Math.round(checks.filter(c=>c.brandMentioned).length/checks.length*100):0;const domainRate=checks.length?Math.round(checks.filter(c=>c.domainCited).length/checks.length*100):0;const quality=dataQualityIssues();const anomalyList=anomalies().slice(0,5);const projectRows=state.projects.filter(p=>!p.archived).map(p=>[p,projectBenchmark(p.id)]).sort((a,b)=>b[1].avg-a[1].avg);
 document.getElementById('dashboard').innerHTML=`<div class="toolbar"><button class="btn btn-primary" data-go="new-check">＋ Nuova verifica</button><button class="btn" data-go="onboarding">Configurazione guidata</button><div class="spacer"></div>${!state.settings.onboardingDismissed&&(!state.projects.length||!state.prompts.length)?badge('Configurazione incompleta','warning'):''}</div>
 <div class="grid grid-4">${metric('Progetti attivi',state.projects.filter(p=>!p.archived).length,'Brand e domini monitorati')}${metric('Verifiche',checks.length,'Risposte AI registrate')}${metric('GEO Score medio',avg+'/100','Metrica proprietaria')}${metric('Presenza brand',brandRate+'%',`Dominio citato: ${domainRate}%`)}</div>
 <div class="grid grid-2" style="margin-top:16px"><div class="card"><div class="card-header"><div><div class="card-title">Benchmark per progetto</div><div class="card-sub">Score, quota di presenza e posizione media</div></div></div>${projectRows.length?projectRows.map(([p,b])=>`<div class="bar-row"><div><strong>${Utils.esc(p.name)}</strong><div class="help">Brand ${b.brandRate}% · Pos. ${b.avgPosition}</div></div><div class="bar"><span style="width:${b.avg}%"></span></div><strong>${b.avg}</strong></div>`).join(''):empty('Nessun benchmark','Salva almeno una verifica.')}</div>
 <div class="card"><div class="card-header"><div><div class="card-title">Anomalie recenti</div><div class="card-sub">Cambiamenti che meritano controllo</div></div><div class="spacer"></div><button class="btn btn-sm" data-go="compare">Apri confronto</button></div>${anomalyList.length?anomalyList.map(a=>`<div class="anomaly-item ${a.severity==='P1'?'priority-P1':'priority-P2'}"><strong>${Utils.esc(a.title)}</strong><div class="help">${Utils.esc(a.detail)}</div><button class="btn btn-sm" data-view-check="${a.check.id}" style="margin-top:8px">Dettagli</button></div>`).join(''):empty('Nessuna anomalia','Servono almeno due verifiche confrontabili.')}</div></div>
 <div class="grid grid-2" style="margin-top:16px"><div class="card"><div class="card-header"><div><div class="card-title">Qualità dati</div><div class="card-sub">Elementi da correggere prima del reporting</div></div><div class="spacer"></div><button class="btn btn-sm" data-go="quality">Centro qualità</button></div>${quality.length?`<div class="score-large">${quality.length}</div><div class="muted">segnalazioni aperte</div>`:empty('Dati coerenti','Non sono stati rilevati problemi evidenti.')}</div><div class="card"><div class="card-header"><div><div class="card-title">Copertura Prompt–AI</div><div class="card-sub">Verifiche mancanti sulle piattaforme attive</div></div><div class="spacer"></div><button class="btn btn-sm" data-go="matrix">Apri matrice</button></div>${renderCoverageSummary()}</div></div>
 <div class="card" style="margin-top:16px"><div class="card-header"><div><div class="card-title">Verifiche recenti</div><div class="card-sub">Ultimi risultati salvati</div></div><div class="spacer"></div><button class="btn btn-sm" data-go="results">Vedi tutti</button></div>${resultsTable([...checks].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,6),false,true)}</div>`}
function renderCoverageSummary(){const active=state.platforms.filter(p=>p.active);const total=state.prompts.length*active.length;if(!total)return empty('Matrice non disponibile','Crea prompt e attiva almeno una piattaforma.');const covered=state.prompts.reduce((n,p)=>n+active.filter(ai=>state.checks.some(c=>c.promptId===p.id&&c.platformId===ai.id)).length,0);const pct=Math.round(covered/total*100);return `<div class="score-large">${pct}%</div><div class="progress"><span style="width:${pct}%"></span></div><div class="help" style="margin-top:8px">${covered} combinazioni testate su ${total}</div>`}
function renderOnboarding(){const steps=[{title:'Crea il progetto',done:state.projects.length>0,text:'Inserisci brand, dominio, servizi, località, concorrenti e regole per gli omonimi.',go:'projects'},{title:'Aggiungi i prompt',done:state.prompts.length>0,text:'Salva le query reali che un potenziale cliente potrebbe porre.',go:'prompts'},{title:'Esegui una verifica',done:state.checks.length>0,text:'Apri l’AI, incolla il prompt e riporta risposta e fonti.',go:'new-check'},{title:'Controlla qualità e report',done:state.checks.length>0&&dataQualityIssues().length===0,text:'Completa la checklist manuale e correggi eventuali anomalie.',go:'quality'}];const done=steps.filter(s=>s.done).length;document.getElementById('onboarding').innerHTML=`<div class="card"><div class="card-header"><div><div class="card-title">Configurazione iniziale</div><div class="card-sub">${done} passaggi completati su ${steps.length}</div></div></div><div class="progress"><span style="width:${done/steps.length*100}%"></span></div></div><div class="onboarding-steps" style="margin-top:16px">${steps.map((s,i)=>`<div class="onboarding-step ${s.done?'done':''}">${badge(s.done?'Completato':'Da fare',s.done?'success':'warning')}<h3>${i+1}. ${Utils.esc(s.title)}</h3><p>${Utils.esc(s.text)}</p><button class="btn ${s.done?'':'btn-primary'}" data-go="${s.go}">${s.done?'Rivedi':'Inizia'}</button></div>`).join('')}</div><div class="notice" style="margin-top:16px">L’app non interroga automaticamente le piattaforme AI: i risultati vengono incollati manualmente per mantenere controllo su sessione, località e fonti.</div>`}

/* ------------------------------ Projects ------------------------------ */
function renderProjects(){document.getElementById('projects').innerHTML=`<div class="toolbar"><button class="btn btn-primary" data-action="new-project">＋ Nuovo progetto</button><input id="projectSearch" placeholder="Cerca progetto…" style="max-width:260px"><select id="projectFilter"><option value="all">Tutti</option><option value="active">Attivi</option><option value="archived">Archiviati</option></select><div class="spacer"></div></div><div class="project-list" id="projectList">${projectCards()}</div>`}
function projectCards(){if(!state.projects.length)return empty('Nessun progetto','Crea il primo progetto per iniziare.','<button class="btn btn-primary" data-action="new-project">Nuovo progetto</button>');return state.projects.map(p=>{const b=projectBenchmark(p.id);return `<article class="project-card" data-search="${Utils.esc(Utils.slug(JSON.stringify(p)))}" data-archived="${p.archived?'yes':'no'}"><div class="flex wrap gap-8"><h3>${Utils.esc(p.name)}</h3><div class="spacer"></div>${p.archived?badge('Archiviato','warning'):badge('Attivo','success')}</div><div class="project-domain">${Utils.esc(p.domain||'Dominio non indicato')}</div><div class="project-meta"><div><small>Verifiche</small><strong>${b.checks}</strong></div><div><small>Score medio</small><strong>${b.avg}</strong></div><div><small>Presenza brand</small><strong>${b.brandRate}%</strong></div><div><small>Posizione media</small><strong>${b.avgPosition}</strong></div></div><div class="help">Servizi: ${Utils.esc((p.services||[]).join(', ')||'—')}</div><div class="card-actions"><button class="btn btn-sm" data-start-project="${p.id}">Verifica</button><button class="btn btn-sm" data-edit-project="${p.id}">Modifica</button><button class="btn btn-sm" data-duplicate-project="${p.id}">Duplica</button><button class="btn btn-sm" data-archive-project="${p.id}">${p.archived?'Riattiva':'Archivia'}</button><button class="btn btn-sm btn-danger" data-delete-project="${p.id}">Elimina</button></div></article>`}).join('')}
function projectForm(p={}){return `<form id="projectForm" class="form-grid"><input type="hidden" name="id" value="${Utils.esc(p.id||'')}">${field('name','Nome progetto',p.name,true)}${field('client','Cliente',p.client||'')}${field('brand','Nome brand',p.brand,true,'Nome esatto da rilevare')}${field('domain','Dominio principale',p.domain,true,'esempio.it')}${field('targetUrl','Pagina da ottimizzare',p.targetUrl||'','','https://…','url')}${field('location','Località principale',p.location||'')}${field('market','Mercato',p.market||'Italia')}${field('language','Lingua',p.language||'Italiano')}${field('sector','Settore',p.sector||'')}${textareaField('brandVariants','Varianti del brand',(p.brandVariants||[]).join('\n'),'Una per riga: abbreviazioni, nome professionale, dominio senza estensione.',4)}${textareaField('competitors','Concorrenti',(p.competitors||[]).join('\n'),'Nomi o domini, uno per riga.',5)}${textareaField('services','Servizi principali',(p.services||[]).join('\n'),'Usati per analizzare l’associazione tra brand e servizi.',4)}${textareaField('nearbyLocations','Località correlate',(p.nearbyLocations||[]).join('\n'),'Provincia, regione o città vicine, una per riga.',3)}${textareaField('homonymExclusions','Omonimi da escludere',(p.homonymExclusions||[]).join('\n'),'Parole che indicano una persona o attività omonima non pertinente.',3)}${textareaField('contextTerms','Termini di contesto obbligatori',(p.contextTerms||[]).join('\n'),'Esempio: SEO, Bergamo, WordPress. Aumentano la precisione con nomi ambigui.',3)}${textareaField('description','Descrizione attività',p.description||'','Solo informazioni reali e verificabili.',4)}${textareaField('notes','Note',p.notes||'', '',3)}</form>`}

function inferQuickMeta(keyword,project){
 const k=String(keyword||'').trim();const l=k.toLowerCase();
 let category='Informativa',intent='Informativo',priority='P3';
 if(/miglior|migliore|consigliat|chi scegliere|quale scegliere|top\b/.test(l)){category='Comparativa';intent='Commerciale comparativo';priority='P1'}
 else if(/vicino a me|a [a-zà-ù' -]+$|in [a-zà-ù' -]+$/.test(l)){category='Locale';intent='Locale commerciale';priority='P1'}
 else if(/quanto costa|prezzo|preventivo|tariff/.test(l)){category='Commerciale';intent='Transazionale';priority='P2'}
 else if(/recension|opinioni|affidabile|è bravo/.test(l)){category='Reputazionale';intent='Reputazionale';priority='P2'}
 const known=[project?.location,...(project?.nearbyLocations||[])].filter(Boolean);
 const location=known.find(x=>l.includes(String(x).toLowerCase()))||project?.location||'';
 return {category,intent,priority,location};
}
function buildQuickPrompt(keyword,style,project){
 const q=String(keyword||'').trim().replace(/[.\s]+$/,'');
 if(style==='exact')return q.endsWith('?')?q:q+'?';
 if(style==='local')return `Usa la ricerca web.\n\n${q}${q.endsWith('?')?'':'?'}\n\nEsegui la ricerca come un potenziale cliente nel mercato ${project?.market||'italiano'}${project?.location?`, con riferimento a ${project.location}`:''}. Considera esclusivamente informazioni pubbliche, aggiornate e verificabili. Distingui professionisti specializzati da agenzie generaliste. Per ogni risultato indica nome, sito web, specializzazione, area servita, motivazione della selezione e fonti utilizzate. Non usare informazioni personali dell’utente o conversazioni precedenti.`;
 return `Usa la ricerca web.\n\n${q}${q.endsWith('?')?'':'?'}\n\nConsidera esclusivamente informazioni pubbliche, aggiornate e verificabili. Per ogni risultato indica nome, sito web, servizi principali, motivo della selezione e fonti utilizzate. Non basarti su informazioni personali dell’utente o su conversazioni precedenti.`;
}
function environmentMeta(value){
 const map={
  'anonymous':{label:'Anonimo senza login',penalty:0,type:'success',message:'Ambiente consigliato: riduce personalizzazione da memoria e cronologia.'},
  'temporary':{label:'Chat temporanea',penalty:5,type:'success',message:'Buona neutralità, ma verifica che la chat temporanea sia realmente attiva.'},
  'memory-off':{label:'Account con memoria disattivata',penalty:10,type:'info',message:'Accettabile, ma istruzioni personalizzate e altri segnali dell’account possono ancora influire.'},
  'normal-account':{label:'Account normale',penalty:30,type:'danger',message:'Risultato potenzialmente personalizzato da memoria, cronologia o istruzioni dell’account.'},
  'not-verified':{label:'Non verificato',penalty:20,type:'warning',message:'Ambiente non documentato: la comparabilità del test è ridotta.'}
 };return map[value]||map['not-verified'];
}
function applyEnvironmentConfidence(analysis,environment){const meta=environmentMeta(environment);return {...analysis,rawConfidence:analysis.confidence,confidence:Math.max(0,analysis.confidence-meta.penalty),environmentPenalty:meta.penalty,testEnvironment:environment}}
function neutralTestInstructions(){modal('Istruzioni per test neutrale',`<div class="notice warning"><strong>Non usare la normale scheda ChatGPT autenticata</strong><br>La risposta potrebbe essere influenzata dalla memoria, dalla cronologia e dalle istruzioni personalizzate.</div><ol><li>Copia il prompt dall’app.</li><li>Apri manualmente una finestra privata del browser con <strong>⌘ + Maiusc + N</strong>.</li><li>Apri la piattaforma AI senza login, oppure usa una chat temporanea.</li><li>Attiva la ricerca web, quando disponibile.</li><li>Incolla il prompt e attendi la risposta completa.</li><li>Copia risposta e fonti, quindi torna nell’app.</li><li>Seleziona il tipo di ambiente realmente usato.</li></ol><div class="notice"><strong>Importante:</strong> un file HTML standalone non può aprire o controllare automaticamente una sessione privata del browser.</div>`,`<button class="btn btn-primary" data-close-modal>Ho capito</button>`)}

 saveState(true);renderNewCheck();Utils.toast('Verifica preparata. Copia il prompt e usa un ambiente neutrale.','success');
}

t · 2. Apri manualmente una finestra privata · 3. Usa l’AI senza login o in chat temporanea · 4. Incolla qui risposta e fonti.</div><div id="selectedPromptBox" class="notice" style="margin-top:15px">${promptId?`<strong>Prompt:</strong> ${Utils.esc(promptBy(promptId)?.text||'')}`:'Seleziona un prompt.'}</div></div></section>`}
function wizardPanel2(d){return `<section class="wizard-panel" data-step="2"><div class="card"><div class="card-header"><div><div class="card-title">2. Incolla la risposta reale</div><div class="card-sub">L’app può rimuovere duplicati e righe di interfaccia senza modificare il significato.</div></div><div class="spacer"></div><button type="button" class="btn btn-sm" data-action="copy-current-prompt">Copia prompt</button><button type="button" class="btn btn-sm" data-action="neutral-test-instructions">Istruzioni test neutrale</button></div>${textareaField('response','Risposta completa',d.response||'','Incolla tutta la risposta, inclusi nomi, ordine e spiegazioni.',14).replace('<textarea','<textarea class="response-text"')}${textareaField('sources','Fonti / URL',d.sources||'','Un URL per riga. Verranno estratti anche gli URL presenti nella risposta.',5)}<div class="grid grid-2"><div class="field"><label>Rilevanza 1–5</label><select name="relevance">${[1,2,3,4,5].map(n=>`<option ${Number(d.relevance||3)===n?'selected':''}>${n}</option>`).join('')}</select></div><div class="field"><label>Attendibilità stimata 1–5</label><select name="reliability">${[1,2,3,4,5].map(n=>`<option ${Number(d.reliability||3)===n?'selected':''}>${n}</option>`).join('')}</select></div></div>${textareaField('notes','Note sul test',d.notes||'','Esempio: ricerca web attiva, nuova sessione, connessione UK.',3)}<div class="toolbar" style="margin-top:15px"><button type="button" class="btn" data-action="preview-clean">Anteprima pulizia</button><button type="button" class="btn btn-primary" data-action="analyze-and-open">Analizza risposta</button><span class="help">Il testo originale resta nella bozza; il testo pulito viene salvato separatamente.</span></div><div id="cleanPreview"></div></div></section>`}

function validateStep(step){const form=document.getElementById('checkForm');const d=Utils.form(form);if(step===1){for(const name of ['projectId','promptId','platformId']){const el=form.elements[name];if(!el.value){el.reportValidity();return false}}}if(step===2){if((d.response||'').trim().length<state.settings.analysis.minimumResponseLength){Utils.toast(`La risposta deve contenere almeno ${state.settings.analysis.minimumResponseLength} caratteri. Verifica di aver incollato tutto.`, 'error');return false}}if(step===3&&!analysisDraft){Utils.toast('Esegui prima l’analisi.','error');return false}if(step===4&&!manualReviewValid()){Utils.toast('Conferma i quattro controlli obbligatori.','error');return false}return true}

function runAnalysis(showToast=true){const form=document.getElementById('checkForm');if(!form)return;const d=Utils.form(form);const project=projectBy(d.projectId);if(!project||!(d.response||'').trim()){if(showToast)Utils.toast('Seleziona il progetto e incolla una risposta.','error');return}analysisDraft=applyEnvironmentConfidence(Analyzer.analyze(project,d.response,d.sources),d.testEnvironment||'not-verified');renderAnalysisOutput(project,analysisDraft);renderManualReview(analysisDraft);renderSaveSummary(d,analysisDraft);if(showToast)Utils.toast('Analisi completata','success');saveDraft()}
function renderAnalysisOutput(project,a){const el=document.getElementById('analysisOutput');if(!el)return;el.innerHTML=`<div class="grid grid-3"><div class="analysis-item"><small>GEO Visibility Score</small><strong>${a.score}/100</strong></div><div class="analysis-item"><small>Confidence Score</small><strong>${a.confidence}/100</strong></div><div class="analysis-item"><small>Tipo risposta</small><strong>${Utils.esc(a.responseType)}</strong></div><div class="analysis-item"><small>Brand</small><strong>${a.brandMentioned?'Presente':'Assente'}</strong></div><div class="analysis-item"><small>Dominio</small><strong>${a.domainCited?'Citato':'Non citato'}</strong></div><div class="analysis-item"><small>Posizione</small><strong>${a.position||'—'}</strong></div><div class="analysis-item"><small>Menzioni</small><strong>${a.mentions}</strong></div><div class="analysis-item"><small>Concorrenti</small><strong>${a.competitors.length}</strong></div><div class="analysis-item"><small>Sentiment stimato</small><strong>${a.sentiment}</strong></div></div>${a.environmentPenalty?`<div class="notice ${environmentMeta(a.testEnvironment).type}" style="margin-top:12px"><strong>Ambiente: ${Utils.esc(environmentMeta(a.testEnvironment).label)}</strong><br>Confidence Score ridotto di ${a.environmentPenalty} punti per possibile personalizzazione o mancata verifica.</div>`:''}${a.homonymRisk?'<div class="notice warning" style="margin-top:12px">Possibile rischio di omonimia: controlla l’estratto e il contesto prima di confermare.</div>':''}<div class="grid grid-2" style="margin-top:15px"><div><h3>Prove rilevate</h3>${renderEvidence(a)}</div><div><h3>Fonti classificate</h3>${renderSources(a.sourceDetails)}</div></div><h3>Risposta evidenziata</h3><div class="answer-view">${Analyzer.highlight(a.cleanResponse,project,a)}</div>`}
function renderEvidence(a){const rows=[];(a.evidence.brand||[]).forEach(x=>rows.push(['Brand',x]));(a.evidence.domain||[]).forEach(x=>rows.push(['Dominio',x]));Object.entries(a.evidence.competitors||{}).forEach(([k,v])=>v.forEach(x=>rows.push(['Concorrente: '+k,x])));Object.entries(a.evidence.services||{}).forEach(([k,v])=>v.forEach(x=>rows.push(['Servizio: '+k,x])));Object.entries(a.evidence.locations||{}).forEach(([k,v])=>v.forEach(x=>rows.push(['Località: '+k,x])));return rows.length?rows.map(([title,text])=>`<div class="evidence"><strong>${Utils.esc(title)}</strong><blockquote>${Utils.esc(text)}</blockquote></div>`).join(''):empty('Nessuna prova testuale','Il brand, il dominio o i termini configurati non sono stati trovati.')}
function renderSources(details){if(!details.length)return empty('Nessuna fonte','Aggiungi URL reali se la piattaforma mostrava citazioni.');return `<div class="source-table">${details.map(s=>`<div class="source-row"><div><strong>${Utils.esc(s.domain)}</strong><div class="help">${Utils.esc(s.reason)}</div></div>${badge(s.type,s.quality>=4?'success':s.quality<=2?'warning':'info')}<strong>${s.quality}/5</strong></div>`).join('')}</div>`}
function renderManualReview(a){const el=document.getElementById('manualReview');if(!el)return;el.innerHTML=`<div class="form-grid"><div class="field"><label>Brand presente</label><select name="manualBrand"><option value="true" ${a.brandMentioned?'selected':''}>Sì</option><option value="false" ${!a.brandMentioned?'selected':''}>No</option></select></div><div class="field"><label>Dominio citato</label><select name="manualDomain"><option value="true" ${a.domainCited?'selected':''}>Sì</option><option value="false" ${!a.domainCited?'selected':''}>No</option></select></div>${field('manualPosition','Posizione',a.position||'','','0 se assente','number')}${field('manualMentions','Numero menzioni',a.mentions||0,'','','number')}${textareaField('manualCompetitors','Concorrenti confermati',(a.competitors||[]).join('\n'),'Uno per riga.',4)}${textareaField('manualUrls','Fonti confermate',(a.urls||[]).join('\n'),'Mantieni solo le fonti realmente mostrate dalla piattaforma.',4)}<div class="field"><label>Tipo di risposta</label><select name="manualResponseType">${['Local Pack / risultati locali','Elenco editoriale','Risposta con fonti','Confronto','Risposta narrativa','Risposta limitata'].map(x=>`<option ${a.responseType===x?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Sentiment stimato</label><select name="manualSentiment"><option ${a.sentiment==='Positivo'?'selected':''}>Positivo</option><option ${a.sentiment==='Neutro'?'selected':''}>Neutro</option><option ${a.sentiment==='Negativo'?'selected':''}>Negativo</option></select></div></div><h3>Checklist obbligatoria</h3><div class="checklist"><label class="check-row"><input type="checkbox" name="reviewBrand"><span><strong>Ho verificato il brand nel testo</strong><small>Confermo che non si tratta di un omonimo.</small></span></label><label class="check-row"><input type="checkbox" name="reviewDomain"><span><strong>Ho verificato il dominio</strong><small>Il dominio è davvero una citazione o fonte della risposta.</small></span></label><label class="check-row"><input type="checkbox" name="reviewCompetitors"><span><strong>Ho controllato i concorrenti</strong><small>Ho rimosso aziende non pertinenti o duplicazioni.</small></span></label><label class="check-row"><input type="checkbox" name="reviewSources"><span><strong>Ho controllato le fonti</strong><small>Gli URL corrispondono alle citazioni effettivamente mostrate.</small></span></label></div>`}
function manualReviewValid(){const form=document.getElementById('checkForm');return ['reviewBrand','reviewDomain','reviewCompetitors','reviewSources'].every(n=>form.elements[n]?.checked)}
function finalAnalysisFromForm(){const form=document.getElementById('checkForm');const d=Utils.form(form);const project=projectBy(d.projectId);const base=analysisDraft||applyEnvironmentConfidence(Analyzer.analyze(project,d.response,d.sources),d.testEnvironment||'not-verified');const result={...base,brandMentioned:d.manualBrand==='true',domainCited:d.manualDomain==='true',position:Number(d.manualPosition||0),mentions:Number(d.manualMentions||0),competitors:Utils.lines(d.manualCompetitors),urls:Utils.lines(d.manualUrls),responseType:d.manualResponseType||base.responseType,sentiment:d.manualSentiment||base.sentiment};result.sourceDetails=result.urls.map(u=>Analyzer.classifySource(u,project));result.score=Analyzer.score(result);return result}
function renderSaveSummary(d,a){const el=document.getElementById('saveSummary');if(!el)return;const final=document.querySelector('[name=manualBrand]')?finalAnalysisFromForm():a;el.innerHTML=`<div class="grid grid-3"><div class="analysis-item"><small>Progetto</small><strong>${Utils.esc(projectBy(d.projectId)?.name||'—')}</strong></div><div class="analysis-item"><small>Prompt</small><strong>${Utils.esc(promptBy(d.promptId)?.text||'—')}</strong></div><div class="analysis-item"><small>AI</small><strong>${Utils.esc(platformBy(d.platformId).name)}</strong></div><div class="analysis-item"><small>Score finale</small><strong>${final.score}/100</strong></div><div class="analysis-item"><small>Brand</small><strong>${final.brandMentioned?'Presente':'Assente'}</strong></div><div class="analysis-item"><small>Dominio</small><strong>${final.domainCited?'Citato':'Non citato'}</strong></div></div><div class="notice ${manualReviewValid()?'success':'warning'}" style="margin-top:14px">${manualReviewValid()?'Checklist completata. La verifica è pronta per il salvataggio.':'Completa la checklist nel passaggio 4.'}</div>`}
function saveCheck(){const form=document.getElementById('checkForm');if(!validateStep(4))return;const d=Utils.form(form);const final=finalAnalysisFromForm();const item={id:Utils.uid(),projectId:d.projectId,promptId:d.promptId,platformId:d.platformId,model:d.model,date:new Date(d.date).toISOString(),location:d.location,sessionType:d.sessionType,testEnvironment:d.testEnvironment||'not-verified',response:d.response,cleanResponse:final.cleanResponse,sources:Utils.lines(d.sources),urls:final.urls,sourceDetails:final.sourceDetails,brandMentioned:final.brandMentioned,domainCited:final.domainCited,position:final.position,mentions:final.mentions,competitors:final.competitors,sentiment:final.sentiment,responseType:final.responseType,servicesPresent:final.servicesPresent,locationsPresent:final.locationsPresent,evidence:final.evidence,confidence:final.confidence,homonymRisk:final.homonymRisk,relevance:Number(d.relevance),reliability:Number(d.reliability),notes:d.notes,score:final.score,manualReview:{completed:true,brand:true,domain:true,competitors:true,sources:true},status:'Attiva',archived:false,createdAt:Utils.now(),updatedAt:Utils.now()};state.checks.push(item);const prompt=promptBy(d.promptId);if(prompt){prompt.lastChecked=item.date;prompt.updatedAt=Utils.now()}state.checkDraft={};analysisDraft=null;generateOpportunities();saveState();Utils.toast('Verifica salvata','success');setSection('results')}
