      `Implementa o correggi schema Person/Organization e sameAs solo con profili ufficiali reali.`,
      `Cerca citazioni esterne che riportino contemporaneamente nome e dominio ufficiale.`
    ];
    deliverables = ['Pagina autore/azienda completa', 'Schema validato', 'Profili ufficiali coerenti', 'Elenco citazioni brand+dominio'];
    example = `La relazione deve risultare inequivocabile: “${project.brand} — sito ufficiale ${project.domain} — ${project.services?.slice(0, 2).join(' e ') || 'servizi principali'} a ${project.location || 'località target'}”.`;
    avoid = ['Non aggiungere sameAs verso profili non controllati.', 'Non usare markup diverso dal contenuto visibile.'];
  } else if (title.includes('concorrenti')) {
    how = [
      'Apri le fonti effettivamente citate per i primi tre concorrenti.',
      'Per ogni fonte registra: tipo, argomento, dati concreti, autore, data, segnali locali, recensioni e link.',
      'Crea una tabella gap: presente nei concorrenti / assente sul tuo sito / azione dimostrabile.',
      'Aggiorna prima i gap ad alta pertinenza per il prompt, non tutti i contenuti del sito.'
    ];
    deliverables = ['Tabella competitiva', 'Elenco fonti citate', 'Gap prioritizzati', 'Aggiornamenti pagina target'];
    example = 'Esempio di gap utile: il concorrente è citato da una fonte locale autorevole e mostra casi verificabili; il tuo sito non ha ancora una pagina caso studio collegata alla pagina servizio.';
    avoid = ['Non copiare testi o struttura parola per parola.', 'Non assumere che una fonte sia la causa certa della citazione.'];
  } else if (title.includes('fonti non disponibili')) {
    how = [
      'Ripeti lo stesso prompt chiedendo esplicitamente nome, sito e fonti verificabili per ogni risultato.',
      'Copia separatamente risposta completa e URL, senza eliminare le citazioni.',
      'Apri ogni URL e verifica che sostenga realmente il soggetto indicato.',
      'Classifica ogni fonte come ufficiale, editoriale, directory, social o istituzionale.'
    ];
    deliverables = ['Risposta completa salvata', 'Elenco URL validati', 'Classificazione fonti', 'Note su pertinenza e qualità'];
    example = 'Prompt aggiuntivo: “Per ogni risultato indica la fonte precisa e un URL pubblico che confermi servizi e località.”';
    avoid = ['Non trattare il sito del soggetto come fonte indipendente.', 'Non considerare valida una fonte che non supporta l’affermazione.'];
  } else if (title.includes('servizi')) {
    how = [
      `Definisci una pagina principale per ciascun servizio prioritario: ${(project.services || []).join(', ') || 'servizi configurati'}.`,
      'In ogni pagina inserisci problema, destinatario, processo, deliverable, tempi indicativi, limiti e prova reale.',
      'Collega servizio, case study, FAQ e pagina autore con link contestuali.',
      'Verifica che title, H1 e introduzione usino la stessa terminologia del servizio senza sovra-ottimizzazione.'
    ];
    deliverables = ['Mappa servizi→URL', 'Pagine servizio complete', 'Link interni contestuali', 'FAQ basate su domande reali'];
    example = 'Una pagina servizio efficace risponde subito a: cosa offri, a chi, in quale area, come lavori e quali prove verificabili puoi mostrare.';
    avoid = ['Non accorpare servizi diversi in una pagina generica.', 'Non creare pagine sottili per ogni variante di keyword.'];
  } else if (title.includes('geografico')) {
    how = [
      `Verifica coerenza di località, indirizzo e area servita per ${project.location || 'la località target'}.`,
      'Migliora una pagina locale con contenuto realmente utile: servizi, modalità operative, riferimenti territoriali e prove locali.',
      'Collega Google Business Profile e profili locali al dominio ufficiale.',
      'Cerca menzioni da fonti locali pertinenti, associazioni, partner o media di zona.'
    ];
    deliverables = ['Pagina locale migliorata', 'NAP coerente', 'Profili locali aggiornati', 'Elenco citazioni locali'];
    example = 'La località deve essere parte del contenuto utile, non solo ripetuta nel titolo o nel footer.';
    avoid = ['Non creare pagine duplicate cambiando soltanto il nome della città.', 'Non dichiarare sedi o aree non realmente servite.'];
  } else {
    how = (o.steps || [o.action]);
    deliverables = ['Modifica completata', 'Prove raccolte', 'Controllo qualità', 'Nuovo test neutrale'];
    example = 'Applica ogni intervento solo quando è supportato da dati reali e verificabili.';
    avoid = ['Non attribuire causalità certa a una singola risposta AI.'];
  }

  return `<div class="implementation-box"><h4>Come eseguirlo, in pratica</h4><ul>${how.map(x => `<li>${Utils.esc(x)}</li>`).join('')}</ul>${example ? `<div class="notice" style="margin-top:12px"><strong>Esempio pratico:</strong> ${Utils.esc(example)}</div>` : ''}<div class="deliverables">${deliverables.map((x, i) => `<div class="deliverable"><strong>Output ${i + 1}</strong><div>${Utils.esc(x)}</div></div>`).join('')}</div>${avoid.length ? `<div style="margin-top:12px"><strong>Errori da evitare</strong><ul>${avoid.map(x => `<li>${Utils.esc(x)}</li>`).join('')}</ul></div>` : ''}</div>`;
}

function renderReport(projectId) {
  const p = projectBy(projectId);
  if (!p) return empty('Seleziona un progetto', 'Il report verrà generato dai dati salvati.');

  const checks = reportAvailableChecks(projectId, reportRangeChoice).filter(c => reportSelectedCheckIds.has(c.id));
  const check = checks[0];
  if (!check) return `<div class="card">${empty('Seleziona una ricerca', 'Usa il menu a tendina sopra. Il report mostrerà soltanto la verifica scelta.')}</div>`;

  const prompt = promptBy(check.promptId);
  const avg = check.score || 0;
  const brandRate = check.brandMentioned ? 100 : 0;
  const domainRate = check.domainCited ? 100 : 0;
  const opp = reportAvailableOpportunities(projectId, [check.id]).filter(o => reportSelectedOpportunityIds.has(o.id));

  return `<div class="card"><div class="flex wrap gap-8">${state.settings.logo ? `<img src="${state.settings.logo}" alt="Logo" style="max-height:60px;max-width:180px">` : ''}<div><h1 style="margin:0">Report GEO — ${Utils.esc(p.name)}</h1><div class="muted">${Utils.esc(state.settings.agency || state.settings.consultant || 'GEO Citation Monitor')} · ${Utils.date(new Date())}</div><div class="help">Report dedicato a una sola ricerca. Nessun dato di altre verifiche è incluso.</div></div></div>
    <div class="report-context"><strong>Ricerca analizzata</strong><div style="font-size:18px;margin-top:6px">${Utils.esc(prompt?.text || 'Prompt eliminato')}</div><div class="help" style="margin-top:6px">${Utils.esc(platformBy(check.platformId).name)} · ${Utils.date(check.date, true)} · Ambiente: ${Utils.esc(environmentMeta(check.testEnvironment || 'not-verified').label)}</div></div>
    <div class="grid grid-4" style="margin-top:18px">${metric('Verifiche incluse', '1', '')}${metric('GEO Score', avg + '/100', '')}${metric('Presenza brand', brandRate + '%', '')}${metric('Dominio citato', domainRate + '%', '')}</div>
    ${executiveDiagnosis(check, p, prompt, opp)}
    <div class="report-section-title"><h2>Risultato della ricerca selezionata</h2></div>${resultsTable([check], false)}
    <div class="report-section-title"><h2>Diagnosi e piano operativo</h2></div>${opp.length ? opp.map((o, index) => { const pd = priorityDetails(o.priority); return `<div class="opportunity priority-${o.priority}"><div class="flex wrap gap-8">${badge(o.priority, o.priority === 'P1' ? 'danger' : o.priority === 'P2' ? 'warning' : 'info')}<strong>${index + 1}. ${Utils.esc(o.title)}</strong></div><p><strong>Priorità:</strong> ${Utils.esc(pd.label)} — ${Utils.esc(pd.when)}. Impegno stimato: ${Utils.esc(pd.effort)}.</p>${renderImpact(o)}${renderDiagnosis(o)}${auditAssessment(projectBy(o.projectId), o)}<p><strong>Problema rilevato:</strong> ${Utils.esc(o.why)}</p><p><strong>Obiettivo:</strong> ${Utils.esc(o.expectedOutcome || o.action)}</p><p><strong>Azione principale:</strong> ${Utils.esc(o.action)}</p><div class="action-plan"><strong>Step operativi essenziali</strong><ol>${(o.steps || [o.action]).map(step => `<li>${Utils.esc(step)}</li>`).join('')}</ol></div>${opportunityImplementationDetails(o, check, p, prompt)}${renderChecklist(o)}${renderKpis(check, o)}</div>`; }).join('') : '<div class="report-empty-note">Nessuna opportunità selezionata per questa ricerca.</div>'}
    ${opp.length ? renderRoadmap(opp) : ''}
    <div class="report-section-title"><h2>Ordine consigliato</h2></div><p>Completa prima le attività P1, verifica che siano realmente online e attendi l’indicizzazione. Ripeti poi lo stesso prompt, nello stesso formato, in sessioni neutrali. Passa alle P2 solo dopo aver confrontato i nuovi risultati con questa verifica iniziale.</p>
    <div class="report-section-title"><h2>Metodologia e limiti</h2></div><p>Il GEO Visibility Score è una metrica proprietaria. Una singola risposta non dimostra una visibilità stabile. Modello, sessione, account, località, data e ricerca web possono cambiare il risultato; per questo ogni miglioramento deve essere verificato con test ripetuti e neutrali. Le percentuali e gli impatti mostrati nel piano sono stime operative, non garanzie.</p><footer>${Utils.esc(state.settings.footer || '')}</footer></div>`;
}

    Object.assign(c, applyEnvironmentConfidence(Analyzer.analyze(p, c.response, (c.urls || []).join('\n')), c.testEnvironment || 'not-verified', c.manualReview?.completed), { algorithmVersion: CONFIG.VERSION, scoreWeightsSnapshot: structuredClone(state.settings.scoreWeights), analysisSettingsSnapshot: structuredClone(state.settings.analysis), updatedAt: Utils.now() });
    saveState();
    closeModal();
    viewCheck(c.id);

      projectId: c.projectId,
      promptId: c.promptId,
      platformId: c.platformId,
      model: c.model,
      location: c.location,
      sessionType: c.sessionType,
      testEnvironment: c.testEnvironment || 'not-verified',
      relevance: c.relevance,
      reliability: c.reliability,
      wizardStep: 1,
      response: '',
      sources: '',
      notes: ''
    };
    saveState(true);
    setSection('new-check');
  },
  'report-check': (e) => {
    const c = state.checks.find(x => x.id === e.target.dataset.reportCheck);

    reportProjectChoice = c.projectId;

function validateImportedState(candidate) {
  const errors = [], warnings = [];
  if (!candidate || typeof candidate !== 'object' || Array.isArray(candidate)) errors.push('Il file non contiene un oggetto JSON valido.');
  for (const key of ['projects','prompts','checks']) if (!Array.isArray(candidate?.[key])) errors.push(`Campo obbligatorio non valido: ${key}`);
  const maxRecords = 100000;
  const total = Object.values(candidate || {}).reduce((n,v)=>n+(Array.isArray(v)?v.length:0),0);
  if (total > maxRecords) errors.push('Il backup contiene troppi record.');
  const duplicateIds = [];
  for (const key of ['projects','prompts','checks','opportunities','campaigns','knowledge','tasks']) {
    const ids=(candidate?.[key]||[]).map(x=>x?.id).filter(Boolean), unique=new Set(ids);
    if (ids.length !== unique.size) duplicateIds.push(key);
  }
  if (duplicateIds.length) errors.push(`ID duplicati in: ${duplicateIds.join(', ')}`);
  if (candidate?.version && String(candidate.version) > CONFIG.VERSION) warnings.push(`Backup creato con versione ${candidate.version}, più recente dell'app ${CONFIG.VERSION}.`);
  return { valid: errors.length===0, errors, warnings };
}

function mergeCollection(localItems=[], importedItems=[]) {
  const map = new Map(localItems.map(x=>[x.id, structuredClone(x)]));
  let added=0, updated=0, conflicts=0;
  for (const item of importedItems || []) {
    if (!item?.id) continue;
    if (!map.has(item.id)) { map.set(item.id, structuredClone(item)); added++; continue; }
    const current=map.get(item.id), a=new Date(current.updatedAt||current.createdAt||0).getTime(), b=new Date(item.updatedAt||item.createdAt||0).getTime();
    if (JSON.stringify(current)!==JSON.stringify(item)) conflicts++;
    if (b>a) { map.set(item.id, structuredClone(item)); updated++; }
  }
  return {items:[...map.values()],added,updated,conflicts};
}

function createSafetySnapshot(reason='operazione') {
  try {
    localStorage.setItem(`${CONFIG.APP_KEY}_rollback`, JSON.stringify({createdAt:Utils.now(),reason,state}));

  } catch(e) { Utils.toast('Impossibile creare lo snapshot di sicurezza. Esporta un backup prima di continuare.','error'); return false; }
}

function importJson(file) {
  if (!file || file.size > 20 * 1024 * 1024) { Utils.toast('File assente o superiore a 20 MB.','error'); return; }
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(String(reader.result).replace(/^\uFEFF/,''));
      const validation=validateImportedState(parsed);
      if (!validation.valid) throw new Error(validation.errors.join(' '));
      const warningHtml=validation.warnings.length?`<div class="notice warning">${validation.warnings.map(Utils.esc).join('<br>')}</div>`:'';
      modal('Importa backup', `${warningHtml}<div class="notice warning"><strong>Sostituisci tutto</strong> sovrascrive progetti, verifiche, campagne, Knowledge Base, attività, Search Console, audit, pacchetti WordPress e impostazioni. Verrà creato uno snapshot locale di sicurezza.</div><div class="field"><label>Per sostituire digita SOSTITUISCI</label><input id="replaceConfirm" autocomplete="off" placeholder="SOSTITUISCI"></div>`,
        '<button class="btn" data-close-modal>Annulla</button><button class="btn" id="mergeImport">Unisci</button><button class="btn btn-danger" id="replaceImport">Sostituisci tutto</button>');
      document.getElementById('replaceImport').onclick = () => {
        if (document.getElementById('replaceConfirm').value.trim() !== 'SOSTITUISCI') { Utils.toast('Digita SOSTITUISCI per confermare.','error'); return; }
        if (!createSafetySnapshot('import-replace')) return;
        const candidate=migrate(parsed);
        state=candidate;
        state.activityLog.push({id:Utils.uid(),at:Utils.now(),action:'import-replace',detail:file.name});
        saveState(); closeModal(); render(window.currentSection||'dashboard');
      };
      document.getElementById('mergeImport').onclick = () => {
        if (!createSafetySnapshot('import-merge')) return;
        const imported=migrate(parsed), keys=['projects','prompts','checks','opportunities','savedFilters','contentPlans','pageSnapshots','campaigns','knowledge','tasks','gscImports','contentAudits','implementationAudits','wpPackages'];
        let summary={added:0,updated:0,conflicts:0};
        for (const key of keys) { const r=mergeCollection(state[key]||[], imported[key]||[]); state[key]=r.items; summary.added+=r.added; summary.updated+=r.updated; summary.conflicts+=r.conflicts; }
        state.sourceValidations={...(state.sourceValidations||{}),...(imported.sourceValidations||{})};
        state.dismissedOpportunityIds=Utils.unique([...(state.dismissedOpportunityIds||[]),...(imported.dismissedOpportunityIds||[])]);
        state.activityLog.push({id:Utils.uid(),at:Utils.now(),action:'import-merge',detail:`Aggiunti ${summary.added}, aggiornati ${summary.updated}, conflitti ${summary.conflicts}`});
        cleanupOrphans(); normalizeAdvancedState(); saveState(); closeModal(); render(window.currentSection||'dashboard');
        Utils.toast(`Import completato: ${summary.added} aggiunti, ${summary.updated} aggiornati, ${summary.conflicts} conflitti mantenuti/locali.`, 'success');
      };
    } catch(e) { console.error(e); Utils.toast(`File JSON non valido: ${e.message}`,'error'); }
  };

function globalSearch(query) {

  const matches = [];

  state.checks.filter(x => Utils.slug(x.response).includes(q)).slice(0, 8).forEach(x => matches.push({ type: 'Risultato', label: promptBy(x.promptId)?.text || '', action: () => viewCheck(x.id) }));

// ============================================================
// BIND EVENTS
// ============================================================
function bindEvents() {
  // Click delegation
  document.addEventListener('click', (e) => {
    const target = e.target.closest('[data-action]');
    if (target) {
      const action = target.dataset.action;
      if (actionHandlers[action]) actionHandlers[action](e);
      return;
    }

    const dynamicMap = {
      viewCheck:'view-check', editCheck:'edit-check', reanalyzeCheck:'reanalyze-check', duplicateCheck:'duplicate-check', reportCheck:'report-check',
      editProject:'edit-project', duplicateProject:'duplicate-project', archiveProject:'archive-project', deleteProject:'delete-project', startProject:'start-project',
      startPrompt:'start-prompt', editPrompt:'edit-prompt', deletePrompt:'delete-prompt', copyText:'copy-text', editPlatform:'edit-platform',
      viewOpportunity:'view-opportunity', deleteDuplicate:'delete-duplicate', contentOpportunity:'content-opportunity'
    };
    for (const [key, action] of Object.entries(dynamicMap)) {
      const el = e.target.closest(`[data-${key.replace(/[A-Z]/g, m => '-' + m.toLowerCase())}]`);
      if (el && actionHandlers[action]) { actionHandlers[action]({ ...e, target: el }); return; }
    }

    const matrixStart = e.target.closest('[data-matrix-start]');
    if (matrixStart && actionHandlers['matrix-start']) { actionHandlers['matrix-start']({ target: matrixStart }); return; }

    const taskToggle = e.target.closest('[data-toggle-task]');
    if (taskToggle) {
      const o = state.opportunities.find(x => x.id === taskToggle.dataset.toggleTask);
      const task = o?.tasks?.find(x => x.id === taskToggle.dataset.taskId);
      if (task) { task.done = taskToggle.checked; o.status = o.tasks.every(x => x.done) ? 'Completata' : o.tasks.some(x => x.done) ? 'In corso' : 'Da fare'; o.completedAt = o.status === 'Completata' ? Utils.now() : ''; saveState(true); render(window.currentSection || 'opportunities'); }
      return;
    }

    // Navigazione
    const nav = e.target.closest('[data-section]');
    if (nav) { setSection(nav.dataset.section); return; }

    // Go
    const go = e.target.closest('[data-go]');
    if (go) { setSection(go.dataset.go); return; }

    // Close modal
    if (e.target.closest('[data-close-modal]')) { closeModal(); return; }

    // Wizard step
    const step = e.target.closest('[data-wizard-step]');
    if (step) { showWizardStep(step.dataset.wizardStep); return; }
  });

  // Change delegation
  document.addEventListener('change', (e) => {
    const target = e.target;
    // Check form changes
    if (target.closest('#checkForm')) { saveDraft(); }

    const ownerEl = target.closest('[data-opp-owner]');
    if (ownerEl) { const o = state.opportunities.find(x => x.id === ownerEl.dataset.oppOwner); if (o) { o.owner = ownerEl.value.trim(); saveState(true); } }
    const dueEl = target.closest('[data-opp-due]');
    if (dueEl) { const o = state.opportunities.find(x => x.id === dueEl.dataset.oppDue); if (o) { o.dueDate = dueEl.value; saveState(true); } }

    // Specific handlers
    for (const [selector, handler] of Object.entries(changeHandlers)) {
      if (target.matches(selector)) {
        if (typeof handler === 'function') handler(e);
        break;
      }
    }
  });

  // Input delegation (debounced)
  document.addEventListener('input', Utils.debounce((e) => {
    const target = e.target;
    if (target.closest('#checkForm')) { saveDraft(); }
    if (target.id === 'quickKeyword' || target.id === 'quickPromptStyle') updateQuickPreview();
    if (target.id === 'projectSearch' || target.id === 'projectFilter') filterProjects();
    if (target.id === 'promptSearch' || target.id === 'promptProjectFilter' || target.id === 'promptPriorityFilter') filterPrompts();
    if (target.id === 'resultSearch' || target.id === 'resultProjectFilter' || target.id === 'resultPlatformFilter' || target.id === 'resultMentionFilter') applyResultFilters();
    if (target.id === 'oppProject' || target.id === 'oppPriority' || target.id === 'oppStatus') filterOpportunities();
    if (target.id === 'qualityPriority' || target.id === 'qualityKind') filterQuality();
  }, CONFIG.DEBOUNCE_DELAY));

  // Settings tabs
  document.addEventListener('click', settingsTabs);

  // Modal
  document.getElementById('modalClose').onclick = closeModal;
  document.getElementById('modalBackdrop').addEventListener('click', (e) => {
    if (e.target.id === 'modalBackdrop') closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // Menu toggle
  document.getElementById('menuToggle').onclick = () => {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('mobileOverlay').classList.add('show');
  };
  document.getElementById('mobileOverlay').onclick = closeMobile;

  // Theme
  document.getElementById('themeToggle').onclick = () => {
    state.settings.theme = state.settings.theme === 'dark' ? 'light' : state.settings.theme === 'light' ? 'auto' : 'dark';
    saveState(true);
    applyTheme();
    render(window.currentSection || 'dashboard');
  };

  // Global search
  document.getElementById('globalSearch').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') globalSearch(e.target.value);
  });

  // JSON import
  document.getElementById('jsonImport').onchange = (e) => {
    if (e.target.files[0]) importJson(e.target.files[0]);
    e.target.value = '';
  };

  // Score weight real-time
  document.addEventListener('input', (e) => {
    if (e.target.closest('#scoreSettings')) {
      const total = [...document.querySelectorAll('#scoreSettings input[type="number"]')].reduce((s, x) => s + Number(x.value || 0), 0);
      const el = document.getElementById('weightTotal');
      if (el) el.textContent = 'Totale: ' + total + '%';
    }
  });
}

function analyzePageInput(project,raw){
  const isHtml=/<[a-z][\s\S]*>/i.test(raw); const doc=document.implementation.createHTMLDocument('audit'); if(isHtml) doc.documentElement.innerHTML=raw; else doc.body.textContent=raw;
  const text=isHtml?(doc.body?.innerText||doc.body?.textContent||''):raw;

  const headings=isHtml?[...doc.querySelectorAll('h2,h3')].map(x=>({tag:x.tagName,text:x.textContent.trim()})).filter(x=>x.text):[];
  const links=isHtml?[...doc.querySelectorAll('a[href]')].map(a=>a.getAttribute('href')).filter(Boolean):[];
  const schemas=isHtml?[...doc.querySelectorAll('script[type="application/ld+json"]')].map(x=>x.textContent):[];
  const low=text.toLowerCase(); const services=(project.services||[]).filter(x=>low.includes(String(x).toLowerCase())); const locations=[project.location,...(project.nearbyLocations||[])].filter(Boolean).filter(x=>low.includes(String(x).toLowerCase()));
  const hasFaq=/domande frequenti|faq/i.test(text)||headings.some(x=>/faq|domande frequenti/i.test(x.text));
  const hasAuthor=/autore|scritto da|di roberto|about the author/i.test(text)||schemas.some(x=>/"author"/i.test(x));
  const hasSchema=schemas.length>0; const wordCount=text.trim()?text.trim().split(/\s+/).length:0;
  const checks=[
    {key:'title',label:'Title presente e descrittivo',status:title?(title.length>=25?'confirmed':'probable'):'verify',detail:title||'Non rilevato nel contenuto incollato'},
    {key:'h1',label:'Un solo H1',status:h1s.length===1?'confirmed':h1s.length?'probable':'verify',detail:h1s.length?`${h1s.length} H1: ${h1s.join(' | ')}`:'Nessun H1 rilevato'},
    {key:'intro',label:'Risposta iniziale sostanziale',status:wordCount>=250?'confirmed':wordCount>=100?'probable':'verify',detail:`${wordCount} parole rilevate`},
    {key:'brand',label:'Brand esplicito',status:low.includes(String(project.brand||'').toLowerCase())?'confirmed':'verify',detail:project.brand||'Brand non configurato'},
    {key:'services',label:'Servizi associati',status:services.length?'confirmed':'verify',detail:services.join(', ')||'Nessun servizio configurato rilevato'},
    {key:'location',label:'Località associata',status:locations.length?'confirmed':'verify',detail:locations.join(', ')||'Località non rilevata'},
    {key:'faq',label:'FAQ presenti',status:hasFaq?'confirmed':'verify',detail:hasFaq?'Sezione FAQ rilevata':'Non rilevata'},
    {key:'schema',label:'Dati strutturati',status:hasSchema?'confirmed':'verify',detail:`${schemas.length} blocchi JSON-LD`},
    {key:'author',label:'Autore identificabile',status:hasAuthor?'confirmed':'verify',detail:hasAuthor?'Segnale autore rilevato':'Non rilevato'},
    {key:'links',label:'Link presenti',status:links.length>=3?'confirmed':links.length?'probable':'verify',detail:`${links.length} link rilevati`}
  ];
  return {isHtml,title,meta,h1s,headings,links,schemas,services,locations,hasFaq,hasAuthor,hasSchema,wordCount,text:text.slice(0,50000),checks};
}

function qaContent(project,text){const low=text.toLowerCase();const h1=(text.match(/<h1\b/gi)||[]).length;const placeholders=(text.match(/\[[^\]]{4,}\]/g)||[]);const urls=Utils.urls(text);const numericClaims=(text.match(/\b\d+(?:[.,]\d+)?\s*(?:%|anni|clienti|progetti|euro|€)\b/gi)||[]);const facts=projectKnowledge(project.id);const unsupported=numericClaims.filter(cl=>!facts.some(f=>String(f.value).toLowerCase().includes(cl.toLowerCase())));const checks=[['H1 unico',h1===1,h1?`${h1} H1`:'Nessun H1 HTML'],['Brand presente',low.includes(String(project.brand||'').toLowerCase()),project.brand],['Località presente',!project.location||low.includes(project.location.toLowerCase()),project.location||'Non configurata'],['Servizi presenti',(project.services||[]).some(s=>low.includes(s.toLowerCase())),(project.services||[]).join(', ')],['Nessun segnaposto',placeholders.length===0,placeholders.join(', ')],['Nessuna promessa numerica non supportata',unsupported.length===0,unsupported.join(', ')],['Link presenti',urls.length>0,`${urls.length} URL`],['FAQ o domande',/faq|domande frequenti|<h2[^>]*>[^<]*(domande|faq)/i.test(text),'Sezione rilevata']];const score=Math.round(checks.filter(x=>x[1]).length/checks.length*100);return {score,checks,placeholders,unsupported,blockers:checks.filter(x=>!x[1]&&['Nessun segnaposto','Nessuna promessa numerica non supportata'].includes(x[0]))};}

function parseCsv(text){const rows=[];let row=[],cell='',q=false;for(let i=0;i<text.length;i++){const ch=text[i],n=text[i+1];if(ch==='"'&&q&&n==='"'){cell+='"';i++;}else if(ch==='"')q=!q;else if(ch===','&&!q){row.push(cell);cell='';}else if((ch==='\n'||ch==='\r')&&!q){if(ch==='\r'&&n==='\n')i++;row.push(cell);if(row.some(x=>x.trim()))rows.push(row);row=[];cell='';}else cell+=ch;}row.push(cell);if(row.some(x=>x.trim()))rows.push(row);return rows;}
function normalizeGsc(rows){if(rows.length<2)return[];const h=rows[0].map(x=>Utils.slug(x));const idx=(...names)=>h.findIndex(x=>names.some(n=>x.includes(n)));const iq=idx('query','query principali'),ip=idx('pagina','page'),ic=idx('clic','click'),ii=idx('impression'),ict=idx('ctr'),ipos=idx('posizione','position');return rows.slice(1).map(r=>({query:r[iq]||'',page:r[ip]||'',clicks:Number(String(r[ic]||0).replace(',','.'))||0,impressions:Number(String(r[ii]||0).replace(/[.\s]/g,'').replace(',','.'))||0,ctr:r[ict]||'',position:Number(String(r[ipos]||0).replace(',','.'))||0})).filter(x=>x.query||x.page);}

function renderGscData(im){const top=im.rows.slice().sort((a,b)=>b.impressions-a.impressions).slice(0,50);return `<div class="grid grid-4">${metric('Righe',im.rows.length,'Importate')}${metric('Impression',im.rows.reduce((s,x)=>s+x.impressions,0),'Totale')}${metric('Clic',im.rows.reduce((s,x)=>s+x.clicks,0),'Totale')}${metric('Query pagina target',im.rows.filter(x=>x.page&&x.page.includes(projectBy(im.projectId)?.targetUrl||'___')).length,'Corrispondenze')}</div><div class="table-wrap" style="margin-top:16px"><table><thead><tr><th>Query</th><th>Pagina</th><th>Clic</th><th>Impression</th><th>Posizione</th><th>Decisione</th></tr></thead><tbody>${top.map(x=>`<tr><td>${Utils.esc(x.query)}</td><td>${Utils.esc(x.page)}</td><td>${x.clicks}</td><td>${x.impressions}</td><td>${x.position||'—'}</td><td>${x.impressions>20&&x.position>5?badge('Aggiorna pagina','warning'):x.impressions===0?badge('Dato insufficiente','info'):badge('Mantieni e rafforza','success')}</td></tr>`).join('')}</tbody></table></div>`;}

function makeWpPackage(p,html,type){const text=stripHtml(html);const h1=(html.match(/<h1[^>]*>([\s\S]*?)<\/h1>/i)||[])[1]||promptBy(state.checks.filter(c=>c.projectId===p.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]?.promptId)?.text||p.brand;const cleanH1=stripHtml(h1);const title=(cleanH1+' | '+p.brand).slice(0,60);const meta=text.slice(0,155);const slug=Utils.slug(cleanH1).replace(/\s+/g,'-');const faq=[...html.matchAll(/<h[23][^>]*>([^<]*\?[^<]*)<\/h[23]>\s*<p[^>]*>([\s\S]*?)<\/p>/gi)].map(m=>({q:stripHtml(m[1]),a:stripHtml(m[2])}));const schema={"@context":"https://schema.org","@type":type,headline:cleanH1,name:p.brand,url:p.targetUrl||undefined,areaServed:p.location||undefined,mainEntity:faq.length?faq.map(x=>({"@type":"Question",name:x.q,acceptedAnswer:{"@type":"Answer",text:x.a}})):undefined};return {title,meta,slug,html,schema,checklist:['H1 unico','Title ≤ 60 caratteri','Meta ≤ 155 caratteri','URL leggibile','Link interno alla pagina target','Alt immagini da compilare','Schema validato','Revisione dati verificati','Salva come bozza, non pubblicare direttamente']};}

function hashText(value='') {
  let h = 2166136261;
  const str = String(value).trim().replace(/\s+/g,' ');
  for (let i=0;i<str.length;i++) { h ^= str.charCodeAt(i); h = Math.imul(h,16777619); }
  return (h>>>0).toString(16).padStart(8,'0');
}

function normalizeAdvancedState(target=state) {
  target.pageSnapshots ||= [];
  target.campaigns ||= [];
  target.knowledge ||= [];
  target.tasks ||= [];
  target.gscImports ||= [];
  target.contentAudits ||= [];
  target.implementationAudits ||= [];
  target.sourceValidations ||= {};
  target.wpPackages ||= [];
  target.dismissedOpportunityIds ||= [];
  target.activityLog ||= [];
  target.schemaVersion = CONFIG.DATA_SCHEMA_VERSION;
  target.knowledge = target.knowledge.map(f=>({
    verifiedAt:'', verifiedBy:'', internalEvidence:'', expiresAt:'', notes:'', updatedAt:f.createdAt||Utils.now(), ...f
  }));
  target.campaigns = target.campaigns.map(c=>({
    environment:'', promptTextSnapshot:promptBy(c.promptId)?.text||'', promptHash:hashText(promptBy(c.promptId)?.text||''), ...c

function detectDelimiter(text='') {
  const line=String(text).replace(/^\uFEFF/,'').split(/\r?\n/).find(Boolean)||'';
  const candidates=[',',';','\t'];
  return candidates.sort((a,b)=>(line.split(b).length-line.split(a).length))[0];
}
function parseCsvRobust(text='') {
  text=String(text).replace(/^\uFEFF/,''); const delimiter=detectDelimiter(text);
  const rows=[]; let row=[],cell='',quoted=false;
  for(let i=0;i<text.length;i++){
    const ch=text[i],next=text[i+1];
    if(ch==='"'&&quoted&&next==='"'){cell+='"';i++;continue;}
    if(ch==='"'){quoted=!quoted;continue;}
    if(ch===delimiter&&!quoted){row.push(cell);cell='';continue;}
    if((ch==='\n'||ch==='\r')&&!quoted){if(ch==='\r'&&next==='\n')i++;row.push(cell);if(row.some(x=>x.trim()))rows.push(row);row=[];cell='';continue;}
    cell+=ch;
  }
  row.push(cell);if(row.some(x=>x.trim()))rows.push(row);
  return rows;
}
parseCsv=parseCsvRobust;

function orphanReport() {
  const projectIds=new Set(state.projects.map(x=>x.id)), promptIds=new Set(state.prompts.map(x=>x.id)), checkIds=new Set(state.checks.map(x=>x.id));
  return {
    pageSnapshots:(state.pageSnapshots||[]).filter(x=>!projectIds.has(x.projectId)),
    campaigns:(state.campaigns||[]).filter(x=>!projectIds.has(x.projectId)||!promptIds.has(x.promptId)),
    knowledge:(state.knowledge||[]).filter(x=>!projectIds.has(x.projectId)),
    tasks:(state.tasks||[]).filter(x=>!projectIds.has(x.projectId)||x.checkId&&!checkIds.has(x.checkId)||x.beforeCheckId&&!checkIds.has(x.beforeCheckId)||x.afterCheckId&&!checkIds.has(x.afterCheckId)),
    gscImports:(state.gscImports||[]).filter(x=>!projectIds.has(x.projectId)),
    contentAudits:(state.contentAudits||[]).filter(x=>!projectIds.has(x.projectId)),
    implementationAudits:(state.implementationAudits||[]).filter(x=>!projectIds.has(x.projectId)),
    wpPackages:(state.wpPackages||[]).filter(x=>!projectIds.has(x.projectId)),
    sourceValidations:Object.keys(state.sourceValidations||{}).filter(id=>!checkIds.has(id))
  };
}
actionHandlers['inspect-orphans']=()=>{const report=orphanReport(), counts=Object.fromEntries(Object.entries(report).map(([k,v])=>[k,v.length])), total=Object.values(counts).reduce((a,b)=>a+b,0);modal('Pulizia dati orfani',`<div class="notice ${total?'warning':'success'}">${total?`Sono stati trovati ${total} record orfani.`:'Nessun dato orfano rilevato.'}</div><div class="card">${Object.entries(counts).map(([k,v])=>`<div class="kpi-row"><strong>${Utils.esc(k)}</strong><span>${v}</span></div>`).join('')}</div>`,total?'<button class="btn" data-close-modal>Annulla</button><button class="btn btn-danger" id="confirmOrphanCleanup">Crea snapshot e pulisci</button>':'<button class="btn" data-close-modal>Chiudi</button>');if(total)document.getElementById('confirmOrphanCleanup').onclick=()=>{if(!createSafetySnapshot('orphan-cleanup'))return;cleanupOrphans();state.activityLog.push({id:Utils.uid(),at:Utils.now(),action:'cleanup-orphans',detail:`${total} record`});saveState();closeModal();renderBackup();Utils.toast(`${total} record orfani rimossi.`,'success');};};
actionHandlers['restore-rollback']=()=>{const raw=localStorage.getItem(`${CONFIG.APP_KEY}_rollback`);if(!raw){Utils.toast('Nessuno snapshot disponibile.','error');return;}deleteConfirm('Ripristinare lo snapshot precedente? I dati attuali verranno sostituiti.',()=>{try{const payload=JSON.parse(raw);state=migrate(payload.state);state.activityLog.push({id:Utils.uid(),at:Utils.now(),action:'rollback-restore',detail:payload.reason||''});saveState();render(window.currentSection||'dashboard');Utils.toast('Snapshot ripristinato.','success');}catch(e){Utils.toast('Snapshot non valido.','error');}});};

let contentQaMode='draft', implementationProject='', implementationPlan='', implementationPage='';
function scoreGrade(n){return n>=90?'Ottimo · pronto':n>=75?'Buono · piccoli interventi':n>=60?'Da migliorare':n>=40?'Insufficiente':'Critico';}
function normalizeRequirementLine(line){return String(line||'').replace(/^\s*(?:[-•*]|\d+[.)]|\[[ xX]?\])\s*/,'').trim();}
function extractRequirements(plan){
  const lines=String(plan||'').split(/\r?\n/).map(normalizeRequirementLine).filter(x=>x.length>=8);
  return Utils.unique(lines).slice(0,40);
}
function requirementTest(req,analysis,raw,project){
  const q=Utils.slug(req), text=Utils.slug(analysis.text||raw), html=String(raw||'');
  const tests=[]; const add=(hit,evidence)=>tests.push({hit,evidence});
  if(/\bh1\b/.test(q)) add(analysis.h1s.length===1,analysis.h1s.length?`${analysis.h1s.length} H1: ${analysis.h1s.join(' | ')}`:'H1 non rilevato');
  if(/title|titolo seo/.test(q)) add(analysis.title.length>=25&&analysis.title.length<=65,analysis.title||'Title non rilevato');
  if(/meta description|descrizione meta/.test(q)) add(analysis.meta.length>=90&&analysis.meta.length<=170,analysis.meta||'Meta description non rilevata');
  if(/faq|domande frequenti/.test(q)) add(analysis.hasFaq,analysis.hasFaq?'FAQ rilevate':'FAQ non rilevate');
  if(/schema|json ld|dati strutturati/.test(q)) add(analysis.hasSchema,`${analysis.schemas.length} blocchi JSON-LD`);
  if(/autore|author|eeat|e e a t/.test(q)) add(analysis.hasAuthor,analysis.hasAuthor?'Segnale autore rilevato':'Autore non rilevato');
  if(/link intern/.test(q)) add(analysis.links.some(l=>!/^https?:\/\//i.test(l)||Utils.domain(l)===Utils.domain(project.domain)),`${analysis.links.length} link totali`);
  if(/cta|call to action|contatt|prenot|richied/.test(q)) add(/contatt|prenot|richied|chiama|scriv|preventiv/i.test(analysis.text),'CTA cercata nel testo');
  if(/brand|marchio|nome azienda/.test(q)) add(text.includes(Utils.slug(project.brand)),project.brand||'Brand non configurato');
  if(/localit|citt|bergamo|milano|cinisello|area served/.test(q)&&project.location) add(text.includes(Utils.slug(project.location)),project.location);
  if(/servizi|servizio/.test(q)&&project.services?.length) add(project.services.some(x=>text.includes(Utils.slug(x))),analysis.services.join(', ')||'Servizi non rilevati');
  if(/recension|testimonian/.test(q)) add(/recension|testimonian|review|rating/i.test(analysis.text),'Ricerca testuale recensioni');
  if(/prezz|costo|tariff/.test(q)) add(/€|euro|prezz|costo|tariff/i.test(analysis.text),'Ricerca testuale prezzi');
  if(/immagin|alt text|testo alternativo/.test(q)) {const d=document.implementation.createHTMLDocument('img');d.documentElement.innerHTML=html;const imgs=[...d.querySelectorAll('img')];add(imgs.length>0&&imgs.every(i=>i.getAttribute('alt')?.trim()),imgs.length?`${imgs.filter(i=>i.getAttribute('alt')?.trim()).length}/${imgs.length} immagini con alt`:'Immagini non rilevate');}
  if(!tests.length){const words=q.split(' ').filter(x=>x.length>4);const hits=words.filter(w=>text.includes(w));const ratio=words.length?hits.length/words.length:0;return {status:ratio>=.7?'completed':ratio>=.35?'partial':'unverifiable',evidence:ratio?`Corrispondenza terminologica ${Math.round(ratio*100)}%`:'Richiede verifica manuale',points:ratio>=.7?5:ratio>=.35?3:0};}
  const passed=tests.filter(x=>x.hit).length;const status=passed===tests.length?'completed':passed?'partial':'missing';return {status,evidence:tests.map(x=>x.evidence).join(' · '),points:status==='completed'?5:status==='partial'?3:0};
}
function runImplementationAudit(project,plan,raw){
  const analysis=analyzePageInput(project,raw); const requirements=extractRequirements(plan);
  const evaluated=requirements.map((r,i)=>({id:i+1,requirement:r,...requirementTest(r,analysis,raw,project)}));
  const implementationScore=requirements.length?Math.round(evaluated.reduce((a,x)=>a+x.points,0)/(requirements.length*5)*100):0;
  const qa=qaContent(project,raw); const structural=Math.round(analysis.checks.reduce((a,x)=>a+(x.status==='confirmed'?10:x.status==='probable'?6:0),0)/analysis.checks.length*10);
  const pageQualityScore=Math.round(qa.score*.65+structural*.35);
  const missing=evaluated.filter(x=>x.status==='missing'); const partial=evaluated.filter(x=>x.status==='partial'); const unverifiable=evaluated.filter(x=>x.status==='unverifiable');
  const priorities=[...missing.map(x=>({priority:'P1',title:x.requirement,reason:'Indicazione non implementata',action:`Implementare e verificare: ${x.requirement}`})),...partial.map(x=>({priority:'P2',title:x.requirement,reason:'Implementazione parziale',action:`Completare: ${x.requirement}`})),...qa.blockers.map(x=>({priority:'P1',title:x.label,reason:x.detail||'Problema bloccante',action:`Correggere ${x.label.toLowerCase()}`})),...qa.warnings.slice(0,5).map(x=>({priority:'P3',title:x.label,reason:x.detail||'Miglioramento consigliato',action:`Ottimizzare ${x.label.toLowerCase()}`}))];
  return {implementationScore,pageQualityScore,requirements:evaluated,analysis,qa,priorities:priorities.slice(0,15),summary:{completed:evaluated.filter(x=>x.status==='completed').length,partial:partial.length,missing:missing.length,unverifiable:unverifiable.length},ready:implementationScore>=75&&pageQualityScore>=75&&qa.blockers.length===0};
}
function implementationStatusLabel(s){return {completed:'Completato',partial:'Parziale',missing:'Non completato',unverifiable:'Non verificabile'}[s]||s;}
function renderImplementationResult(a){const r=a.result;return `<div class="score-duo"><div class="score-card"><div class="value">${r.implementationScore}/100</div><div class="label">Implementation Score</div><div class="grade">${scoreGrade(r.implementationScore)}</div></div><div class="score-card"><div class="value">${r.pageQualityScore}/100</div><div class="label">Page Quality Score</div><div class="grade">${scoreGrade(r.pageQualityScore)}</div></div></div><div class="notice ${r.ready?'success':'warning'}" style="margin-top:14px"><strong>${r.ready?'Verifica superata':'Sono necessarie correzioni'}</strong><br>${r.summary.completed} completate · ${r.summary.partial} parziali · ${r.summary.missing} mancanti · ${r.summary.unverifiable} da verificare manualmente.</div><h3>Confronto indicazioni–implementazione</h3><div class="table-wrap">${r.requirements.length?r.requirements.map(x=>`<div class="audit-requirement"><strong>${Utils.esc(x.requirement)}</strong><span><span class="status-pill status-${x.status}">${implementationStatusLabel(x.status)}</span></span><span class="help">${Utils.esc(x.evidence)}</span><strong>${x.points}/5</strong></div>`).join(''):'<div class="empty">Nessuna indicazione riconoscibile nel piano.</div>'}</div><h3>Correzioni prioritarie</h3>${r.priorities.length?r.priorities.map(x=>`<div class="audit-priority ${x.priority==='P2'?'p2':x.priority==='P3'?'p3':''}"><div class="flex gap-8 wrap"><strong>${Utils.esc(x.title)}</strong>${badge(x.priority,x.priority==='P1'?'danger':x.priority==='P2'?'warning':'info')}</div><div class="help">${Utils.esc(x.reason)}. ${Utils.esc(x.action)}</div></div>`).join(''):'<div class="notice success">Nessuna correzione automatica prioritaria rilevata.</div>'}<div class="compact-actions" style="margin-top:14px"><button class="btn btn-primary" data-action="create-implementation-tasks" data-id="${a.id}">Crea attività correttive</button><button class="btn" data-action="download-implementation-report" data-id="${a.id}">Esporta report JSON</button><button class="btn" data-action="start-post-geo-test" data-id="${a.id}">Avvia nuovo test GEO</button></div>`;}
function renderImplementationPanel(){
 const pid=document.getElementById('implementationProject')?.value||implementationProject||qaProject||state.projects[0]?.id||'';implementationProject=pid;const p=projectBy(pid);const last=state.implementationAudits.filter(x=>x.projectId===pid).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
 return `${!p?empty('Seleziona un progetto','Serve un progetto per confrontare indicazioni e pagina.'):`<div class="form-grid"><div class="field full"><label>Indicazioni o piano correttivo</label><textarea id="implementationPlan" placeholder="Incolla le indicazioni generate dal tool, una per riga…">${Utils.esc(implementationPlan||last?.plan||'')}</textarea><span class="help">Ogni riga significativa viene trasformata in un requisito verificabile.</span></div><div class="field full"><label>HTML o testo della pagina realizzata</label><textarea id="implementationPage" class="response-text" placeholder="Incolla il sorgente HTML o il testo completo della pagina pubblicata…">${Utils.esc(implementationPage||last?.raw||'')}</textarea></div></div><div class="compact-actions" style="margin-top:12px"><button class="btn btn-primary" data-action="run-implementation-audit">Verifica implementazione</button><button class="btn" data-action="load-latest-page-snapshot">Usa ultimo snapshot pagina</button><button class="btn" data-action="clear-implementation-form">Svuota</button></div><div class="card" style="margin-top:16px" id="implementationResults">${last?renderImplementationResult(last):empty('Nessuna verifica post-implementazione','Incolla il piano e la pagina realizzata, quindi avvia il confronto.')}</div>`}`;
}
renderContentQa=function(){
 const pid=document.getElementById('qaProject')?.value||qaProject||state.projects[0]?.id||'';qaProject=pid;const p=projectBy(pid);const last=state.contentAudits.filter(x=>x.projectId===pid).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
 document.getElementById('content-qa').innerHTML=`<div class="toolbar"><select id="qaProject"><option value="">Seleziona progetto</option>${options(state.projects,pid)}</select><div class="spacer"></div>${badge(contentQaMode==='implementation'?'Verifica dopo la pubblicazione':'Controllo prima della pubblicazione','info')}</div><div class="implementation-tabs"><button class="implementation-tab ${contentQaMode==='draft'?'active':''}" data-action="set-content-qa-mode" data-mode="draft">Controllo bozza</button><button class="implementation-tab ${contentQaMode==='implementation'?'active':''}" data-action="set-content-qa-mode" data-mode="implementation">Verifica implementazione</button></div>${contentQaMode==='implementation'?renderImplementationPanel():`<div class="advanced-grid"><div class="card"><textarea id="qaText" class="response-text" placeholder="Incolla HTML o testo della bozza…">${Utils.esc(qaText||'')}</textarea><div style="margin-top:12px"><button class="btn btn-primary" data-action="run-content-qa">Controlla contenuto</button></div></div><div class="card" id="qaResults">${last?renderQa(last.result):empty('Nessun controllo','Incolla una bozza e avvia il controllo.')}</div></div>`}`;
};
advancedRenderers['content-qa']=renderContentQa;
actionHandlers['set-content-qa-mode']=e=>{contentQaMode=e.target.dataset.mode||'draft';renderContentQa();};
actionHandlers['run-implementation-audit']=()=>{const p=projectBy(implementationProject||qaProject),plan=document.getElementById('implementationPlan')?.value||'',raw=document.getElementById('implementationPage')?.value||'';if(!p||plan.trim().length<20||raw.trim().length<40){Utils.toast('Seleziona progetto e inserisci piano e pagina completa.','error');return;}implementationPlan=plan;implementationPage=raw;const item={id:Utils.uid(),projectId:p.id,date:Utils.now(),plan:plan.slice(0,100000),raw:raw.slice(0,200000),result:runImplementationAudit(p,plan,raw),algorithmVersion:CONFIG.VERSION};state.implementationAudits.push(item);saveState();renderContentQa();};

actionHandlers['create-implementation-tasks']=e=>{const a=state.implementationAudits.find(x=>x.id===e.target.dataset.id);if(!a)return;let added=0;a.result.priorities.forEach(x=>{if(!state.tasks.some(t=>t.implementationAuditId===a.id&&t.title===x.title)){state.tasks.push({id:Utils.uid(),implementationAuditId:a.id,projectId:a.projectId,title:x.title,priority:x.priority,status:'Da fare',owner:'',due:'',url:projectBy(a.projectId)?.targetUrl||'',notes:`${x.reason}. ${x.action}`,evidence:'',createdAt:Utils.now()});added++;}});saveState();Utils.toast(`${added} attività correttive create.`,'success');};
actionHandlers['download-implementation-report']=e=>{const a=state.implementationAudits.find(x=>x.id===e.target.dataset.id);if(a)Utils.download(`verifica-implementazione-${new Date(a.date).toISOString().slice(0,10)}.json`,JSON.stringify(a,null,2),'application/json');};
actionHandlers['start-post-geo-test']=e=>{const a=state.implementationAudits.find(x=>x.id===e.target.dataset.id),p=projectBy(a?.projectId);if(!p)return;const latestPrompt=state.prompts.filter(x=>x.projectId===p.id).slice().sort((x,y)=>new Date(y.createdAt||0)-new Date(x.createdAt||0))[0];state.checkDraft={projectId:p.id,promptId:latestPrompt?.id||'',platformId:'chatgpt',wizardStep:1};saveState(true);setSection('new-check');};
changeHandlers['#qaProject']=e=>{qaProject=e.target.value;implementationProject=e.target.value;qaText='';implementationPlan='';implementationPage='';renderContentQa();};
