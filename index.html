<script>
// ============================================================
// CONFIGURAZIONE
// ============================================================
const CONFIG = {
  APP_KEY: 'geoCitationMonitor_v42',
  LEGACY_APP_KEYS: ['geoCitationMonitor_v3'],
  VERSION: '4.3.0',
  DATA_SCHEMA_VERSION: 8,
  MAX_LOGO_SIZE: 350000,
  MIN_RESPONSE_LENGTH: 120,
  ANOMALY_THRESHOLD: 20,
  STORAGE_LIMIT_MB: 5,
  TOAST_DURATION: 3500,
  DEBOUNCE_DELAY: 180,
};

// ============================================================
// UTILITY MODULE
// ============================================================
const Utils = {
  uid() {
    return crypto?.randomUUID ? crypto.randomUUID() : 'id-' + Date.now().toString(36) + Math.random().toString(36).slice(2);
  },
  now() { return new Date().toISOString(); },
  esc(value = '') {
    return String(value).replace(/[&<>'"]/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[m]));
  },
  lines(value = '') {
    return String(value).split(/\r?\n|,/).map(v => v.trim()).filter(Boolean);
  },
  unique(arr) { return [...new Set(arr.filter(Boolean))]; },
  slug(value = '') {
    return String(value).toLowerCase().normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .replace(/[^a-z0-9]+/g, ' ').trim();
  },
  domain(value = '') {
    try {
      const url = new URL(value.includes('://') ? value : 'https://' + value);
      return url.hostname.replace(/^www\./, '').toLowerCase();
    } catch {
      return String(value).toLowerCase().replace(/^https?:\/\//, '').replace(/^www\./, '').split('/')[0];
    }
  },
  urls(text = '') {
    return this.unique((String(text).match(/https?:\/\/[^\s<>()\[\]{}"']+/gi) || [])
      .map(u => u.replace(/[.,;:!?]+$/, '')));
  },
  count(text, needle) {
    if (!needle) return 0;
    const re = new RegExp(String(needle).replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
    return (String(text).match(re) || []).length;
  },
  date(value, withTime = false) {
    if (!value) return '—';
    try {
      return new Intl.DateTimeFormat('it-IT', withTime ? { dateStyle: 'short', timeStyle: 'short' } : { dateStyle: 'medium' })
        .format(new Date(value));
    } catch { return value; }
  },
  localDateTime(value) {
    const d = value ? new Date(value) : new Date();
    const z = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${z(d.getMonth()+1)}-${z(d.getDate())}T${z(d.getHours())}:${z(d.getMinutes())}`;
  },
  csv(rows) {
    return rows.map(r => r.map(v => '"' + String(v ?? '').replace(/"/g, '""') + '"').join(',')).join('\n');
  },
  download(name, content, type = 'text/plain;charset=utf-8') {
    const blob = new Blob([content], { type });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    document.body.appendChild(a);
    a.click();
    setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 0);
  },
  form(form) {
    return Object.fromEntries(new FormData(form).entries());
  },
  similarity(a, b) {
    a = this.slug(a);
    b = this.slug(b);
    if (!a || !b) return 0;
    if (a === b) return 1;
    const A = new Set(a.split(' '));
    const B = new Set(b.split(' '));
    const common = [...A].filter(x => B.has(x)).length;
    return common / Math.max(A.size, B.size);
  },
  excerpt(text, index, length = 110) {
    if (index < 0) return '';
    const start = Math.max(0, index - length);
    const end = Math.min(text.length, index + length);
    return (start ? '…' : '') + text.slice(start, end).replace(/\s+/g, ' ').trim() + (end < text.length ? '…' : '');
  },
  debounce(fn, wait = CONFIG.DEBOUNCE_DELAY) {
    let timer;
    return (...args) => {
      clearTimeout(timer);
      timer = setTimeout(() => fn(...args), wait);
    };
  },
  storage() {
    const bytes = new Blob([JSON.stringify(window.__state || {})]).size;
    const mb = bytes / (1024 * 1024);
    return {
      bytes,
      kb: (bytes / 1024).toFixed(1),
      mb: mb.toFixed(2),
      pct: Math.min(100, (bytes / (CONFIG.STORAGE_LIMIT_MB * 1024 * 1024)) * 100)
    };
  },
  toast(message, type = '') {
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = message;
    document.getElementById('toastZone').appendChild(el);
    setTimeout(() => el.remove(), CONFIG.TOAST_DURATION);
  },
  loading(button) {
    if (!button) return;
    button.classList.add('loading');
    button.disabled = true;
    const originalText = button.innerHTML;
    button.innerHTML = `<span class="spinner"></span><span class="btn-text">${originalText}</span>`;
    return () => {
      button.classList.remove('loading');
      button.disabled = false;
      button.innerHTML = originalText;
    };
  },
  setLoading(button, text) {
    if (!button) return;
    button.classList.add('loading');
    button.disabled = true;
    button.innerHTML = `<span class="spinner"></span><span class="btn-text">${text}</span>`;
  },
  removeLoading(button) {
    if (!button) return;
    button.classList.remove('loading');
    button.disabled = false;
  }
};

function defaultState() {

    savedFilters: [],

    checkDraft: {},
    contentPlans: [],
    contentDraft: {},
    pageSnapshots: [],
    campaigns: [],
    knowledge: [],
    tasks: [],
    gscImports: [],
    contentAudits: [],

    sourceValidations: {},
    wpPackages: [],
    dismissedOpportunityIds: [],
    activityLog: [],
    schemaVersion: CONFIG.DATA_SCHEMA_VERSION,
    createdAt: Utils.now(),
    updatedAt: Utils.now()
  };
}

function migrate(source) {
  const base = defaultState();
  const s = source || {};
  const result = { ...base, ...s, version: CONFIG.VERSION };
  result.settings = { ...base.settings, ...(s.settings || {}) };
  result.settings.analysis = { ...base.settings.analysis, ...(s.settings?.analysis || {}) };
  result.settings.scoreWeights = { ...base.settings.scoreWeights, ...(s.settings?.scoreWeights || {}) };
  result.platforms = (s.platforms?.length ? s.platforms : DEFAULT_PLATFORMS).map(p => ({ ...p }));
  result.projects = (s.projects || []).map(p => ({
    ...p,
    brandVariants: p.brandVariants || [],
    competitors: p.competitors || [],
    services: p.services || [],
    nearbyLocations: p.nearbyLocations || [],
    homonymExclusions: p.homonymExclusions || [],
    contextTerms: p.contextTerms || [],
    pageAudit: { title: '', h1: '', intro: '', hasAuthor: false, hasFaq: false, hasSchema: false, internalLinks: 0, reviews: 0, notes: '', ...(p.pageAudit || {}) }
  }));
  result.prompts = s.prompts || [];
  result.checks = (s.checks || []).map(c => ({
    ...c,
    status: c.status || 'Attiva',
    manualReview: c.manualReview || {},
    evidence: c.evidence || {},
    sourceDetails: c.sourceDetails || [],
    servicesPresent: c.servicesPresent || [],
    locationsPresent: c.locationsPresent || [],
    confidence: c.confidence ?? 0,
    responseType: c.responseType || 'Non classificata',
    testEnvironment: c.testEnvironment || 'not-verified',
    algorithmVersion: c.algorithmVersion || c.version || 'legacy',
    scoreWeightsSnapshot: c.scoreWeightsSnapshot || null,
    analysisSettingsSnapshot: c.analysisSettingsSnapshot || null,
    confidenceBreakdown: c.confidenceBreakdown || {},
    rawConfidence: c.rawConfidence ?? c.confidence ?? 0,
    environmentPenalty: c.environmentPenalty || 0,
    domainMentionedText: c.domainMentionedText || false,
    brandSentiment: c.brandSentiment || c.sentiment || 'Neutro',
    visibilityScore: c.visibilityScore ?? c.score ?? 0,
    sourceQualityScore: c.sourceQualityScore ?? 0,
    responseQualityScore: c.responseQualityScore ?? 0
  }));
  result.opportunities = (s.opportunities || []).map(o => ({ ...o, type: o.type || Utils.slug(o.title || 'opportunity'), tasks: o.tasks || [], owner: o.owner || '', dueDate: o.dueDate || '', completedAt: o.completedAt || '' }));
  result.savedFilters = s.savedFilters || [];
  result.backups = s.backups || [];
  result.checkDraft = s.checkDraft || {};
  result.contentPlans = s.contentPlans || [];
  result.contentDraft = s.contentDraft || {};
  result.pageSnapshots = Array.isArray(s.pageSnapshots) ? s.pageSnapshots : [];
  result.campaigns = Array.isArray(s.campaigns) ? s.campaigns : [];
  result.knowledge = Array.isArray(s.knowledge) ? s.knowledge : [];
  result.tasks = Array.isArray(s.tasks) ? s.tasks : [];
  result.gscImports = Array.isArray(s.gscImports) ? s.gscImports : [];
  result.contentAudits = Array.isArray(s.contentAudits) ? s.contentAudits : [];
  result.implementationAudits = Array.isArray(s.implementationAudits) ? s.implementationAudits : [];
  result.sourceValidations = s.sourceValidations && typeof s.sourceValidations === 'object' && !Array.isArray(s.sourceValidations) ? { ...s.sourceValidations } : {};
  result.wpPackages = Array.isArray(s.wpPackages) ? s.wpPackages : [];
  result.dismissedOpportunityIds = Array.isArray(s.dismissedOpportunityIds) ? s.dismissedOpportunityIds : [];
  result.activityLog = Array.isArray(s.activityLog) ? s.activityLog : [];
  result.schemaVersion = CONFIG.DATA_SCHEMA_VERSION;
  return result;
}

let state = null;

function loadState() {
  try {
    let raw = localStorage.getItem(CONFIG.APP_KEY);
    let migratedFrom = '';
    if (!raw) {
      for (const legacyKey of CONFIG.LEGACY_APP_KEYS || []) {
        const legacyRaw = localStorage.getItem(legacyKey);
        if (legacyRaw) { raw = legacyRaw; migratedFrom = legacyKey; break; }
      }
    }
    const parsed = raw ? JSON.parse(raw) : null;
    state = parsed ? migrate(parsed) : defaultState();
    if (migratedFrom) {
      localStorage.setItem(CONFIG.APP_KEY, JSON.stringify(state));
      state.activityLog.push({ id: Utils.uid(), at: Utils.now(), action: 'legacy-migration', detail: `Dati copiati da ${migratedFrom}` });
    }
  } catch (e) {
    console.error(e);
    state = defaultState();
  }
  return state;
}

function saveState(silent = false) {
  try {
    state.version = CONFIG.VERSION;
    state.updatedAt = Utils.now();
    localStorage.setItem(CONFIG.APP_KEY, JSON.stringify(state));
    if (!silent) Utils.toast('Dati salvati', 'success');
    return true;
  } catch (e) {
    Utils.toast('Spazio locale insufficiente: esporta un backup e riduci i dati.', 'error');
    return false;
  }
}

function projectBy(id) { return state.projects.find(x => x.id === id); }
function promptBy(id) { return state.prompts.find(x => x.id === id); }
function platformBy(id) { return state.platforms.find(x => x.id === id) || { id, name: id, url: '#' }; }
function latestPrevious(check) {
  return state.checks.filter(c =>
    c.projectId === check.projectId &&
    c.promptId === check.promptId &&
    c.platformId === check.platformId &&
    c.id !== check.id
  ).sort((a, b) => new Date(b.date) - new Date(a.date))[0];
}

loadState();

// ============================================================
// ANALYZER MODULE
// ============================================================
const Analyzer = {
  cleanText(text) {
    const original = String(text || '').replace(/\u00a0/g, ' ');
    let lines = original.split(/\r?\n/).map(x => x.trim());

    if (state.settings.analysis.cleanNoise) {
      lines = lines.filter(line => line && !UI_NOISE_PATTERNS.some(re => re.test(line)));
    }

    const compact = [];
    let previous = '';
    for (const line of lines) {
      const key = Utils.slug(line);
      if (!key) continue;
      if (key === previous) continue;
      compact.push(line);
      previous = key;
    }

    let result = compact.join('\n');

    if (state.settings.analysis.dedupeBlocks) {
      const blocks = result.split(/\n{2,}/).map(x => x.trim()).filter(Boolean);
      const seen = new Set();
      result = blocks.filter(b => {
        const k = Utils.slug(b).slice(0, 220);
        if (seen.has(k)) return false;
        seen.add(k);
        return true;
      }).join('\n\n');

      const seq = result.split('\n');
      for (let size = Math.min(20, Math.floor(seq.length / 2)); size >= 4; size--) {
        const first = seq.slice(0, size).map(Utils.slug).join('|');
        const second = seq.slice(size, size * 2).map(Utils.slug).join('|');
        if (first && first === second) {
          result = seq.slice(size).join('\n');
          break;
        }
      }
    }
    return result.trim();
  },

  variants(project) {
    const list = [project.brand, ...(project.brandVariants || [])];
    const words = Utils.slug(project.brand).split(' ');
    if (words.length >= 2) list.push(words.join(' '));
    return Utils.unique(list.map(x => String(x || '').trim()).filter(x => x.length > 2));
  },

  findVariant(text, project) {
    const low = Utils.slug(text);
    const evidence = [];
    let mentions = 0;
    let firstIndex = -1;
    let found = '';
    let exact = false;

    for (const variant of this.variants(project)) {
      const rawIndex = text.toLowerCase().indexOf(variant.toLowerCase());
      const normalizedIndex = low.indexOf(Utils.slug(variant));
      const count = Utils.count(text, variant);

      if (count) {
        mentions += count;
        exact = true;
        if (firstIndex < 0 || rawIndex < firstIndex) {
          firstIndex = rawIndex;
          found = variant;
        }
      } else if (normalizedIndex >= 0 && Utils.slug(variant).length >= 8) {
        mentions += 1;
        if (firstIndex < 0) {
          firstIndex = Math.max(0, normalizedIndex);
          found = variant;
        }
      }
    }

    if (firstIndex >= 0) evidence.push(Utils.excerpt(text, firstIndex));

    const exclusions = (project.homonymExclusions || []).map(Utils.slug);
    const nearby = Utils.slug(Utils.excerpt(text, firstIndex, 180));
    const excluded = firstIndex >= 0 && exclusions.some(x => x && nearby.includes(x));

    const contextTerms = [
      ...(project.contextTerms || []),
      ...(project.services || []),
      project.location,
      Utils.domain(project.domain)
    ].filter(Boolean).map(Utils.slug);
    const contextHit = firstIndex >= 0 && contextTerms.some(x => x && nearby.includes(x));

    const homonymRisk = excluded ||
      ((Utils.slug(project.brand).split(' ').length === 1 || Utils.slug(project.brand).length < 8) && !contextHit);

    return {
      mentioned: mentions > 0 && !excluded,
      mentions: excluded ? 0 : mentions,
      firstIndex,
      found,
      evidence,
      exact,
      contextHit,
      homonymRisk,
      excluded
    };
  },

  classifySource(url, project) {
    const domain = Utils.domain(url);
    let type = 'Sito web';
    let quality = 3;
    let reason = 'Dominio esterno generico';

    if (domain === Utils.domain(project.domain)) {
      type = 'Sito del brand';
      quality = 5;
      reason = 'Fonte proprietaria del progetto';
    } else if (SOCIAL_DOMAINS.some(x => domain.includes(x))) {
      type = 'Social';
      quality = 2;
      reason = 'Profilo o contenuto social';
    } else if (DIRECTORY_DOMAINS.some(x => domain.includes(x))) {
      type = 'Directory';
      quality = 2;
      reason = 'Directory o marketplace';
    } else if (NEWS_HINTS.some(x => domain.includes(x))) {
      type = 'Editore / news';
      quality = 4;
      reason = 'Possibile fonte editoriale';
    } else if (/\.gov\.|\.gov$|\.edu\.|\.edu$|\.ac\./.test(domain)) {
      type = 'Istituzionale / accademica';
      quality = 5;
      reason = 'Dominio istituzionale o accademico';
    } else if (domain.endsWith('.org')) {
      type = 'Organizzazione';
      quality = 4;
      reason = 'Dominio di organizzazione';
    }
    return { url, domain, type, quality, reason };
  },

  responseType(text, urls) {
    const low = Utils.slug(text);
    const listCount = (text.match(/(?:^|\n)\s*(?:\d+[.)]|[-•*])\s+/g) || []).length;

    if (/mappa|marketing consultant|marketing agency|internet marketing service/.test(low)) return 'Local Pack / risultati locali';
    if (/confronto|versus| vs |alternativ/.test(low)) return 'Confronto';
    if (listCount >= 3) return 'Elenco editoriale';
    if (urls.length >= 3) return 'Risposta con fonti';
    if (/non posso|non dispongo|non ho accesso/.test(low)) return 'Risposta limitata';
    return 'Risposta narrativa';
  },

  analyze(project, response, sourcesText = '') {
    const clean = this.cleanText(response);
    const low = clean.toLowerCase();
    const brand = this.findVariant(clean, project);
    const domain = Utils.domain(project.domain);
    const domainPattern = domain ? new RegExp('(?:https?:\\/\\/)?(?:www\\.)?' + domain.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&'), 'i') : null;
    const domainMentionedText = Boolean(domainPattern && domainPattern.test(clean));
    const urls = Utils.unique([...Utils.urls(clean), ...Utils.urls(sourcesText)]);
    const domains = urls.map(Utils.domain);
    const domainCited = domains.some(d => d === domain || d.endsWith('.' + domain));
    const domainIndex = domainMentionedText ? clean.search(domainPattern) : -1;

    const competitors = [];
    const competitorEvidence = {};
    for (const competitor of project.competitors || []) {
      const candidate = String(competitor).trim();
      const cd = Utils.domain(candidate);
      const nameAlias = candidate.includes('.') ? cd.split('.')[0].replace(/[-_]/g, ' ') : candidate;
      const aliases = Utils.unique([candidate, cd, nameAlias]).filter(x => x && x.length > 2);
      let index = -1;
      for (const alias of aliases) {
        const i = low.indexOf(alias.toLowerCase());
        if (i >= 0 && (index < 0 || i < index)) index = i;
      }
      if (index >= 0 || domains.includes(cd)) {
        competitors.push(candidate);
        competitorEvidence[candidate] = [Utils.excerpt(clean, index >= 0 ? index : 0)];
      }
    }

    const services = (project.services || []).filter(s => low.includes(String(s).toLowerCase()));
    const locations = [project.location, ...(project.nearbyLocations || [])].filter(Boolean).filter(x => low.includes(String(x).toLowerCase()));
    const responseType = this.responseType(clean, urls);

    const sentimentOf = (text) => {
      const words = Utils.slug(text).split(/\s+/);
      let positive = 0, negative = 0;
      words.forEach(w => { if (POSITIVE.includes(w)) positive++; if (NEGATIVE.includes(w)) negative++; });
      return positive > negative ? 'Positivo' : negative > positive ? 'Negativo' : 'Neutro';
    };
    const sentiment = sentimentOf(clean);
    const brandWindow = brand.firstIndex >= 0 ? clean.slice(Math.max(0, brand.firstIndex - 180), brand.firstIndex + 260) : '';
    const brandSentiment = brandWindow ? sentimentOf(brandWindow) : 'Non applicabile';

    let position = 0;
    const rankedType = ['Elenco editoriale', 'Local Pack / risultati locali'].includes(responseType);
    if (brand.firstIndex >= 0 && rankedType) {
      const before = clean.slice(0, brand.firstIndex);
      const markers = before.match(/(?:^|\n)\s*(?:\d+[.)]|[-•*])\s+/g) || [];
      position = markers.length + 1;
    }

    const sourceDetails = urls.map(u => ({ ...this.classifySource(u, project), verificationStatus: 'Da verificare' }));
    const sourceQualityScore = sourceDetails.length ? Math.round(sourceDetails.reduce((a,b)=>a+b.quality,0)/(sourceDetails.length*5)*100) : 0;
    const responseQualityScore = Math.min(100, Math.round((clean.length >= 300 ? 35 : clean.length >= 120 ? 20 : 5) + (urls.length ? 30 : 0) + (responseType !== 'Risposta limitata' ? 20 : 0) + (locations.length ? 15 : 0)));

    const completeness = clean.length >= 300 ? 15 : clean.length >= state.settings.analysis.minimumResponseLength ? 10 : 0;
    const sourcesConfidence = urls.length >= 3 ? 25 : urls.length ? 15 : 0;
    const entityConfidence = brand.homonymRisk ? 0 : brand.contextHit || domainMentionedText ? 15 : 7;
    const environment = 25; // penalty applied later
    const review = 0; // becomes 20 after manual review
    const confidenceBreakdown = { environment, completeness, sources: sourcesConfidence, review, entity: entityConfidence };
    const confidence = Object.values(confidenceBreakdown).reduce((a,b)=>a+b,0);

    const evidence = {
      brand: brand.evidence,
      domain: domainIndex >= 0 ? [Utils.excerpt(clean, domainIndex)] : [],
      competitors: competitorEvidence,
      services: Object.fromEntries(services.map(s => [s, [Utils.excerpt(clean, low.indexOf(String(s).toLowerCase()))]])),
      locations: Object.fromEntries(locations.map(l => [l, [Utils.excerpt(clean, low.indexOf(String(l).toLowerCase()))]]))
    };

    const result = {
      cleanResponse: clean, brandMentioned: brand.mentioned, domainCited, domainMentionedText,
      position, mentions: brand.mentions, foundVariant: brand.found, competitors, urls,
      domains: Utils.unique(domains), sourceDetails, sentiment, brandSentiment, responseType,
      servicesPresent: services, locationsPresent: locations, locationPresent: locations.length > 0,
      evidence, confidence, rawConfidence: confidence, confidenceBreakdown,
      homonymRisk: brand.homonymRisk, homonymExcluded: brand.excluded,
      sourceQualityScore, responseQualityScore
    };
    result.score = this.score(result);
    result.visibilityScore = result.score;
    return result;
  },

  score(data) {
    const w = state.settings.scoreWeights;
    let score = 0;
    if (!data.brandMentioned && !data.domainCited && !data.domainMentionedText) return 0;
    score += data.brandMentioned ? w.brand : 0;
    score += data.domainCited ? w.domain : 0;

    if (data.brandMentioned) {
      score += w.position * (data.position <= 1 ? 1 : data.position === 2 ? .8 : data.position === 3 ? .65 : data.position <= 5 ? .45 : .25);
      score += w.mentions * Math.min(1, (data.mentions || 0) / 3);
    }

    const c = (data.competitors || []).length;
    if (data.brandMentioned) {
      score += w.competitors * (c === 0 ? 1 : c === 1 ? .75 : c === 2 ? .5 : .25);
    } else if (c === 0) {
      score += w.competitors * .2;
    }

    score += w.sentiment * (data.brandSentiment === 'Positivo' ? 1 : data.brandSentiment === 'Neutro' ? .5 : 0);
    return Math.max(0, Math.min(100, Math.round(score)));
  },

  highlight(text, project, analysis) {
    let html = Utils.esc(text);
    const replacements = [];

    this.variants(project).forEach(v => replacements.push({ term: v, cls: 'mark-brand' }));
    if (project.domain) replacements.push({ term: Utils.domain(project.domain), cls: 'mark-domain' });
    (analysis.competitors || []).forEach(v => replacements.push({ term: v, cls: 'mark-competitor' }));
    (analysis.servicesPresent || []).forEach(v => replacements.push({ term: v, cls: 'mark-service' }));
    (analysis.locationsPresent || []).forEach(v => replacements.push({ term: v, cls: 'mark-location' }));

    replacements.sort((a, b) => b.term.length - a.term.length).forEach(({ term, cls }) => {
      if (!term) return;
      const escaped = Utils.esc(term).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      html = html.replace(new RegExp(escaped, 'gi'), m => `<mark class="${cls}">${m}</mark>`);
    });
    return html;
  }
};

// ============================================================
// DERIVED DATA MODULE
// ============================================================
const Derived = {
  anomalies() {
    const threshold = Number(state.settings.analysis.anomalyThreshold || 20);
    const items = [];

    for (const check of state.checks) {
      const previous = latestPrevious(check);
      if (!previous) continue;

      const delta = (check.score || 0) - (previous.score || 0);
      if (Math.abs(delta) >= threshold) {
        items.push({
          type: 'score',
          severity: Math.abs(delta) >= 35 ? 'P1' : 'P2',
          check,
          previous,
          title: `Variazione GEO Score ${delta > 0 ? '+' : ''}${delta}`,
          detail: `Lo score è passato da ${previous.score} a ${check.score}. Verifica se sono cambiate fonti, posizione o formulazione della risposta.`
        });
      }

      if (check.brandMentioned !== previous.brandMentioned) {
        items.push({
          type: 'brand',
          severity: 'P1',
          check,
          previous,
          title: check.brandMentioned ? 'Il brand è comparso' : 'Il brand è scomparso',
          detail: 'Confronta le due risposte e registra le fonti nuove o rimosse.'
        });
      }

      const newSources = (check.urls || []).filter(x => !(previous.urls || []).includes(x));
      if (newSources.length) {
        items.push({
          type: 'source',
          severity: 'P3',
          check,
          previous,
          title: `${newSources.length} nuova/e fonte/i`,
          detail: newSources.map(Utils.domain).join(', ')
        });
      }

      const newCompetitors = (check.competitors || []).filter(x => !(previous.competitors || []).includes(x));
      if (newCompetitors.length) {
        items.push({
          type: 'competitor',
          severity: 'P2',
          check,
          previous,
          title: 'Nuovi concorrenti nella risposta',
          detail: newCompetitors.join(', ')
        });
      }
    }

    return items.sort((a, b) => new Date(b.check.date) - new Date(a.check.date));
  },

  projectBenchmark(projectId) {
    const checks = state.checks.filter(c => c.projectId === projectId && !c.archived);
    const avg = checks.length ? Math.round(checks.reduce((s, c) => s + (c.score || 0), 0) / checks.length) : 0;
    const brandRate = checks.length ? Math.round(checks.filter(c => c.brandMentioned).length / checks.length * 100) : 0;
    const domainRate = checks.length ? Math.round(checks.filter(c => c.domainCited).length / checks.length * 100) : 0;
    const positions = checks.filter(c => c.position > 0).map(c => c.position);
    const avgPosition = positions.length ? (positions.reduce((a, b) => a + b, 0) / positions.length).toFixed(1) : '—';

    const competitorCounts = {};
    checks.flatMap(c => c.competitors || []).forEach(x => competitorCounts[x] = (competitorCounts[x] || 0) + 1);
    const topCompetitor = Object.entries(competitorCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || '—';

    return { checks: checks.length, avg, brandRate, domainRate, avgPosition, topCompetitor };
  },

  dataQualityIssues() {
    const issues = [];
    const seen = new Map();

    for (const check of state.checks) {
      const key = [
        check.projectId,
        check.promptId,
        check.platformId,
        new Date(check.date).toISOString().slice(0, 10),
        Utils.slug(check.response).slice(0, 180)
      ].join('|');

      if (seen.has(key)) {
        issues.push({
          kind: 'duplicate',
          priority: 'P2',
          title: 'Possibile verifica duplicata',
          detail: 'Stessa combinazione di progetto, prompt, AI, giorno e testo.',
          checkIds: [seen.get(key), check.id]
        });
      } else {
        seen.set(key, check.id);
      }

      if (!(check.response || '').trim() || check.response.length < state.settings.analysis.minimumResponseLength) {
        issues.push({
          kind: 'short',
          priority: 'P1',
          title: 'Risposta assente o troppo breve',
          detail: 'L’analisi può essere incompleta.',
          checkId: check.id
        });
      }

      if (!(check.urls || []).length) {
        issues.push({
          kind: 'sources',
          priority: 'P3',
          title: 'Fonti non registrate',
          detail: 'Controlla se la piattaforma mostrava citazioni o link.',
          checkId: check.id
        });
      }

      if (check.brandMentioned && check.mentions === 0) {
        issues.push({
          kind: 'inconsistent',
          priority: 'P1',
          title: 'Dato incoerente',
          detail: 'Brand indicato come presente ma menzioni pari a zero.',
          checkId: check.id
        });
      }

      if (check.domainCited && !(check.urls || []).some(u => Utils.domain(u) === Utils.domain(projectBy(check.projectId)?.domain || ''))) {
        issues.push({
          kind: 'domain',
          priority: 'P2',
          title: 'Dominio citato senza URL corrispondente',
          detail: 'Verifica la correzione manuale o aggiungi la fonte.',
          checkId: check.id
        });
      }

      if (!check.manualReview?.completed) {
        issues.push({
          kind: 'review',
          priority: 'P3',
          title: 'Verifica manuale non completata',
          detail: 'Conferma brand, dominio, concorrenti e fonti.',
          checkId: check.id
        });
      }

      if (['normal-account', 'not-verified'].includes(check.testEnvironment || 'not-verified')) {
        const meta = environmentMeta(check.testEnvironment || 'not-verified');
        issues.push({
          kind: 'environment',
          priority: check.testEnvironment === 'normal-account' ? 'P1' : 'P2',
          title: 'Ambiente di test non neutrale',
          detail: meta.message,
          checkId: check.id        });
      }
    }

    for (const prompt of state.prompts) {
      if (!state.checks.some(c => c.promptId === prompt.id)) {
        issues.push({
          kind: 'untested',
          priority: 'P2',
          title: 'Prompt mai testato',
          detail: prompt.text,
          promptId: prompt.id
        });
      }
    }

    return issues;
  }
};

// OPPORTUNITY GENERATOR
// ============================================================
function priorityDetails(priority) {
  const map = {
    P1: { label: 'Urgente', when: 'Da iniziare entro 7 giorni', effort: 'Medio–alto', meaning: 'Blocca o limita direttamente la possibilità che il brand venga citato.' },
    P2: { label: 'Alta', when: 'Da completare entro 30 giorni', effort: 'Medio', meaning: 'Migliora segnali importanti, ma richiede più verifiche prima di attribuire la causa.' },
    P3: { label: 'Media', when: 'Da pianificare entro 60 giorni', effort: 'Basso–medio', meaning: 'Rafforza autorevolezza e qualità delle fonti nel medio periodo.' },
    P4: { label: 'Bassa', when: 'Da valutare entro 90 giorni', effort: 'Basso', meaning: 'Ottimizzazione incrementale, utile dopo aver completato le attività principali.' }
  };
  return map[priority] || { label: 'Da valutare', when: 'Da pianificare', effort: 'Variabile', meaning: 'Richiede verifica manuale.' };
}

function environmentMeta(value) {

function generateOpportunities() {
  const previous = new Map((state.opportunities || []).map(o => [`${o.checkId}|${o.type || Utils.slug(o.title)}`, o]));
  const output = [];

  for (const check of state.checks) {
    const project = projectBy(check.projectId);
    const prompt = promptBy(check.promptId);
    if (!project || !prompt) continue;

    const add = (type, priority, title, why, action, verify, steps, expectedOutcome, notes = '', evidenceLevel = 'Da verificare') => {
      output.push({
        id: `${check.id}-${type}`,
        type,
        projectId: check.projectId,
        promptId: check.promptId,
        checkId: check.id,
        priority,
        title,
        why,
        action,
        verify,
        steps,
        expectedOutcome,
        notes,
        evidenceLevel,
        tasks: (previous.get(`${check.id}|${type}`)?.tasks || steps.map((text, index) => ({ id: `${type}-${index}`, text, done: false }))),
        owner: previous.get(`${check.id}|${type}`)?.owner || '',
        dueDate: previous.get(`${check.id}|${type}`)?.dueDate || '',
        completedAt: previous.get(`${check.id}|${type}`)?.completedAt || '',
        status: previous.get(`${check.id}|${type}`)?.status || 'Da fare'
      });
    };

    if (!check.brandMentioned) {
      add('brand_absent', 'P1', 'Il brand non compare',
        `Per il prompt “${prompt.text}” l’AI cita altri soggetti ma non ${project.brand}.`,
        `Costruisci una pagina che risponda in modo diretto alla query e renda verificabile perché il brand è pertinente.`,
        `Ripeti lo stesso prompt in almeno 3 sessioni neutrali e su almeno 2 piattaforme AI dopo l’indicizzazione.`,
        [
          'Controlla che la pagina target abbia un H1 coerente con la query e una risposta chiara nelle prime 120 parole.',
          'Aggiungi servizi, località, destinatari, processo di lavoro e prove reali come case study, recensioni o risultati documentabili.',
          'Collega la pagina da home, pagine servizio e articoli pertinenti con anchor descrittive.',
          'Richiedi indicizzazione e attendi un ciclo ragionevole prima di ripetere il test.'
        ],
        'Aumentare la probabilità che l’AI associ il brand alla query senza inventare dati.',
        'Una singola nuova citazione non dimostra stabilità: confronta più sessioni.'
      );
    }

    if (check.brandMentioned && !check.domainCited) {
      add('domain_absent', 'P1', 'Brand presente ma sito non citato',
        'Il nome compare, ma l’utente non riceve un collegamento al sito ufficiale.',
        'Rendi inequivocabile l’associazione tra nome, dominio, servizi e profili esterni.',
        'Controlla se nelle verifiche successive compare il dominio ufficiale tra le fonti o nel testo.',
        [
          'Uniforma nome, descrizione, URL e contatti su sito, Google Business Profile e profili professionali.',
          'Migliora pagina Chi sono/Chi siamo con dati verificabili, autore, competenze, contatti e link al dominio canonico.',
          'Implementa dati strutturati Person o Organization coerenti con le informazioni visibili.',
          'Ottieni citazioni esterne pertinenti che menzionino sia il brand sia il dominio ufficiale.'
        ],
        'Fare in modo che l’AI non riconosca solo il nome, ma sappia collegarlo alla fonte ufficiale.'
      );
    }

    if ((check.competitors || []).length) {
      add('competitor_gap', 'P2', 'Analizzare i concorrenti citati',
        `Sono presenti: ${check.competitors.join(', ')}.`,
        `Studia perché questi soggetti sono facili da riconoscere e citare, senza copiarne i contenuti.`,
        `Confronta la pagina aggiornata con una checklist e ripeti il prompt identico.`,
        [
          'Apri le fonti citate dall’AI per i primi 3 concorrenti.',
          'Registra struttura, entità, recensioni, dati concreti, directory e segnali locali presenti.',
          'Evidenzia ciò che manca nel tuo sito ma che puoi dimostrare con dati reali.',
          'Aggiorna la pagina target e crea eventuali contenuti di supporto.'
        ],
        'Colmare gap informativi e di autorevolezza che possono favorire i concorrenti.'
      );
    }

    if (!(check.urls || []).length) {
      add('sources_missing', 'P2', 'Fonti non disponibili',
        'La risposta non contiene URL registrati, quindi non è possibile capire quali fonti abbiano sostenuto la selezione.',
        'Ripeti il test chiedendo esplicitamente fonti verificabili e salva ogni URL.',
        'La verifica è completa quando ogni fonte ha URL, dominio e tipologia.',
        [
          'Usa un prompt che richieda fonti pubbliche e aggiornate.',
          'Apri ogni citazione e verifica che supporti davvero l’affermazione.',
          'Salva URL, dominio, tipologia e qualità della fonte.',
          'Scarta fonti non accessibili o non pertinenti.'
        ],
        'Rendere l’analisi ripetibile e distinguere una semplice menzione da una citazione documentata.'
      );
    }

    if (!(check.servicesPresent || []).length && project.services?.length) {
      add('services_weak', 'P2', 'Servizi del brand non riconosciuti',
        `Nella risposta non compaiono i servizi configurati: ${project.services.join(', ')}.`,
        `Rendi esplicita e verificabile l’associazione tra brand e servizi prioritari.`,
        `Cerca il brand insieme a ciascun servizio e registra se l’associazione compare.`,
        [
          'Assegna una pagina primaria a ogni servizio importante.',
          'Descrivi per chi è il servizio, problema risolto, processo, limiti e prova concreta.',
          'Aggiungi collegamenti interni tra servizio, case study, FAQ e pagina autore.',
          'Controlla title, H1, introduzione e dati strutturati per coerenza.'
        ],
        'Ridurre l’ambiguità sul posizionamento del brand e sui servizi realmente offerti.'
      );
    }

    if (!(check.locationsPresent || []).length && project.location) {
      add('location_weak', 'P2', 'Segnale geografico debole',
        `La risposta non associa chiaramente il risultato a ${project.location}.`,
        `Rafforza i segnali locali coerenti e verificabili.`,
        `Ripeti il prompt specificando ${project.location} e confronta presenza, posizione e fonti.`,
        [
          'Controlla coerenza di nome, indirizzo e contatti sul sito e sui profili locali.',
          'Crea o migliora una pagina locale utile, non una pagina duplicata con sola sostituzione della città.',
          'Aggiungi testimonianze locali verificabili, aree servite e riferimenti territoriali reali.',
          'Ottieni citazioni da fonti locali pertinenti, associazioni o partner.'
        ],
        'Aumentare la chiarezza dell’associazione tra brand, servizio e area geografica.'
      );
    }

    const lowQuality = (check.sourceDetails || []).filter(s => s.quality <= 2);
    if (lowQuality.length) {
      add('source_dependency', 'P3', 'Dipendenza da directory o social',
        `Tra le fonti compaiono ${lowQuality.map(s => s.domain).join(', ')}.`,
        `Diversifica le fonti con segnali editoriali, professionali e istituzionali pertinenti.`,
        `Verifica se nelle risposte future aumentano fonti indipendenti di qualità superiore.`,
        [
          'Individua associazioni, partner, media locali e portali verticali pertinenti.',
          'Prepara dati, case study o insight originali che possano essere citati.',
          'Proponi collaborazioni editoriali o contenuti con firma e link ufficiale.',
          'Monitora quali nuove fonti vengono effettivamente richiamate dalle AI.'
        ],
        'Ridurre la dipendenza da fonti deboli e aumentare la credibilità del brand.'
      );
    }
  }

  state.opportunities = output;
  saveState(true);
  return output;
}

function field(name, label, value = '', required = false, placeholder = '', type = 'text', help = '') {
  return `<div class="field"><label for="${name}">${Utils.esc(label)}${required ? ' *' : ''}</label><input id="${name}" name="${name}" type="${type}" value="${Utils.esc(value)}" placeholder="${Utils.esc(placeholder)}" ${required ? 'required' : ''}>${help ? `<div class="help">${Utils.esc(help)}</div>` : ''}</div>`;
}

function textareaField(name, label, value = '', help = '', rows = 5) {
  return `<div class="field full"><label for="${name}">${Utils.esc(label)}</label><textarea id="${name}" name="${name}" rows="${rows}">${Utils.esc(value)}</textarea>${help ? `<div class="help">${Utils.esc(help)}</div>` : ''}</div>`;
}

function options(items, value, label = x => x.name) {
  return items.map(x => `<option value="${Utils.esc(x.id)}" ${x.id === value ? 'selected' : ''}>${Utils.esc(label(x))}</option>`).join('');
}

function badge(text, type = '') {
  return `<span class="badge ${type}">${Utils.esc(text)}</span>`;
}

function metric(label, value, sub = '') {
  return `<div class="card metric"><div class="metric-label">${Utils.esc(label)}</div><div class="metric-value">${value}</div><div class="metric-change">${sub}</div></div>`;
}

function empty(title, text, button = '') {
  return `<div class="empty"><strong>${Utils.esc(title)}</strong>${Utils.esc(text)}${button ? `<div style="margin-top:13px">${button}</div>` : ''}</div>`;
}

function loadingSpinner() {
  return `<div class="loading-spinner">Caricamento...</div>`;
}

function modal(title, body, actions = '') {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = body;
  document.getElementById('modalActions').innerHTML = actions;
  document.getElementById('modalBackdrop').classList.add('show');
  document.getElementById('app').setAttribute('aria-hidden', 'true');
  setTimeout(() => document.getElementById('modalClose').focus(), 0);
}

function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('show');
  document.getElementById('app').removeAttribute('aria-hidden');
}

function setSection(id) {
  window.currentSection = id;
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === id));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.section === id));
  document.getElementById('pageTitle').textContent = PAGES[id][0];
  document.getElementById('pageSubtitle').textContent = PAGES[id][1];
  render(id);
  closeMobile();
}

function closeMobile() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('mobileOverlay').classList.remove('show');
}

function applyTheme() {
  let theme = state.settings.theme;
  if (theme === 'auto') theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
  document.documentElement.dataset.theme = theme;
  document.documentElement.style.setProperty('--accent', state.settings.primary || '#2853d7');
  document.documentElement.style.setProperty('--accent-2', state.settings.secondary || '#173ba8');
}

function copyText(text) {
  navigator.clipboard?.writeText(text).then(() => Utils.toast('Copiato', 'success')).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    Utils.toast('Copiato', 'success');
  });
}

function deleteConfirm(message, onConfirm) {
  modal('Conferma eliminazione', `<div class="notice danger">${Utils.esc(message)}</div>`,
    `<button class="btn" data-close-modal>Annulla</button><button class="btn btn-danger" id="confirmDelete">Elimina</button>`
  );
  document.getElementById('confirmDelete').onclick = () => { onConfirm(); closeModal(); };
}

function render(id) {
  const renderMap = {
    dashboard: renderDashboard,
    onboarding: renderOnboarding,
    projects: renderProjects,
    prompts: renderPrompts,
    'new-check': renderNewCheck,
    results: renderResults,
    matrix: renderMatrix,
    compare: renderCompare,
    opportunities: renderOpportunities,
    quality: renderQuality,
    generator: renderGenerator,
    'content-engine': renderContentEngine,
    reports: renderReports,
    settings: renderSettings,
    backup: renderBackup,
    guide: renderGuide
  };
  if (renderMap[id]) renderMap[id]();
}

function renderCoverageSummary() {
  const active = state.platforms.filter(p => p.active);
  const total = state.prompts.length * active.length;
  if (!total) return empty('Matrice non disponibile', 'Crea prompt e attiva almeno una piattaforma.');
  const covered = state.prompts.reduce((n, p) =>
    n + active.filter(ai => state.checks.some(c => c.promptId === p.id && c.platformId === ai.id)).length, 0);
  const pct = Math.round(covered / total * 100);
  return `<div class="score-large">${pct}%</div><div class="progress"><span style="width:${pct}%"></span></div><div class="help" style="margin-top:8px">${covered} combinazioni testate su ${total}</div>`;
}

function resultsTable(checks, selectable = true, showReportAction = false) {
  if (!checks.length) return empty('Nessuna verifica', 'Incolla e analizza una risposta reale.');
  return `<div class="table-wrap"><table><thead><tr>${selectable ? '<th><input type="checkbox" id="selectAllResults" aria-label="Seleziona tutte"></th>' : ''}<th>Prompt / progetto</th><th>AI</th><th>Esito</th><th>Score</th><th>Confidenza</th><th>Data</th><th>Azioni</th></tr></thead><tbody>${checks.map(c => `<tr data-result-row data-id="${c.id}" data-search="${Utils.esc(Utils.slug(JSON.stringify(c)))}" data-project="${c.projectId}" data-platform="${c.platformId}" data-brand="${c.brandMentioned ? 'yes' : 'no'}" data-domain="${c.domainCited ? 'yes' : 'no'}" data-sources="${(c.urls || []).length ? 'yes' : 'no'}">${selectable ? `<td><input type="checkbox" class="result-select" value="${c.id}" ${window.selectedResultIds?.has(c.id) ? 'checked' : ''}></td>` : ''}<td><strong>${Utils.esc(promptBy(c.promptId)?.text || 'Prompt eliminato')}</strong><div class="help">${Utils.esc(projectBy(c.projectId)?.name || 'Progetto eliminato')}</div></td><td>${Utils.esc(platformBy(c.platformId).name)}<div class="help">${Utils.esc(c.responseType || '')}</div></td><td>${c.brandMentioned ? badge('Brand', 'success') : badge('Assente', 'danger')} ${c.domainCited ? badge('Dominio', 'info') : ''}</td><td><strong>${c.score || 0}</strong>/100</td><td>${c.confidence || 0}/100</td><td>${Utils.date(c.date, true)}</td><td><div class="flex gap-8 wrap"><button class="btn btn-sm" data-view-check="${c.id}">Dettagli</button><button class="btn btn-sm" data-edit-check="${c.id}">Modifica</button><button class="btn btn-sm" data-duplicate-check="${c.id}">Duplica</button>${showReportAction ? `<button class="btn btn-sm btn-primary" data-report-check="${c.id}">Report</button>` : ''}</div></td></tr>`).join('')}</tbody></table></div>`;
}

function renderEvidence(a) {
  const rows = [];
  (a.evidence?.brand || []).forEach(x => rows.push(['Brand', x]));
  (a.evidence?.domain || []).forEach(x => rows.push(['Dominio', x]));
  Object.entries(a.evidence?.competitors || {}).forEach(([k, v]) => v.forEach(x => rows.push(['Concorrente: ' + k, x])));
  Object.entries(a.evidence?.services || {}).forEach(([k, v]) => v.forEach(x => rows.push(['Servizio: ' + k, x])));
  Object.entries(a.evidence?.locations || {}).forEach(([k, v]) => v.forEach(x => rows.push(['Località: ' + k, x])));

  return rows.length ? rows.map(([title, text]) =>
    `<div class="evidence"><strong>${Utils.esc(title)}</strong><blockquote>${Utils.esc(text)}</blockquote></div>`
  ).join('') : empty('Nessuna prova testuale', 'Il brand, il dominio o i termini configurati non sono stati trovati.');
}

function renderSources(details) {
  if (!details?.length) return empty('Nessuna fonte', 'Aggiungi URL reali se la piattaforma mostrava citazioni.');
  return `<div class="source-table">${details.map(s =>
    `<div class="source-row"><div><strong>${Utils.esc(s.domain)}</strong><div class="help">${Utils.esc(s.reason)}</div></div>${badge(s.type, s.quality >= 4 ? 'success' : s.quality <= 2 ? 'warning' : 'info')}<div><strong>${s.quality}/5</strong><div class="help">${Utils.esc(s.verificationStatus || 'Da verificare')}</div></div></div>`
  ).join('')}</div>`;
}

function renderDashboard() {
  const checks = state.checks.filter(c => !c.archived);
  const avg = checks.length ? Math.round(checks.reduce((s, c) => s + (c.score || 0), 0) / checks.length) : 0;
  const brandRate = checks.length ? Math.round(checks.filter(c => c.brandMentioned).length / checks.length * 100) : 0;
  const domainRate = checks.length ? Math.round(checks.filter(c => c.domainCited).length / checks.length * 100) : 0;
  const quality = Derived.dataQualityIssues();
  const anomalyList = Derived.anomalies().slice(0, 5);
  const projectRows = state.projects.filter(p => !p.archived).map(p => [p, Derived.projectBenchmark(p.id)]).sort((a, b) => b[1].avg - a[1].avg);

  document.getElementById('dashboard').innerHTML = `

function inferQuickMeta(keyword, project) {
  const k = String(keyword || '').trim();
  const l = k.toLowerCase();
  let category = 'Informativa', intent = 'Informativo', priority = 'P3';

  if (/miglior|migliore|consigliat|chi scegliere|quale scegliere|top\b/.test(l)) { category = 'Comparativa'; intent = 'Commerciale comparativo'; priority = 'P1'; } else if (/vicino a me|a [a-zà-ù' -]+$|in [a-zà-ù' -]+$/.test(l)) { category = 'Locale'; intent = 'Locale commerciale'; priority = 'P1'; } else if (/quanto costa|prezzo|preventivo|tariff/.test(l)) { category = 'Commerciale'; intent = 'Transazionale'; priority = 'P2'; } else if (/recension|opinioni|affidabile|è bravo/.test(l)) { category = 'Reputazionale'; intent = 'Reputazionale'; priority = 'P2'; }

  const known = [project?.location, ...(project?.nearbyLocations || [])].filter(Boolean);
  const location = known.find(x => l.includes(String(x).toLowerCase())) || project?.location || '';
  return { category, intent, priority, location };
}

function buildQuickPrompt(keyword, style, project) {
  const q = String(keyword || '').trim().replace(/[.\s]+$/, '');
  if (style === 'exact') return q.endsWith('?') ? q : q + '?';
  if (style === 'local') {
    return `Usa la ricerca web.\n\n${q}${q.endsWith('?') ? '' : '?'}\n\nEsegui la ricerca come un potenziale cliente nel mercato ${project?.market || 'italiano'}${project?.location ? `, con riferimento a ${project.location}` : ''}. Considera esclusivamente informazioni pubbliche, aggiornate e verificabili. Distingui professionisti specializzati da agenzie generaliste. Per ogni risultato indica nome, sito web, specializzazione, area servita, motivazione della selezione e fonti utilizzate. Non usare informazioni personali dell’utente o conversazioni precedenti.`;
  }
  return `Usa la ricerca web.\n\n${q}${q.endsWith('?') ? '' : '?'}\n\nConsidera esclusivamente informazioni pubbliche, aggiornate e verificabili. Per ogni risultato indica nome, sito web, servizi principali, motivo della selezione e fonti utilizzate. Non basarti su informazioni personali dell’utente o su conversazioni precedenti.`;
}

function applyEnvironmentConfidence(analysis, environment, manualReviewCompleted = false) {
  const meta = environmentMeta(environment);
  const breakdown = { ...(analysis.confidenceBreakdown || {}) };
  breakdown.environment = Math.max(0, 25 - meta.penalty);
  breakdown.review = manualReviewCompleted ? 20 : (breakdown.review || 0);
  const raw = Object.values({ ...breakdown, environment: 25 }).reduce((a, b) => a + Number(b || 0), 0);
  const finalConfidence = Math.max(0, Math.min(100, Object.values(breakdown).reduce((a, b) => a + Number(b || 0), 0)));
  return { ...analysis, testEnvironment: environment, environmentPenalty: meta.penalty, rawConfidence: raw, confidenceBreakdown: breakdown, confidence: finalConfidence };
}

function prepareQuickCheck() {
  const keyword = document.getElementById('quickKeyword')?.value.trim() || '';
  const projectId = document.getElementById('quickProject')?.value || document.getElementById('checkProject')?.value || '';
  const style = document.getElementById('quickPromptStyle')?.value || 'sources';

  if (!keyword) { Utils.toast('Inserisci la keyword o la domanda da ricercare.', 'error'); document.getElementById('quickKeyword')?.focus(); return; }
  const project = projectBy(projectId);
  if (!project) { Utils.toast('Seleziona un progetto.', 'error'); return; }

  const text = buildQuickPrompt(keyword, style, project);
  const meta = inferQuickMeta(keyword, project);

  let prompt = state.prompts.find(p => p.projectId === projectId && p.text.trim().toLowerCase() === text.trim().toLowerCase());
  if (!prompt) {
    prompt = {
      id: Utils.uid(),
      projectId,
      text,
      category: meta.category,
      priority: meta.priority,
      intent: meta.intent,
      tags: ['ricerca rapida'],
      frequency: 'Mensile',
      notes: 'Creato automaticamente dalla modalità Ricerca rapida.',
      createdAt: Utils.now(),
      updatedAt: Utils.now()
    };
    state.prompts.push(prompt);
  }

  const platformId = document.querySelector('#checkForm [name=platformId]')?.value || 'chatgpt';
  state.checkDraft = {
    ...state.checkDraft,
    quickKeyword: keyword,
    quickPromptStyle: style,
    quickPrepared: true,
    projectId,
    promptId: prompt.id,
    platformId,
    model: platformId === 'chatgpt' ? 'ChatGPT con ricerca web attiva' : `${platformBy(platformId)?.name || 'AI'} con ricerca web`,
    date: Utils.localDateTime(),
    location: meta.location,
    sessionType: 'Test neutrale',
    testEnvironment: state.checkDraft?.testEnvironment || 'not-verified',
    notes: `Ricerca rapida preparata automaticamente. Mercato target: ${project.market || 'non specificato'}${meta.location ? `. Località: ${meta.location}` : ''}. Eseguire il test in finestra privata senza login o in chat temporanea e registrare l’ambiente realmente usato.`,
    wizardStep: 1,
    updatedAt: Utils.now()
  };
  saveState(true);
  renderNewCheck();

}

function showWizardStep(step) {
  currentWizardStep = Math.max(1, Math.min(5, Number(step)));
  document.querySelectorAll('.wizard-panel').forEach(x => x.classList.toggle('active', Number(x.dataset.step) === currentWizardStep));
  document.querySelectorAll('.wizard-step-nav').forEach(x => x.classList.toggle('active', Number(x.dataset.wizardStep) === currentWizardStep));
  const next = document.querySelector('[data-action="wizard-next"]');
  if (next) next.textContent = currentWizardStep === 5 ? 'Salva verifica' : 'Continua';
  saveDraft();
}

function validateStep(step) {
  const form = document.getElementById('checkForm');
  const d = Utils.form(form);
  if (step === 1) {
    for (const name of ['projectId', 'promptId', 'platformId']) {
      const el = form.elements[name];
      if (!el.value) { el.reportValidity(); return false; }
    }
  }
  if (step === 2) {
    if ((d.response || '').trim().length < state.settings.analysis.minimumResponseLength) {
      Utils.toast(`La risposta deve contenere almeno ${state.settings.analysis.minimumResponseLength} caratteri. Verifica di aver incollato tutto.`, 'error');
      return false;
    }
  }
  if (step === 3 && !analysisDraft) { Utils.toast('Esegui prima l’analisi.', 'error'); return false; }
  if (step === 4 && !manualReviewValid()) { Utils.toast('Conferma i quattro controlli obbligatori.', 'error'); return false; }
  return true;
}

function previewClean() {
  const d = Utils.form(document.getElementById('checkForm'));
  const cleaned = Analyzer.cleanText(d.response);
  document.getElementById('cleanPreview').innerHTML = `
    <div class="notice success"><strong>Testo pulito:</strong> ${d.response.length - cleaned.length} caratteri rimossi.</div>
    <div class="answer-view">${Utils.esc(cleaned)}</div>
  `;
}

function runAnalysis(showToast = true) {
  const form = document.getElementById('checkForm');
  if (!form) return;
  const d = Utils.form(form);
  const project = projectBy(d.projectId);
  if (!project || !(d.response || '').trim()) {
    if (showToast) Utils.toast('Seleziona il progetto e incolla una risposta.', 'error');
    return;
  }
  analysisDraft = applyEnvironmentConfidence(
    Analyzer.analyze(project, d.response, d.sources),
    d.testEnvironment || 'not-verified'
  );
  renderAnalysisOutput(project, analysisDraft);
  renderManualReview(analysisDraft);
  renderSaveSummary(d, analysisDraft);
  if (showToast) Utils.toast('Analisi completata', 'success');
  saveDraft();
}

function manualReviewValid() {
  const form = document.getElementById('checkForm');
  return ['reviewBrand', 'reviewDomain', 'reviewCompetitors', 'reviewSources'].every(n => form.elements[n]?.checked);
}

function finalAnalysisFromForm() {
  const form = document.getElementById('checkForm');
  const d = Utils.form(form);
  const project = projectBy(d.projectId);
  const base = analysisDraft || applyEnvironmentConfidence(Analyzer.analyze(project, d.response, d.sources), d.testEnvironment || 'not-verified');
  const result = {
    ...base,
    brandMentioned: d.manualBrand === 'true',
    domainCited: d.manualDomain === 'true',
    position: Number(d.manualPosition || 0),
    mentions: Number(d.manualMentions || 0),
    competitors: Utils.lines(d.manualCompetitors),
    urls: Utils.lines(d.manualUrls),
    responseType: d.manualResponseType || base.responseType,
    sentiment: d.manualSentiment || base.sentiment
  };
  result.sourceDetails = result.urls.map(u => Analyzer.classifySource(u, project));
  result.score = Analyzer.score(result);
  result.visibilityScore = result.score;
  const reviewed = applyEnvironmentConfidence(result, d.testEnvironment || 'not-verified', manualReviewValid());
  return reviewed;
}

function applyResultFilters() {
  const q = Utils.slug(document.getElementById('resultSearch')?.value || '');
  const project = document.getElementById('resultProjectFilter')?.value || '';
  const platform = document.getElementById('resultPlatformFilter')?.value || '';
  const mention = document.getElementById('resultMentionFilter')?.value || '';

  document.querySelectorAll('[data-result-row]').forEach(row => {
    const visible =
      (!q || row.dataset.search.includes(q)) &&
      (!project || row.dataset.project === project) &&
      (!platform || row.dataset.platform === platform) &&
      (!mention ||
        (mention === 'brand' && row.dataset.brand === 'yes') ||
        (mention === 'domain' && row.dataset.domain === 'yes') ||
        (mention === 'absent' && row.dataset.brand === 'no') ||
        (mention === 'sources' && row.dataset.sources === 'yes'));
    row.style.display = visible ? '' : 'none';
  });
}

function checkInsights(c) {
  const p = projectBy(c.projectId);
  const items = [];
  if (!c.brandMentioned) items.push(`<div class="evidence"><strong>Il brand non compare</strong><blockquote>Crea o migliora una pagina che risponda direttamente al prompt, con dati reali, servizio, località e prova dell’esperienza.</blockquote></div>`);
  if (c.brandMentioned && !c.domainCited) items.push(`<div class="evidence"><strong>Il sito non viene collegato</strong><blockquote>Rafforza l’associazione tra ${Utils.esc(p?.brand || 'brand')} e ${Utils.esc(p?.domain || 'dominio')} tramite schema, profili coerenti e citazioni indipendenti.</blockquote></div>`);
  if (c.competitors?.length) items.push(`<div class="evidence"><strong>Concorrenti da studiare</strong><blockquote>${Utils.esc(c.competitors.join(', '))}. Analizza le fonti che li sostengono, non solo il loro testo.</blockquote></div>`);
  if (!c.urls?.length) items.push(`<div class="evidence"><strong>Fonti mancanti</strong><blockquote>Ripeti il test chiedendo le fonti e registra gli URL effettivi.</blockquote></div>`);
  return items.join('') || '<div class="notice success">Il brand e il dominio sono presenti. Continua a testare la stabilità su sessioni e date diverse.</div>';
}

function editCheck(id) {
  const c = state.checks.find(x => x.id === id);
  if (!c) return;
  const p = projectBy(c.projectId);

  modal('Modifica verifica', `
    <form id="editCheckForm" class="form-grid"><input type="hidden" name="id" value="${c.id}">${textareaField('response', 'Risposta completa', c.response, '', 12).replace('<textarea', '<textarea class="response-text"')}${textareaField('sources', 'Fonti / URL', (c.urls || []).join('\n'), '', 5)}${field('model', 'Modello / modalità', c.model || '')}${field('location', 'Località', c.location || '')}${textareaField('notes', 'Note', c.notes || '', '', 3)}<div class="field"><label>Rilevanza</label><select name="relevance">${[1, 2, 3, 4, 5].map(n => `<option ${c.relevance === n ? 'selected' : ''}>${n}</option>`).join('')}</select></div><div class="field"><label>Attendibilità</label><select name="reliability">${[1, 2, 3, 4, 5].map(n => `<option ${c.reliability === n ? 'selected' : ''}>${n}</option>`).join('')}</select></div></form>
    <div class="toolbar" style="margin-top:15px"><button class="btn btn-primary" id="editAnalyzeButton">Analizza modifiche</button></div>
    <div id="editAnalysis">${renderEditAnalysis(c, p)}</div>
  `, `<button class="btn" data-close-modal>Annulla</button><button class="btn btn-primary" id="saveEditedCheck">Salva modifiche</button>`);

  let edited = { ...c };
  document.getElementById('editAnalyzeButton').onclick = () => {
    const d = Utils.form(document.getElementById('editCheckForm'));
    edited = { ...edited, ...Analyzer.analyze(p, d.response, d.sources) };
    document.getElementById('editAnalysis').innerHTML = renderEditAnalysis(edited, p);
    Utils.toast('Analisi aggiornata', 'success');
  };
  document.getElementById('saveEditedCheck').onclick = () => {
    const d = Utils.form(document.getElementById('editCheckForm'));
    Object.assign(c, edited, {
      response: d.response,
      cleanResponse: edited.cleanResponse || Analyzer.cleanText(d.response),
      urls: edited.urls || Utils.lines(d.sources),
      sources: Utils.lines(d.sources),
      model: d.model,
      location: d.location,
      notes: d.notes,
      relevance: Number(d.relevance),
      reliability: Number(d.reliability),
      updatedAt: Utils.now()
    });
    saveState();
    closeModal();
    renderResults();
  };
}

function auditAssessment(project, opportunity) {
  const a = project?.pageAudit || {};
  const rows = [];
  const title = opportunity.title.toLowerCase();
  if (title.includes('brand non compare') || title.includes('servizi')) {
    rows.push(['Title della pagina', a.title ? 'Confermato: dato inserito' : 'Dato mancante', a.title || 'Inserisci il title reale per verificare la coerenza con la query.']);
    rows.push(['H1 della pagina', a.h1 ? 'Confermato: dato inserito' : 'Dato mancante', a.h1 || 'Inserisci l’H1 reale prima di modificarlo.']);
    rows.push(['Introduzione', a.intro ? 'Confermato: dato inserito' : 'Dato mancante', a.intro ? `${a.intro.length} caratteri registrati` : 'Incolla le prime 120–150 parole.']);
    rows.push(['Autore identificabile', a.hasAuthor ? 'Confermato' : 'Da verificare', a.hasAuthor ? 'La pagina dichiara un autore.' : 'Controlla firma, profilo e responsabilità editoriale.']);
    rows.push(['FAQ', a.hasFaq ? 'Confermato' : 'Da verificare', a.hasFaq ? 'FAQ già presenti: controlla pertinenza e unicità.' : 'Valuta FAQ solo se rispondono a domande reali.']);
    rows.push(['Dati strutturati', a.hasSchema ? 'Confermato' : 'Da verificare', a.hasSchema ? 'Schema dichiarato come verificato.' : 'Valida lo schema prima di aggiungerne altro.']);
  }
  if (!rows.length) return '';
  return `<div class="implementation-box"><h4>Controllo della pagina target</h4><div class="source-table">${rows.map(([label,status,detail]) => `<div class="source-row"><div><strong>${Utils.esc(label)}</strong><div class="help">${Utils.esc(detail)}</div></div><span class="audit-status ${status.startsWith('Confermato') ? 'audit-confirmed' : status === 'Dato mancante' ? 'audit-check' : 'audit-probable'}">${Utils.esc(status)}</span><span></span></div>`).join('')}</div></div>`;
}

function contentProblemType(check, opportunity) {
  const title = String(opportunity?.title || '').toLowerCase();
  if (title.includes('brand non compare')) return 'brand_absent';
  if (title.includes('sito non citato') || title.includes('dominio')) return 'domain_absent';
  if (title.includes('concorrenti')) return 'competitor_gap';
  if (title.includes('servizi')) return 'service_gap';
  if (title.includes('local') || title.includes('territ')) return 'local_gap';
  if (title.includes('font')) return 'source_gap';
  if (check && !check.brandMentioned) return 'brand_absent';
  if (check && !check.domainCited) return 'domain_absent';
  return 'intent_gap';
}

function contentDecision(project, prompt, check, opportunity) {
  const keyword = prompt?.text || '';
  const target = project?.targetUrl || '';
  const audit = project?.pageAudit || {};
  const query = Utils.slug(keyword);
  const targetSlug = Utils.slug(target.replace(/^https?:\/\/[^/]+/i,''));
  const commercial = /consulent|servizi|preventiv|prezzo|freelance|agenzia|corso|studio|dentist|avvocat|realizzazione/.test(query);
  const targetConfigured = Boolean(target);
  const pageSubstantial = Boolean(audit.title || audit.h1 || audit.intro);
  const overlap = targetSlug && query.split(' ').filter(x=>x.length>3).some(x=>targetSlug.includes(x));
  let recommendation = 'support_article';
  let reason = 'La query può essere coperta con un contenuto informativo di supporto collegato alla pagina principale.';
  let cannibalization = 'Basso';
  if (targetConfigured && (commercial || overlap)) {
    recommendation = 'update_page';
    reason = 'Esiste una pagina target e la query appare commerciale o molto vicina al suo tema: creare un duplicato aumenterebbe il rischio di cannibalizzazione.';
    cannibalization = 'Alto';
  } else if (targetConfigured && pageSubstantial) {
    recommendation = 'support_article';
    reason = 'La pagina target è già definita; conviene creare un articolo con intento informativo distinto e collegarlo alla pagina commerciale.';
    cannibalization = 'Medio';
  } else if (!targetConfigured) {
    recommendation = commercial ? 'service_page' : 'support_article';
    reason = commercial ? 'La query appare commerciale e non è stata configurata una pagina target: serve prima una pagina servizio dedicata.' : 'Non è presente una pagina target: il contenuto può diventare la prima risorsa informativa del cluster.';
    cannibalization = 'Basso';
  }
  return { recommendation, reason, cannibalization };
}

function contentLabels(type) {
  const map = {
    update_page:'Aggiorna pagina esistente', support_article:'Genera articolo di supporto', service_page:'Crea pagina servizio', brief:'Genera solo brief'
  };
  return map[type] || type;
}

function contentFacts(project, check) {
  return [
    ['Brand', project?.brand || '[DA INSERIRE]'],
    ['Dominio', project?.domain || '[DA INSERIRE]'],
    ['Pagina target', project?.targetUrl || '[DA DEFINIRE]'],
    ['Località', project?.location || '[DA DEFINIRE]'],
    ['Servizi verificati', (project?.services || []).join(', ') || '[DA INSERIRE]'],
    ['Descrizione verificata', project?.description || '[DA INSERIRE]'],
    ['Concorrenti rilevati', (check?.competitors || []).join(', ') || 'Nessuno rilevato'],
    ['Fonti registrate', (check?.urls || []).join(', ') || 'Nessuna fonte registrata']
  ];
}

function supportTitle(prompt, project) {
  const q = String(prompt?.text || '').replace(/[?]+$/,'').trim();
  const loc = project?.location ? ` a ${project.location}` : '';
  if (/miglior|migliore|top|consigliat/i.test(q)) return `Come scegliere ${q.replace(/miglior[ei]?|top|consigliat[oi]/ig,'').trim()}${loc}: criteri, costi e domande utili`;
  if (/quanto costa|prezzo|costo/i.test(q)) return `${q}: prezzi, fattori di costo e cosa verificare`;
  return `${q}: guida pratica, criteri di scelta e domande frequenti`;
}

function buildContentPrompt(project, prompt, check, opportunity, decision, mode) {
  const problem = contentProblemType(check, opportunity);
  const facts = contentFacts(project, check).map(([k,v])=>`${k}: ${v}`).join('\n');
  const title = mode === 'update_page' ? (project.pageAudit?.h1 || prompt?.text || 'Pagina da ottimizzare') : supportTitle(prompt, project);
  const placeholders = ['anni di esperienza','numero clienti','risultati','certificazioni','prezzi','recensioni','case study'];
  return `Agisci come SEO copywriter e consulente GEO senior. Devi creare un contenuto correttivo basato esclusivamente sui dati forniti. Non inventare nulla.\n\nDECISIONE EDITORIALE\nIntervento: ${contentLabels(mode)}\nMotivo: ${decision.reason}\nRischio cannibalizzazione: ${decision.cannibalization}\nProblema GEO: ${problem}\n\nQUERY/PROMPT TESTATO\n${prompt?.text || '[NON DISPONIBILE]'}\n\nPAGINA O TITOLO DI LAVORO\n${title}\n\nDATI VERIFICATI\n${facts}\n\nESITO DEL TEST\nBrand presente: ${check?.brandMentioned ? 'Sì' : 'No'}\nDominio citato: ${check?.domainCited ? 'Sì' : 'No'}\nTipo risposta: ${check?.responseType || 'Non disponibile'}\nGEO Score: ${check?.score ?? 0}/100\nConfidence: ${check?.confidence ?? 0}/100\n\nREGOLE OBBLIGATORIE\n1. Distingui dati verificati, dati mancanti e informazioni da ricercare.\n2. Per ogni dato non fornito usa un segnaposto esplicito, ad esempio [INSERIRE CASE STUDY VERIFICATO].\n3. Non dichiarare ${placeholders.join(', ')} senza prova.\n4. Mantieni un intento diverso dalla pagina target quando generi un articolo di supporto.\n5. Evita keyword stuffing, frasi promozionali generiche e confronti non dimostrati.\n6. Inserisci un link interno alla pagina target con anchor naturale.\n7. Suggerisci fonti solo come elementi da verificare, senza inventare URL.\n\nOUTPUT RICHIESTO\nA. Decisione editoriale e rischio cannibalizzazione.\nB. Keyword principale, secondarie, intento e pubblico.\nC. SEO title, meta description, permalink e H1.\nD. Struttura H2/H3.\nE. Contenuto completo in HTML pulito per WordPress, senza CSS inline.\nF. FAQ utili e non duplicate.\nG. Link interni consigliati con anchor.\nH. Schema consigliato, senza generare dati falsi.\nI. Checklist finale: accuratezza, fonti, cannibalizzazione, CTA e revisione umana.\nJ. Elenco di tutti i segnaposto rimasti.\n\nLUNGHEZZA\nDetermina la lunghezza in base all’intento e alla complessità; evita testo riempitivo.`;
}

let reportProjectChoice = '';
let reportRangeChoice = 'all';
let reportSelectedCheckIds = new Set();
let reportSelectedOpportunityIds = new Set();

function reportAvailableChecks(projectId, range) {
  const cutoff = range === 'all' ? 0 : Date.now() - Number(range) * 86400000;
  return state.checks.filter(c =>
    c.projectId === projectId &&
    !c.archived &&
    new Date(c.date).getTime() >= cutoff
  ).sort((a, b) => new Date(b.date) - new Date(a.date));
}

function reportAvailableOpportunities(projectId, checkIds = null) {
  const allowed = checkIds ? new Set(checkIds) : null;
  return generateOpportunities().filter(o =>
    o.projectId === projectId &&
    o.status !== 'Completata' &&
    (!allowed || allowed.has(o.checkId))
  );
}

function resetReportSelections(projectId, range) {
  const checks = reportAvailableChecks(projectId, range);
  reportSelectedCheckIds = new Set(checks[0] ? [checks[0].id] : []);
  reportSelectedOpportunityIds = new Set(reportAvailableOpportunities(projectId, [...reportSelectedCheckIds]).map(o => o.id));
}

function reportCheckLabel(c) {
  const prompt = promptBy(c.promptId)?.text || 'Prompt eliminato';
  return `${platformBy(c.platformId).name} · ${Utils.date(c.date, true)} · ${prompt}`;
}

function renderReports() {
  reportProjectChoice = reportProjectChoice || state.projects[0]?.id || '';
  const availableChecks = reportAvailableChecks(reportProjectChoice, reportRangeChoice);
  if (reportProjectChoice && !reportSelectedCheckIds.size) resetReportSelections(reportProjectChoice, reportRangeChoice);

  reportSelectedCheckIds = new Set([...reportSelectedCheckIds].filter(id => availableChecks.some(c => c.id === id)));
  if (reportSelectedCheckIds.size > 1) reportSelectedCheckIds = new Set([[...reportSelectedCheckIds][0]]);

  const selectedCheckId = [...reportSelectedCheckIds][0] || '';
  const availableOpp = reportAvailableOpportunities(reportProjectChoice, selectedCheckId ? [selectedCheckId] : []);
  reportSelectedOpportunityIds = new Set([...reportSelectedOpportunityIds].filter(id => availableOpp.some(o => o.id === id)));
  if (selectedCheckId && !reportSelectedOpportunityIds.size) reportSelectedOpportunityIds = new Set(availableOpp.map(o => o.id));

  document.getElementById('reports').innerHTML = `

function executiveDiagnosis(check, project, prompt, opp) {
  const competitors = (check.competitors || []).length;
  const sources = (check.urls || []).length;
  const m = opp[0] ? opportunityMeta(opp[0]) : { probability: 50 };

  let text = check.brandMentioned ? `${project.brand} compare nella risposta` : `${project.brand} non compare nella risposta`;
  if (!check.domainCited) text += ', e il dominio ufficiale non viene citato';
  else text += ', con citazione del dominio ufficiale';
  text += `. La verifica contiene ${competitors} concorrenti e ${sources} fonti registrate. Il risultato indica un problema da approfondire, non una causa certa.`;

  return `<div class="geo-summary"><div class="card"><div class="section-kicker">Executive summary</div><h2 style="margin:6px 0 8px">Perché il risultato è importante</h2><p>${Utils.esc(text)}</p><p class="help">La priorità è rendere più chiara, verificabile e ripetibile l’associazione tra brand, servizio, località e fonte ufficiale.</p></div><div class="card"><div class="section-kicker">Stima operativa</div><div style="font-size:24px;font-weight:900;margin-top:8px">${m.impactGeo >= 4 ? 'Alto' : m.impactGeo >= 3 ? 'Medio' : 'Basso'}</div><div class="help">Potenziale operativo, non previsione statistica. Confidenza: ${opp.some(o => o.evidenceLevel === 'Confermato') ? 'media' : 'bassa'}.</div></div></div>`;
}

function renderRoadmap(opp) {
  const today = [], week = [], month = [], later = [];
  opp.forEach(o => {
    const m = opportunityMeta(o);
    today.push(...m.today.slice(0, 2));
    week.push(...m.week.slice(0, 2));
    month.push(...m.month.slice(0, 2));
    if (o.priority === 'P3' || o.priority === 'P4') later.push(o.action);
  });
  const uniq = a => Utils.unique(a).slice(0, 6);
  return `<div class="report-section-title"><h2>Roadmap 7 / 30 / 60 / 90 giorni</h2></div><div class="roadmap-grid"><div class="roadmap-card"><h4>Entro 7 giorni</h4><ul>${uniq(today).map(x => `<li>${Utils.esc(x)}</li>`).join('')}</ul></div><div class="roadmap-card"><h4>Entro 30 giorni</h4><ul>${uniq(week).map(x => `<li>${Utils.esc(x)}</li>`).join('')}</ul></div><div class="roadmap-card"><h4>Entro 60 giorni</h4><ul>${uniq(month).map(x => `<li>${Utils.esc(x)}</li>`).join('')}</ul></div><div class="roadmap-card"><h4>Entro 90 giorni</h4><ul>${uniq(later.length ? later : ['Consolida le fonti migliori', 'Ripeti il benchmark', 'Aggiorna il piano in base ai risultati']).map(x => `<li>${Utils.esc(x)}</li>`).join('')}</ul></div></div>`;
}

      `Rendi identici nome del brand, dominio, telefono, località e descrizione essenziale su sito e profili esterni.`,
